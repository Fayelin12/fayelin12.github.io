<body>
  <div class="bg-shape bg-shape-1"></div>

  <main class="page-content">
    <article class="post">
  <div class="reading-progress-container">
    <div class="reading-progress-bar" id="reading-progress"></div>
  </div>

  <header class="post-header reveal">
    <h1 class="post-title">更新测试</h1>
    <div class="post-meta">
      <span class="post-date" aria-label="发布日期">
        <span class="meta-icon">📅</span>
        <time datetime="2026-05-23">2026-05-23</time>
      </span>
      
    </div>
  </header>

  <div class="post-content reveal">
    <p>初版内容。</p>

  </div>

  <footer class="post-footer reveal">
    <div class="post-divider"></div>

    <div class="share-section">
      <button class="share-btn" id="wechat-share-btn" aria-label="分享到微信">
        <span class="share-icon">💚</span> 分享到微信
      </button>
      <div class="share-qrcode" id="share-qrcode">
        <p class="share-qrcode-hint">打开微信"扫一扫"</p>
      </div>
    </div>

    <a class="back-link" href="/blog/">
      <span class="back-arrow">←</span> 返回首页
    </a>
  </footer>
</article>

<script>
  (function() {
    var progressBar = document.getElementById('reading-progress');
    if (!progressBar) return;

    var ticking = false;
    function updateProgress() {
      var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      if (docHeight <= 0) return;
      var progress = (scrollTop / docHeight) * 100;
      progressBar.style.width = progress + '%';
      progressBar.style.opacity = scrollTop > 10 ? '1' : '0';
    }

    window.addEventListener('scroll', function() {
      if (!ticking) {
        window.requestAnimationFrame(function() {
          updateProgress();
          ticking = false;
        });
        ticking = true;
      }
    });
    updateProgress();
  })();

  // WeChat share QR code (desktop only) — qrcodejs loaded on demand
  (function() {
    var btn = document.getElementById('wechat-share-btn');
    var qrContainer = document.getElementById('share-qrcode');
    if (!btn || !qrContainer) return;

    var qrGenerated = false;
    var qrScriptLoaded = false;

    function generateQR() {
      if (qrGenerated) return;
      if (typeof QRCode === 'undefined') return;
      var url = window.location.href.split('?')[0];
      new QRCode(qrContainer, {
        text: url,
        width: 180,
        height: 180,
        colorDark: '#1e293b',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      qrGenerated = true;
    }

    btn.addEventListener('click', function() {
      var isOpen = qrContainer.classList.contains('is-open');
      if (isOpen) {
        qrContainer.classList.remove('is-open');
        btn.classList.remove('is-active');
      } else {
        if (!qrScriptLoaded) {
          // Lazy-load qrcodejs only when user first clicks the share button
          var s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
          s.integrity = 'sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU';
          s.crossOrigin = 'anonymous';
          s.onload = function() { generateQR(); };
          document.head.appendChild(s);
          qrScriptLoaded = true;
        } else {
          generateQR();
        }
        qrContainer.classList.add('is-open');
        btn.classList.add('is-active');
      }
    });
  })();
</script>

  </main>

  <footer class="site-footer">
    <div class="footer-content">
      
      <p class="footer-copy">&copy; 2026 我的博客. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function() {
      // IntersectionObserver for scroll reveal animations
      const reveals = document.querySelectorAll('.reveal');
      if (reveals.length > 0 && 'IntersectionObserver' in window) {
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              observer.unobserve(entry.target);
            }
          });
        }, {
          threshold: 0.08,
          rootMargin: '0px 0px -40px 0px'
        });
        reveals.forEach(function(el) { observer.observe(el); });
      } else if (reveals.length > 0) {
        reveals.forEach(function(el) { el.classList.add('revealed'); });
      }
    })();
  </script>
</body>
</html>
