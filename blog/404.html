  <script>
    (function() {
      var reveals = document.querySelectorAll('.reveal');
      if (reveals.length === 0) return;

      var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reducedMotion) return;

      var isMobile = window.matchMedia('(max-width: 767px)').matches;

      // Desktop-only: bail out early if IntersectionObserver is unsupported
      if (!isMobile && !('IntersectionObserver' in window)) {
        reveals.forEach(function(el) { el.classList.add('revealed'); });
        return;
      }

      var threshold = isMobile ? 0.05 : 0.08;
      var rootMargin = isMobile ? '0px 0px -20px 0px' : '0px 0px -40px 0px';

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;

          if (isMobile) {
            // Mobile: subtle fade-in after paint (content already visible)
            entry.target.classList.add('is-fading-in');
          } else {
            // Desktop: slide-up reveal with optional stagger
            var delay = parseInt(entry.target.getAttribute('data-reveal-delay'), 10) || 0;
            var delayMs = delay * 80;
            var reveal = function() {
              entry.target.classList.add('is-transitioning');
              entry.target.classList.add('revealed');
            };
            if (delayMs > 0) {
              setTimeout(reveal, delayMs);
            } else {
              reveal();
            }
          }
          observer.unobserve(entry.target);
        });
      }, { threshold: threshold, rootMargin: rootMargin });

      reveals.forEach(function(el) { observer.observe(el); });

      // Desktop: clean up will-change GPU layer after transition ends
      if (!isMobile) {
        reveals.forEach(function(el) {
          el.addEventListener('transitionend', function() {
            el.classList.remove('is-transitioning');
          }, { once: true });
        });
      }
    })();
  </script>
