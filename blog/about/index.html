  <script>
    (function() {
      // Hamburger menu toggle
      var menuToggle = document.querySelector('.menu-toggle');
      var navMenu = document.querySelector('.nav-menu');
      if (menuToggle && navMenu) {
        menuToggle.addEventListener('click', function(e) {
          e.stopPropagation();
          var expanded = menuToggle.getAttribute('aria-expanded') === 'true';
          menuToggle.setAttribute('aria-expanded', !expanded);
          navMenu.classList.toggle('is-open');
          menuToggle.classList.toggle('is-active');
        });
        document.addEventListener('click', function(e) {
          if (!menuToggle.contains(e.target) && !navMenu.contains(e.target)) {
            menuToggle.setAttribute('aria-expanded', 'false');
            navMenu.classList.remove('is-open');
            menuToggle.classList.remove('is-active');
          }
        });
      }

      // IntersectionObserver for scroll reveal animations
      const reveals = document.querySelectorAll('.reveal');
      if (reveals.length > 0 && 'IntersectionObserver' in window) {
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              observer.unobserve(entry.target);
            }
          });
        }, {
          threshold: 0.08,
          rootMargin: '0px 0px -40px 0px'
        });
        reveals.forEach(function(el) { observer.observe(el); });
      } else if (reveals.length > 0) {
        // Fallback for browsers without IntersectionObserver
        reveals.forEach(function(el) { el.classList.add('revealed'); });
      }

      // Navbar hide/show on scroll
      var lastScroll = 0;
      var header = document.querySelector('.site-header');
      var ticking = false;
      window.addEventListener('scroll', function() {
        if (!ticking) {
          window.requestAnimationFrame(function() {
            var currentScroll = window.pageYOffset || document.documentElement.scrollTop;
            if (currentScroll > lastScroll && currentScroll > 80) {
              header.classList.add('nav-hidden');
            } else {
              header.classList.remove('nav-hidden');
            }
            lastScroll = currentScroll;
            ticking = false;
          });
          ticking = true;
        }
      });

      // Footer mascot subtle parallax & rotation
      var mascot = document.querySelector('.footer-mascot');
      if (mascot) {
        var mascotTicking = false;
        window.addEventListener('scroll', function() {
          if (!mascotTicking) {
            window.requestAnimationFrame(function() {
              var scrollY = window.pageYOffset || document.documentElement.scrollTop;
              var offset = Math.sin(scrollY / 180) * 6;
              var rotate = scrollY / 12;
              mascot.style.transform = 'translateY(' + offset + 'px) rotate(' + rotate + 'deg)';
              mascotTicking = false;
            });
            mascotTicking = true;
          }
        });
      }
    })();
  </script>
