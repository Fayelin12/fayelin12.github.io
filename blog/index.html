  {"date": "2026-05-21"}

<script>
  (function() {
    var el = document.getElementById('posts-data');
    if (!el) return;
    var postsData = JSON.parse(el.textContent);
    var monthCounts = {};
    postsData.forEach(function(p) {
      var month = p.date.substring(0, 7);
      monthCounts[month] = (monthCounts[month] || 0) + 1;
    });

    var months = [];
    var now = new Date();
    for (var i = 11; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      var key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      var label = (d.getMonth() + 1) + '月';
      months.push({ key: key, label: label, count: monthCounts[key] || 0 });
    }

    var html = '<div class="heatmap-grid">';
    months.forEach(function(m) {
      var intensity = m.count === 0 ? 0 : m.count === 1 ? 1 : m.count <= 3 ? 2 : 3;
      html += '<div class="heatmap-cell" title="' + m.key + '：' + m.count + '篇">';
      html += '<div class="heatmap-block intensity-' + intensity + '"></div>';
      html += '<span class="heatmap-label">' + m.label + '</span>';
      html += '</div>';
    });
    html += '</div>';
    document.getElementById('heatmap').innerHTML = html;
  })();
</script>

  <script>
    (function() {
      // IntersectionObserver for scroll reveal animations
      const reveals = document.querySelectorAll('.reveal');
      if (reveals.length > 0 && 'IntersectionObserver' in window) {
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              observer.unobserve(entry.target);
            }
          });
        }, {
          threshold: 0.08,
          rootMargin: '0px 0px -40px 0px'
        });
        reveals.forEach(function(el) { observer.observe(el); });
      } else if (reveals.length > 0) {
        reveals.forEach(function(el) { el.classList.add('revealed'); });
      }
    })();
  </script>
