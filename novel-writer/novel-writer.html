function createBlockElement(block, cardDef, grid, card, chapterId) {
  const el = document.createElement('div');
  el.className = 'block-item';
  el.setAttribute('data-block-id', block.id);

  const textarea = document.createElement('textarea');
  textarea.className = 'block-item__editor';
  textarea.placeholder = cardDef.placeholder;
  textarea.value = block.content || '';
  textarea.spellcheck = false;
  textarea.rows = 1;

  // 自动高度：用 scrollHeight 精确测量
  function autoResize() {
    if (textarea.offsetWidth <= 0) { requestAnimationFrame(autoResize); return; }
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
  }

  const footer = document.createElement('div');
  footer.className = 'block-item__footer';
  footer.innerHTML =
    '<span class="block-item__wc">' + (block.wordCount || 0) + ' 字</span>' +
    '<button class="block-item__delete" title="删除段落">\u00D7</button>';
  const wcSpan = footer.querySelector('.block-item__wc');
  const delBtn = footer.querySelector('.block-item__delete');

  // Input
  textarea.addEventListener('input', () => {
    updateBlock(block.id, textarea.value);
    wcSpan.textContent = (block.wordCount || 0) + ' 字';
    autoResize();
    updateChapterTotalWordCount();
    updateNovelTotalWordCount();
    updateCardHeader(card, cardDef, chapterId);
  });

  // Focus 淡化
  textarea.addEventListener('focus', () => {
    el.classList.add('is-editing');
    grid.classList.add('has-focus');
    card.classList.add('is-focused');
  });
  textarea.addEventListener('blur', () => {
    el.classList.remove('is-editing');
    setTimeout(() => {
      if (!grid.querySelector('.block-item__editor:focus')) {
        grid.classList.remove('has-focus');
        card.classList.remove('is-focused');
      }
    }, 100);
  });

  // Tab / Enter / Shift+Enter
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = textarea.selectionStart, end = textarea.selectionEnd;
      textarea.value = textarea.value.substring(0, s) + '  ' + textarea.value.substring(end);
      textarea.selectionStart = textarea.selectionEnd = s + 2;
      updateBlock(block.id, textarea.value);
      autoResize();
    } else if (e.key === 'Enter' && !e.shiftKey) {
      // Enter = 拆分为两个 block，光标移到新 block
      e.preventDefault();
      const s = textarea.selectionStart, end = textarea.selectionEnd;
      const before = textarea.value.substring(0, s);
      const after = textarea.value.substring(end);

      // 空内容不拆分：跳到下一个已有 block，或新建一个
      if (!before.trim() && !after.trim()) {
        const blockList = card.querySelector('.block-list');
        const nextEl = el.nextElementSibling;
        if (nextEl && nextEl.classList.contains('block-item')) {
          const nextTa = nextEl.querySelector('.block-item__editor');
          if (nextTa) nextTa.focus();
        } else {
          // 没有下一个 block，新建空 block
          const currentBlocks = getBlocksForBoard(chapterId, cardDef.key);
          const currentIdx = currentBlocks.findIndex(b => b.id === block.id);
          const newBlock = createBlock(chapterId, cardDef.key);
          newBlock.order = (currentIdx >= 0 ? currentIdx : currentBlocks.length - 1) + 1;
          novelData.blocks.forEach(b => {
            if (b.chapterId === chapterId && b.boardId === cardDef.key && b.order >= newBlock.order) b.order++;
          });
          const newEl = createBlockElement(newBlock, cardDef, grid, card, chapterId);
          blockList.classList.remove('is-empty');
          if (blockList.querySelector('.block-list__empty')) blockList.innerHTML = '';
          if (el.nextSibling) blockList.insertBefore(newEl, el.nextSibling);
          else blockList.appendChild(newEl);
          updateCardHeader(card, cardDef, chapterId);
          updateWordCounts();
          setTimeout(() => {
            const newTa = newEl.querySelector('.block-item__editor');
            if (newTa) newTa.focus();
          }, 20);
        }
        return;
      }

      // 更新当前 block 为光标前的内容
      updateBlock(block.id, before);
      textarea.value = before;
      autoResize();
      wcSpan.textContent = (block.wordCount || 0) + ' 字';

      // 在当前 block 之后创建新 block
      const currentBlocks = getBlocksForBoard(chapterId, cardDef.key);
      const currentIdx = currentBlocks.findIndex(b => b.id === block.id);
      const newBlock = createBlock(chapterId, cardDef.key);
      newBlock.order = (currentIdx >= 0 ? currentIdx : currentBlocks.length - 1) + 1;
      // 把后续 block 的 order 全部 +1
      novelData.blocks.forEach(b => {
        if (b.chapterId === chapterId && b.boardId === cardDef.key && b.order >= newBlock.order) b.order++;
      });
      updateBlock(newBlock.id, after);

      // 插入新的 block 元素到当前 el 后面
      const blockList = card.querySelector('.block-list');
      const newEl = createBlockElement(newBlock, cardDef, grid, card, chapterId);
      if (el.nextSibling) blockList.insertBefore(newEl, el.nextSibling);
      else blockList.appendChild(newEl);

      updateCardHeader(card, cardDef, chapterId);
      updateWordCounts();

      // 聚焦新 block
      setTimeout(() => {
        const newTa = newEl.querySelector('.block-item__editor');
        if (newTa) newTa.focus();
      }, 20);
    } else if (e.key === 'Enter' && e.shiftKey) {
      // Shift+Enter = 在段落内插入软换行（保留）
      // textarea 默认行为即可，不需要 preventDefault
    } else if (e.key === 'Backspace' && !e.shiftKey && !e.ctrlKey && !e.altKey) {
      // 在 block 开头按 Backspace → 合并到上一个 block（类似 Notion）
      if (textarea.selectionStart === 0 && textarea.selectionEnd === 0) {
        e.preventDefault();
        const prevEl = el.previousElementSibling;
        if (!prevEl || !prevEl.classList.contains('block-item')) return;
        const prevBlockId = prevEl.getAttribute('data-block-id');
        const prevBlock = novelData.blocks.find(b => b.id === prevBlockId);
        if (!prevBlock) return;
        const prevTa = prevEl.querySelector('.block-item__editor');
        const prevContent = (prevBlock.content || '').replace(/\n$/, '');
        const curContent = textarea.value;
        // 合并内容：空段落直接消失，不追加换行；有内容时用软换行连接
        const merged = curContent ? prevContent + '\n' + curContent : prevContent;
        updateBlock(prevBlock.id, merged);
        if (prevTa) {
          prevTa.value = merged;
          prevTa.selectionStart = prevTa.selectionEnd = merged.length;
          // 触发 autoResize：prevTa 的 input 事件会更新 UI，但需要手动触发高度调整
          prevTa.dispatchEvent(new Event('input', { bubbles: true }));
        }
        // 删除当前 block
        deleteBlock(block.id);
        el.remove();
        // 聚焦上一个 block
        if (prevTa) prevTa.focus();
        updateCardHeader(card, cardDef, chapterId);
        updateWordCounts();
      }
    }
  });

  // Delete
  delBtn.addEventListener('click', () => {
    if (!confirm('确定删除此段落？')) return;
    el.style.opacity = '0'; el.style.maxHeight = '0'; el.style.overflow = 'hidden';
    el.style.transition = 'opacity 0.15s, max-height 0.2s';
    setTimeout(() => {
      deleteBlock(block.id);
      el.remove();
      const blocks = getBlocksForBoard(chapterId, cardDef.key);
      const blockList = card.querySelector('.block-list');
      if (blocks.length === 0) {
        blockList.classList.add('is-empty');
        blockList.innerHTML = '<div class="block-list__empty">点击 + 添加段落</div>';
      }
      updateCardHeader(card, cardDef, chapterId);
      updateWordCounts();
    }, 180);
  });

  el.appendChild(textarea);
  el.appendChild(footer);
  // 首次 autoResize：元素刚 append 到 el，但 el 可能还没到 DOM
  // 用 requestAnimationFrame 确保 DOM 布局完成后再测量
  requestAnimationFrame(() => autoResize());
  return el;
}

function updateCardHeader(card, cardDef, chapterId) {
  const blocks = getBlocksForBoard(chapterId, cardDef.key);
  const wcSpan = card.querySelector('.writing-card__wc');
  if (wcSpan) wcSpan.textContent = blocks.length + ' 段';
}

  const materialList = document.createElement('div');
  materialList.className = 'narrative-view__material-list';

    const blocks = getBlocksForBoard(chapter.id, def.key);

    const groupHeader = document.createElement('div');
    groupHeader.className = 'material-group__header';

      '<span class="material-group__icon">' + def.icon + '</span>' +
      '<span class="material-group__label">' + def.label + '</span>' +

    const groupBody = document.createElement('div');

      const preview = (block.content || '').substring(0, 80) || '(空段落)';
      blockEl.innerHTML =
        '<div class="material-block__preview">' +
          '<div class="material-block__text">' + escapeHtml(preview) + '</div>' +

        '</div>' +
        '<button class="material-block__add" title="添加到故事流">+</button>';

      });

function renderStoryCanvas(canvas, chapterId) {
  const stream = getOrCreateStream(chapterId);
  canvas.innerHTML = '';

  if (stream.sequence.length === 0) {
    canvas.classList.add('is-empty');
    canvas.innerHTML =
      '<div class="narrative-view__canvas-empty">' +
        '从左侧素材面板点击 + 将段落添加到故事流<br>' +
        '或点击下方按钮添加自由文本' +
      '</div>';
  } else {
    canvas.classList.remove('is-empty');
    stream.sequence.forEach((item, idx) => {
      const el = createStreamItemElement(item, idx, stream.sequence.length, chapterId);
      canvas.appendChild(el);
    });
  }

  // 添加自由文本按钮
  const addBtn = document.createElement('button');
  addBtn.className = 'add-stream-item-btn';
  addBtn.textContent = '+ 添加自由文本';
  addBtn.addEventListener('click', () => {
    const newItem = addFreeTextToStream(chapterId);
    renderStoryCanvas(canvas, chapterId);
    setTimeout(() => {
      const ta = canvas.querySelector('[data-stream-item-id="' + newItem.id + '"] .stream-item__editor');
      if (ta) ta.focus();
    }, 30);
  });
  canvas.appendChild(addBtn);
}

function createStreamItemElement(item, index, total, chapterId) {
  const el = document.createElement('div');
  el.className = 'stream-item stream-item--' + item.type;
  el.setAttribute('data-stream-item-id', item.id);

  // Header
  const header = document.createElement('div');
  header.className = 'stream-item__header';

  if (item.type === 'block') {
    const block = novelData.blocks.find(b => b.id === item.blockId);
    const def = CARD_MAP[block ? block.boardId : ''] || { icon: '?', label: '未知' };
    header.innerHTML =
      '<span class="stream-item__badge"><span class="stream-item__badge-icon">' + def.icon + '</span>' + def.label + ' \u00B7 ' + (block ? (block.wordCount||0) + ' 字' : '已删除') + '</span>';
  } else {
    header.innerHTML = '<span class="stream-item__badge">\u{270D}\uFE0F 自由文本</span>';
  }

  // Actions
  const actions = document.createElement('div');
  actions.className = 'stream-item__actions';
  const canUp = index > 0;
  const canDown = index < total - 1;
  actions.innerHTML =
    '<button class="stream-item__action-btn' + (canUp ? '' : ' is-disabled') + '" title="上移"' + (canUp ? '' : ' disabled') + '>\u2191</button>' +
    '<button class="stream-item__action-btn' + (canDown ? '' : ' is-disabled') + '" title="下移"' + (canDown ? '' : ' disabled') + '>\u2193</button>' +
    '<button class="stream-item__action-btn is-danger" title="移除">\u00D7</button>';

  if (canUp) actions.children[0].addEventListener('click', () => { moveStreamItem(chapterId, item.id, -1); renderStoryCanvas(el.closest('.narrative-view__canvas'), chapterId); });
  if (canDown) actions.children[1].addEventListener('click', () => { moveStreamItem(chapterId, item.id, 1); renderStoryCanvas(el.closest('.narrative-view__canvas'), chapterId); });
  actions.children[2].addEventListener('click', () => { removeStreamItem(chapterId, item.id); renderStoryCanvas(el.closest('.narrative-view__canvas'), chapterId); });

  header.appendChild(actions);
  el.appendChild(header);

  // Content
  if (item.type === 'block') {
    const block = novelData.blocks.find(b => b.id === item.blockId);
    const content = document.createElement('div');
    content.className = 'stream-item__content';
    content.textContent = block ? (block.content || '(空段落)') : '(源段落已删除)';
    if (!block) content.style.color = 'var(--color-text-tertiary)';
    el.appendChild(content);
  } else {
    const textarea = document.createElement('textarea');
    textarea.className = 'stream-item__editor';
    textarea.value = item.content || '';
    textarea.placeholder = '在此书写过渡或补充内容...';
    textarea.spellcheck = false;
    textarea.addEventListener('input', () => {
      updateStreamFreeText(chapterId, item.id, textarea.value);
      updateNovelTotalWordCount();
    });
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = textarea.selectionStart, end = textarea.selectionEnd;
        textarea.value = textarea.value.substring(0,s) + '  ' + textarea.value.substring(end);
        textarea.selectionStart = textarea.selectionEnd = s + 2;
        updateStreamFreeText(chapterId, item.id, textarea.value);
      }
    });
    el.appendChild(textarea);
  }

  return el;
}

function getSystemTheme() { return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }

function applyTheme(v) { settings.theme = v; document.getElementById('settingTheme').value = v; const e = getEffectiveTheme(); document.documentElement.setAttribute('data-theme', e); document.getElementById('themeMenuItem').textContent = e==='dark' ? '切换浅色模式' : '切换深色模式'; saveSettings(); syncOutlineTheme(); }
function toggleTheme() { closeAllDropdowns(); document.body.classList.add('theme-transitioning'); setTimeout(()=>document.body.classList.remove('theme-transitioning'),350); const e=getEffectiveTheme(); if(settings.theme==='system') applyTheme(getSystemTheme()==='dark'?'light':'dark'); else applyTheme(e==='dark'?'light':'dark'); }

function applyLineHeight(v) { console.log('applyLineHeight called with:', v); settings.lineHeight=v; document.documentElement.style.setProperty('--line-height-editor',v); saveSettings(); }
function applyAutoSaveInterval(v) { settings.autoSaveInterval=Math.max(1000,parseInt(v)||2000); if(autoSaveTimer){clearTimeout(autoSaveTimer);autoSaveTimer=null;} if(isDirty) scheduleAutoSave(); saveSettings(); }

function applyAllSettings() {

/* ============================================================
   下拉菜单 / 面板
   ============================================================ */
function toggleDropdown(id) {
  const el=document.getElementById(id);
  const o=el.classList.contains('is-open');
  closeAllDropdowns();
  if(!o){
    el.classList.add('is-open');
    const menu=el.querySelector('.dropdown__menu');
    if(menu){
      const rect=el.getBoundingClientRect();
      const menuW=220; // min-width
      const vw=window.innerWidth;
      const vh=window.innerHeight;
      // 侧边栏内的菜单可能被 overflow:hidden 裁剪，统一使用 fixed 定位
      const inSidebar=el.closest('.sidebar')!==null;
      if(inSidebar){
        menu.classList.add('is-fixed');
        let left=rect.left;
        let top=rect.bottom+4;
        // 如果菜单有 --right 修饰符，右对齐按钮
        if(menu.classList.contains('dropdown__menu--right')){
          left=rect.right-menuW;
        }
        // 确保不超出右侧
        if(left+menuW>vw) left=vw-menuW-4;
        // 确保不超出左侧
        if(left<4) left=4;
        // 确保不超出底部
        if(top+200>vh) top=rect.top-200-4;
        menu.style.left=left+'px';
        menu.style.top=top+'px';
      }
    }
  }
}
function closeAllDropdowns() {
  document.querySelectorAll('.dropdown.is-open').forEach(d=>{
    d.classList.remove('is-open');
    const menu=d.querySelector('.dropdown__menu');
    if(menu){menu.classList.remove('is-fixed');menu.style.left='';menu.style.top='';}
  });
}
document.addEventListener('click',(e)=>{if(!e.target.closest('.dropdown'))closeAllDropdowns();});

let outlineVisible = false;

function toggleOutline() {
  outlineVisible = !outlineVisible;
  const entry = document.getElementById('outlineEntry');
  const overlay = document.getElementById('outlineOverlay');
  const sidebar = document.querySelector('.sidebar');

function syncOutlineTheme() {
  const iframe = document.getElementById('outlineIframe');
  if (iframe && iframe.contentWindow) {
    try {
      const targetOrigin = window.location.href.startsWith('file:') ? '*' : window.location.origin;
      iframe.contentWindow.postMessage({ type: 'theme-changed' }, targetOrigin);
    } catch(e) {}
  }
}

// 推送章节 id+title 列表到大纲 iframe
function sendChapterDataToOutline() {
  const iframe = document.getElementById('outlineIframe');
  if (!iframe || !iframe.contentWindow) return;
  try {
    const chapters = novelData.chapters.map(ch => ({ id: ch.id, title: ch.title }));
    const targetOrigin = window.location.href.startsWith('file:') ? '*' : window.location.origin;
    iframe.contentWindow.postMessage({ type: 'chapter-data', chapters }, targetOrigin);
  } catch(e) {}
}

// 监听大纲 iframe 的消息
window.addEventListener('message', (e) => {
  // 放宽来源校验：允许 file://、null origin 及同源
  const origin = e.origin;
  if (origin && origin !== 'null' && origin !== window.location.origin && !window.location.href.startsWith('file:')) return;
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'outline-updated') {
    // 大纲数据更新通知（预留扩展点）
  }
  if (e.data.type === 'navigate-chapter' && e.data.chapterId) {
    // 从大纲点击引用章节标签 → 切换到对应章节
    const idx = novelData.chapters.findIndex(c => c.id === e.data.chapterId);
    if (idx !== -1) {
      // switchChapter 会自动关闭大纲覆盖层
      switchChapter(idx);
    }
  }
});

function updateExportInfo() {
  let total = 0;
  novelData.chapters.forEach(ch => { total += ch.title.length + 10; novelData.blocks.filter(b=>b.chapterId===ch.id).forEach(b => { total += (b.content||'').length + 2; }); });
  document.getElementById('exportInfo').textContent = '预计文件大小：' + (total/1024).toFixed(1) + ' KB';
}

function doExport() {
  const filename = document.getElementById('exportFilename').value.trim() || '我的小说';
  const format = document.querySelector('input[name="exportFormat"]:checked').value;
  let content = format === 'md' ? exportMarkdown(filename) : exportText(filename);
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = filename + '.' + format; a.click(); URL.revokeObjectURL(url);
  closeExport(); showToast('导出成功：' + filename + '.' + format);
}

function exportMarkdown(title) {
  let md = '# ' + title + '\n\n';
  novelData.chapters.forEach(ch => {
    md += '## ' + ch.title + '\n\n';
    CARD_DEFS.forEach(d => {
      const blocks = getBlocksForBoard(ch.id, d.key);
      blocks.forEach(b => {
        const t = (b.content||'').trim();
        if (t) md += '### ' + d.icon + ' ' + d.label + '\n\n' + t + '\n\n';
      });
    });
  });
  return md;
}

function exportText(title) {
  let txt = title + '\n' + '='.repeat(title.length*2) + '\n\n';
  novelData.chapters.forEach(ch => {
    txt += '\u3010' + ch.title + '\u3011\n' + '-'.repeat(ch.title.length*2+4) + '\n\n';
    CARD_DEFS.forEach(d => {
      const blocks = getBlocksForBoard(ch.id, d.key);
      blocks.forEach(b => {
        const t = (b.content||'').trim();
        if (t) txt += '[ ' + d.label + ' ]\n' + t + '\n\n';
      });
    });
  });
  return txt;
}

   搜索
   ============================================================ */
function openSearch() {
  const panel=document.getElementById('searchPanel'); panel.classList.add('is-open');
  const input=document.getElementById('searchInput'); input.value=''; input.focus();
  document.getElementById('searchResults').innerHTML=''; document.getElementById('searchFooter').textContent='';
}
function closeSearch(){document.getElementById('searchPanel').classList.remove('is-open');}

function doSearch(query) {
  const results=document.getElementById('searchResults'); const footer=document.getElementById('searchFooter');
  if(!query.trim()){results.innerHTML='';footer.textContent='';return;}
  const matches=[]; const q=query.toLowerCase();
  novelData.blocks.forEach(block => {
    const text = block.content || '';
    const pos = text.toLowerCase().indexOf(q);
    if (pos < 0) return;
    const chIdx = novelData.chapters.findIndex(c => c.id === block.chapterId);
    if (chIdx < 0) return;
    const def = CARD_MAP[block.boardId];
    const start=Math.max(0,pos-15), end=Math.min(text.length,pos+query.length+15);
    let snippet=''; if(start>0)snippet+='...'; snippet+=escapeHtml(text.substring(start,end)); if(end<text.length)snippet+='...';
    const highlighted = snippet.replace(new RegExp(escapeRegExp(escapeHtml(query)),'gi'),m=>'<mark>'+m+'</mark>');
    matches.push({chapter:novelData.chapters[chIdx], cIdx:chIdx, block, def, highlighted});
  });
  footer.textContent='共找到 '+matches.length+' 个结果';
  results.innerHTML='';
  matches.forEach(m => {
    const item=document.createElement('div'); item.className='search-result';
    item.innerHTML =
      '<div class="search-result__chapter">'+escapeHtml(m.chapter.title)+'</div>'+
      '<div class="search-result__card">'+m.def.icon+' '+m.def.label+'</div>'+
      '<div class="search-result__snippet">'+m.highlighted+'</div>';
    item.addEventListener('click',()=>{
      closeSearch();
      if(settings.viewMode==='narrative'){settings.viewMode='tiling';saveSettings();}
      switchChapter(m.cIdx);
      setTimeout(()=>{
        const card=document.querySelector('.writing-card--'+m.def.key);
        if(card){enterCardPin(m.def.key);setTimeout(()=>{const ta=card.querySelector('[data-block-id="'+m.block.id+'"] .block-item__editor');if(ta)ta.focus();},150);}
      },200);
    });
    results.appendChild(item);
  });
}

  });
}

function setupKeyboardShortcuts() {
  document.addEventListener('keydown',(e)=>{
    const isMod=e.ctrlKey||e.metaKey;
    if(!isMod){
      if(e.key==='Escape'){
        if(outlineVisible){toggleOutline();return;}
        if(pinnedCardKey){exitCardPin();return;}
        closeSearch();closeSettings();closeExport();closeShortcuts();closeAllDropdowns();
      }
      return;
    }
    if(e.key==='s'&&!e.shiftKey){e.preventDefault();saveData();return;}
    if(e.key==='f'&&!e.shiftKey){e.preventDefault();openSearch();return;}
    if(e.key==='F'){e.preventDefault();toggleSidebar();return;}
    if(e.key==='L'){e.preventDefault();toggleTheme();return;}
    if(e.key==='n'&&!e.shiftKey){e.preventDefault();createChapter();return;}
    if(e.key==='ArrowUp'){e.preventDefault();const i=novelData.chapters.findIndex(c=>c.id===novelData.activeChapterId);if(i>0)switchChapter(i-1);return;}
    if(e.key==='ArrowDown'){e.preventDefault();const i=novelData.chapters.findIndex(c=>c.id===novelData.activeChapterId);if(i<novelData.chapters.length-1)switchChapter(i+1);return;}
    if(e.key==='d'&&!e.shiftKey){e.preventDefault();deleteCurrentChapter();return;}
    if(e.key===','){e.preventDefault();openSettings();return;}
    if(e.key==='E'){e.preventDefault();openExport();return;}
    if(e.key==='/'){e.preventDefault();const p=document.getElementById('shortcutsPanel');if(p.classList.contains('is-open'))closeShortcuts();else openShortcuts();return;}
  });
}

/* ============================================================
   Toast
   ============================================================ */
let toastTimer=null;
function showToast(msg,isError) {
  const toast=document.getElementById('toast'); const text=document.getElementById('toastText');
  text.textContent=msg; toast.classList.toggle('is-error',!!isError);
  if(toast.classList.contains('is-visible')){clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('is-visible'),2000);return;}
  toast.classList.add('is-visible'); toastTimer=setTimeout(()=>toast.classList.remove('is-visible'),2000);
}

/* ============================================================
   初始化
   ============================================================ */
function init() {
  // 调试：确认 JS 是否执行
  console.log('init() called, fontSize=', settings.fontSize);
  loadData();
  migrateAllChapters();
  loadSettings();
  console.log('after loadSettings, fontSize=', settings.fontSize);
  // 强制覆盖字号为 12px
  settings.fontSize = '12';
  saveSettings();
  applyAllSettings();
  console.log('after applyAllSettings, CSS var=', getComputedStyle(document.documentElement).getPropertyValue('--font-size-editor'));
  renderChapterList();
  if (novelData.activeChapterId) {
    const idx = novelData.chapters.findIndex(c => c.id === novelData.activeChapterId);
    if (idx >= 0) renderCurrentView();
    else renderEmptyState();
  } else { renderEmptyState(); }
  updateWordCounts();
  buildShortcutsPanel();
  setupKeyboardShortcuts();
  // 页面关闭/刷新时立即保存，防止延迟自动保存导致数据丢失
  window.addEventListener('beforeunload', () => { if (isDirty) saveData(); });
  // iframe 加载完成后推送章节数据
  const outlineIframe = document.getElementById('outlineIframe');
  if (outlineIframe) {
    outlineIframe.addEventListener('load', () => { sendChapterDataToOutline(); });
  }
}

init();
</script>
