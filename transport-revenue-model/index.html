        list.forEach(function(item, i) {
          h += '<tr>' + reorderBtns('customer', primary, i, list.length);
          h += '<td>' + (item.name ? esc(item.name) : cellSel(C_ITEM_FIELDS[0], i, itemKeys)) + '</td>';
          C_ITEM_FIELDS.slice(1).forEach(function(f) {
            const keys = KEY_MAP[f] || [];
            let sel = item[f] ? '' : cellSel(f, i, keys), val = '';
            if (f === 'standard' && item.name) {
              const sc = buildStandardCell(item, i);
              sel = sc.sel || ''; val = sc.val || '';
            }
            const display = sel || val || (f === 'rate' ? fmtRate(item[f]) : esc(item[f] || ''));
            const canEdit = !sel && keys.length === 0 && f !== 'standard';
            h += '<td' + (canEdit ? ' data-field="' + f + '" data-group="' + primary + '" data-idx="' + i + '"' : '') + '>' + display + '</td>';
          });
          h += '<td><button class="btn btn--ghost row-action customer-item-del" data-group="' + primary + '" data-idx="' + i + '">&times;</button></td></tr>';
        });
      }
      h += '<tr class="customer-add-row"><td colspan="' + (C_COLSPAN + 1) + '">' + (itemKeys.length ? '<button class="btn btn--ghost btn--sm w-full" data-action="add-customer-item" data-group="' + primary + '">+ 添加</button>' : '') + '</td></tr>';
      h += '</tbody></table></div>';
      return h;
    }

    function renderCustomerPanel(product) {
      const ct = product.customer;
      if (!ct.items) ct.items = {};
      const itemKeys = getDictKeys(D_CUSTOMER);
      const KEY_MAP = { payment: getDictKeys(D_PAYMENT), payee: getDictKeys(D_PAYEE) };
      let h = '<div class="flex-wrap gap-4">';
      CUSTOMER_GROUPS.forEach(function(g) { h += renderCustomerCard(g, ct, itemKeys, KEY_MAP); });
      h += '</div>';
      return h;
    }

    function renderOperationsPanel(product) {
      const ops = product.operations || (product.operations = {});
      let h = '<div class="flex-wrap gap-4">';
      const itemKeys = getDictKeys(D_OPS_ITEM);

      function opsSelect(field, i, keys, gk) {
        if (!keys.length) return '';
        return '<select class="customer-item-pick" data-module="operations" data-group="' + gk + '" data-idx="' + i + '" data-field="' + field + '"><option value="">选择…</option>'
          + keys.map(function(k) { return '<option value="' + esc(k) + '">' + esc(k) + '</option>'; }).join('') + '</select>';
      }

      function opsUnitHtml(item, i, gk) {
        if (item.unit) return esc(item.unit);
        if (!item.name) return '';
        const u = getRateUnitFor(item.name) || getDictUnit(D_OPS_ITEM, item.name);
        const parts = u ? u.split('|') : [];
        if (parts.length === 1) return esc(parts[0]);
        if (parts.length > 1) return opsSelect('unit', i, parts, gk);
        return '';
      }

      OPS_GROUPS.forEach(function(g) {
        if (!ops[g.key]) ops[g.key] = [];
        const list = ops[g.key], gk = g.key;
        h += '<div class="customer-card"><div class="text-sm font-semibold customer-card-title">' + g.label + '</div>'
          + '<table class="data-table card-table"><thead><tr><th class="row-reorder"></th><th>项目</th><th>计费单位</th><th>金额/费率</th><th>说明</th><th></th></tr></thead><tbody>';
        if (!list.length) {
          h += emptyRow(O_COLSPAN + 1);
        } else {
          list.forEach(function(item, i) {
            const nameHtml = item.name ? esc(item.name) : opsSelect('name', i, itemKeys, gk);
            const unitHtml = opsUnitHtml(item, i, gk);
            h += '<tr>' + reorderBtns('operations', gk, i, list.length) + '<td>' + nameHtml + '</td><td>' + unitHtml + '</td><td data-module="operations" data-field="value" data-group="' + gk + '" data-idx="' + i + '">' + fmtRate(item.value) + '</td><td data-module="operations" data-field="desc" data-group="' + gk + '" data-idx="' + i + '" data-maxlength="25">' + esc(item.desc || '') + '</td><td><button class="btn btn--ghost row-action ops-item-del" data-group="' + gk + '" data-idx="' + i + '">&times;</button></td></tr>';
          });
        }
        h += '<tr class="customer-add-row"><td colspan="' + (O_COLSPAN + 1) + '"><button class="btn btn--ghost btn--sm w-full" data-action="add-ops-item" data-group="' + gk + '">+ 添加</button></td></tr>'
          + '</tbody></table></div>';
      });
      h += '</div>';
      return h;
    }

    function renderChannelPanel(product) {
      const ch = product.channel || (product.channel = { items: [], unit: CH_UNIT });
      if (!ch.items) ch.items = [];
      const vehicles = getDictKeys(D_VEHICLE);
      let h = '<div class="customer-card"><div class="text-sm font-semibold customer-card-title">渠道获客费用（' + CH_UNIT + '/辆）</div>'
        + '<table class="data-table card-table"><thead><tr><th class="row-reorder"></th><th>渠道名称</th>';
      vehicles.forEach(function(v) { h += '<th>' + v + '</th>'; });
      h += '<th></th></tr></thead><tbody>';
      if (!ch.items.length) {
        h += emptyRow(vehicles.length + 3);
      } else {
        ch.items.forEach(function(item, i) {
          h += '<tr>' + reorderBtns('channel', '', i, ch.items.length) + '<td data-module="channel" data-field="name" data-idx="' + i + '" data-maxlength="25">' + esc(item.name || '') + '</td>';
          vehicles.forEach(function(v) { h += '<td data-module="channel" data-field="' + v + '" data-idx="' + i + '">' + fmtRate(item[v]) + '</td>'; });
          h += '<td><button class="btn btn--ghost row-action channel-item-del" data-idx="' + i + '">&times;</button></td></tr>';
        });
      }
      h += '<tr class="customer-add-row"><td colspan="' + (vehicles.length + 3) + '"><button class="btn btn--ghost btn--sm w-full" data-action="add-channel-item">+ 添加</button></td></tr>'
        + '</tbody></table></div>';
      return h;
    }

    function renderDetail(keepTab) {
      const main = document.getElementById('productMain');
      const product = findActive();
      if (!product) {
        main.innerHTML = '<div class="product-empty">选择或新增一个方案</div>';
        return;
      }
      const remembered = main.querySelector('.product-sub-tab.active');
      const activeKey = keepTab && remembered ? remembered.getAttribute('data-sub') : PRODUCT_SECTIONS[0].key;
      let tabs = '', panelsHtml = '';
      const panels = { customer: renderCustomerPanel, operations: renderOperationsPanel, channel: renderChannelPanel };
      PRODUCT_SECTIONS.forEach(function(s, i) {
        tabs += '<button class="product-sub-tab' + (s.key === activeKey ? ' active' : '') + '" data-sub="' + s.key + '">' + s.tab + '</button>';
        panelsHtml += '<div class="product-sub-panel sub-panel--' + s.key + (s.key === activeKey ? ' active' : '') + '" id="sub-panel-' + s.key + '">'
          + '<div class="product-sub-panel-content">'
          + (panels[s.key] ? panels[s.key](product) : '<p class="product-sub-section">' + s.tab + '方案参数（待定义）</p>')
          + '</div></div>';
      });
      const html = '<div class="product-form"><div class="product-sub-tabs"><div class="product-sub-tabs-left">' + tabs + '</div></div>' + panelsHtml + '</div>';
      main.innerHTML = html;
    }

    function syncAll() {
      save();
      renderList();
      const form = document.getElementById('productMain').querySelector('.product-form');
      if (form) form.classList.add('switching');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { renderDetail(true); });
      });
    }
    function reRender() { save(); renderDetail(true); }

    function add() {
      const product = { id: uid(), name: '未命名方案', customer: { items: {} }, operations: { settlement: [], acquisition: [] }, channel: { items: [], unit: CH_UNIT } };
      state.products.push(product);
      state.activeId = product.id;
      save();
      syncAll();
    }

    function remove(id) {
      state.products = state.products.filter(function(p) { return p.id !== id; });
      if (state.activeId === id) {
        state.activeId = state.products.length ? state.products[0].id : null;
      }
      save();
      syncAll();
    }

    function rename(id, name) {
      const p = state.products.find(function(p) { return p.id === id; });
      if (p) { p.name = name || '未命名方案'; save(); renderList(); }
    }

    function duplicate(id) {
      const src = state.products.find(function(p) { return p.id === id; });
      if (!src) return;
      const product = JSON.parse(JSON.stringify(src));
      product.id = uid();
      product.name = '新方案';
      state.products.push(product);
      state.activeId = product.id;
      save();
      syncAll();
    }

    // 事件 — 左侧列表：单击选中 / 删除 / 再次点击名称编辑
    document.getElementById('productList').addEventListener('click', function(e) {
      const item = e.target.closest('.product-list-item');
      if (!item) return;
      const id = item.getAttribute('data-id');
      var mv = e.target.closest('.row-move-up');
      if (mv) {
        var didx = parseInt(mv.getAttribute('data-didx'));
        if (didx > 0 && didx < state.products.length) {
          var moved = state.products.splice(didx, 1)[0];
          state.products.splice(didx - 1, 0, moved);
          save(); renderList();
        }
        return;
      }
      if (e.target.closest('.product-copy')) {
        duplicate(id);
        return;
      }
      if (e.target.closest('.product-del')) {
        if (confirm('确认删除方案"' + item.querySelector('span').textContent + '"？')) remove(id);
        return;
      }
      if (id === state.activeId) {
        if (e.target.closest('input.product-list-edit')) return; // 已在编辑中，不触发 syncAll
        if (e.target.closest('span')) {
          startInlineEdit(item.querySelector('span'), {
            inputClass: 'product-list-edit',
            onSave: function(val) { rename(id, val); renderList(); },
            onCancel: function() { renderList(); },
          });
          return;
        }
      }
      state.activeId = id;
      syncAll();
    });

    // 按 data-module 解析目标数据数组，确保存在
    function moduleItems(p, mod, group) {
      if (mod === 'product') return state.products;
      if (mod === 'channel') {
        if (!p.channel) p.channel = { items: [] };
        if (!p.channel.items) p.channel.items = [];
        return p.channel.items;
      }
      if (mod === 'operations') {
        if (!p.operations) p.operations = {};
        if (!p.operations[group]) p.operations[group] = [];
        return p.operations[group];
      }
      if (!p.customer) p.customer = { items: {} };
      if (!p.customer.items[group]) p.customer.items[group] = [];
      return p.customer.items[group];
    }

    // 行操作辅助函数（渠道/运营/面客/排序/编辑）
    function delChannel(p, el) {
      var ix = parseInt(el.getAttribute('data-idx'));
      if (p.channel && p.channel.items && ix >= 0 && ix < p.channel.items.length) p.channel.items.splice(ix, 1);
      reRender();
    }
    function addChannel(p) {
      if (!p.channel) p.channel = { items: [] };
      var row = { name: '' };
      getDictKeys(D_VEHICLE).forEach(function(v) { row[v] = ''; });
      p.channel.items.push(row);
      reRender();
    }
    function delOps(p, el) {
      var items = moduleItems(p, 'operations', el.getAttribute('data-group'));
      var ix = parseInt(el.getAttribute('data-idx'));
      if (ix >= 0 && ix < items.length) items.splice(ix, 1);
      reRender();
    }
    function addOps(p, el) {
      var gk = el.getAttribute('data-group');
      if (!p.operations) p.operations = {};
      if (!p.operations[gk]) p.operations[gk] = [];
      p.operations[gk].push({ name: '', unit: '', value: '', desc: '' });
      reRender();
    }
    function delCust(p, el) {
      var items = moduleItems(p, 'customer', el.getAttribute('data-group'));
      var ix = parseInt(el.getAttribute('data-idx'));
      if (ix >= 0 && ix < items.length) items.splice(ix, 1);
      reRender();
    }
    function addCust(p, el) {
      var g = el.getAttribute('data-group');
      if (!p.customer.items[g]) p.customer.items[g] = [];
      p.customer.items[g].push({ name: '', payment: '', payee: '', standard: '', rate: '' });
      reRender();
    }
    function mvRow(p, el) {
      var dir = el.classList.contains('row-move-up') ? -1 : 1;
      var td = el.closest('.row-reorder');
      var mod = td.getAttribute('data-module');
      var gk = td.getAttribute('data-group') || null;
      var didx = parseInt(el.getAttribute('data-didx'));
      var items = moduleItems(p, mod, gk);
      if (didx + dir >= 0 && didx + dir < items.length) {
        items.splice(didx + dir, 0, items.splice(didx, 1)[0]);
        reRender();
      }
    }
    function editCell(p, td) {
      var mod = td.getAttribute('data-module') || 'customer';
      var g = td.getAttribute('data-group');
      var idx = parseInt(td.getAttribute('data-idx'));
      var field = td.getAttribute('data-field');
      var items = moduleItems(p, mod, g);
      var old = td.textContent;
      var inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'customer-cell-input';
      inp.value = old;
      var ml = td.getAttribute('data-maxlength');
      if (ml) inp.maxLength = parseInt(ml);
      td.textContent = '';
      td.appendChild(inp);
      inp.focus();
      inp.select();
      function done(save) {
        if (done.called) return; done.called = true;
        var val = inp.value.trim();
        td.textContent = val || old;
        if (save && val && val !== old) { items[idx][field] = val; save(); }
      }
      inp.addEventListener('blur', function() { done(true); });
      inp.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') { ev.preventDefault(); inp.blur(); }
        if (ev.key === 'Escape') { inp.value = old; inp.blur(); }
      });
    }

    // 面客/运营/渠道：编辑 / 删除 / 添加空行 / 排序
    document.getElementById('productMain').addEventListener('click', function(e) {
      const p = findActive(); if (!p) return;
      var el;
      if ((el = e.target.closest('.channel-item-del'))) return delChannel(p, el);
      if ((el = e.target.closest('[data-action="add-channel-item"]'))) return addChannel(p);
      if ((el = e.target.closest('.ops-item-del'))) return delOps(p, el);
      if ((el = e.target.closest('[data-action="add-ops-item"]'))) return addOps(p, el);
      if ((el = e.target.closest('.customer-item-del'))) return delCust(p, el);
      if ((el = e.target.closest('[data-action="add-customer-item"]'))) return addCust(p, el);
      if ((el = e.target.closest('.row-move-up, .row-move-down'))) return mvRow(p, el);
      if ((el = e.target.closest('td[data-field]'))) {
        if (el.querySelector('.customer-cell-input')) return; // 已在编辑中，不重建
        return editCell(p, el);
      }
    });

    // 下拉选 — 统一入口，按 data-module 分发
    document.getElementById('productMain').addEventListener('change', function(e) {
      const sel = e.target.closest('.customer-item-pick');
      if (!sel || !sel.value) return;
      const p = findActive(); if (!p) return;
      const group = sel.getAttribute('data-group');
      const idx = parseInt(sel.getAttribute('data-idx'));
      const field = sel.getAttribute('data-field') || 'name';
      const mod = sel.getAttribute('data-module') || 'customer';
      moduleItems(p, mod, group)[idx][field] = sel.value;
      reRender();
    });

    // sub-tab
    bindTabs({ container: document.getElementById('productMain'), navSel: '.product-sub-tab', panelSel: '.product-sub-panel', attr: 'data-sub', prefix: 'sub-panel-', scope: document.getElementById('productMain') });

    document.getElementById('btnAddProduct').addEventListener('click', add);
    document.getElementById('btnExportProducts').addEventListener('click', function() {
      downloadJSON(state.products, '产品方案导出.json');
    });

    // 初始化
    var loaded = load();
    state.products = loaded.products;
    state.activeId = loaded.activeId;
    syncAll();
    window.getProducts = function() { return state; };
    window.getCustomerGroups = function() { return CUSTOMER_GROUPS; };
    window.saveProducts = function() { save(); };
  })();
</script>
<script>
  // 收益测算 — 左侧产品列表，右侧 单车/渠道/毛利 三个子模型
  (function() {
    const listEl = document.getElementById('unitProductList');
    const mainEl = document.getElementById('unitMain');
    const SUB_MODELS = [
      { tab: '单车模型', key: 'single' },
      { tab: '渠道模型', key: 'channel' },
      { tab: '毛利模型', key: 'profit' },
    ];

    let selId = null;

    // 模型常量
    // DAILY_VEHICLE_MULTIPLIER：通行笔数系数，日均通行 1.2 笔/车
    const DAILY_VEHICLE_MULTIPLIER = 1.2;
    const SCALE_PRESETS = [5000, 10000, 50000, 100000];   // 发行规模预设（辆）
    const LOGISTIC_K = 0.5, LOGISTIC_T0 = 6;              // 逻辑斯蒂增长参数：陡峭度 k，拐点月份 t₀
    const FORECAST_MONTHS = 12, PAYBACK_MONTHS = 36;      // 预测周期 12 个月，回本曲线跨度 36 个月
    var selChannel = '', selK = SCALE_PRESETS[0], incomeStacked = true;
    // Chart dataset 通用样式
    const CHART_LINE_STYLE = { fill: 'origin', tension: 0.3, pointRadius: 0, borderWidth: 2.5 };

    // 单车模型列定义 + 提示映射
    const SINGLE_COLS = ['车型', '月均通行费', '月均通行天数', '月服务费收入', '月结算成本', '月净收入', '1年累计', '2年累计', '3年累计', '获客成本', '3年毛利', '回本月数'];
    const SINGLE_TIPS = {
      '车型': '字典：车型',
      '月均通行费': '基准表：通行费均值 = (A+B版月均通行费)/2',
      '月均通行天数': '基准表：月通行天数',
      '月服务费收入': '产品方案·面客：单位% → 通行费×费率/100；单位元 → 通行天数×金额',
      '月结算成本': '产品方案·运营：结算成本',
      '月净收入': '月服务费收入 − 月结算成本',
      '1年累计': '月净收入 × 12',
      '2年累计': '月净收入 × 24',
      '3年累计': '月净收入 × 36',
      '获客成本': '运营·获客成本 + 渠道·获客费用 − 面客·采购费 − 面客·办理费',
      '3年毛利': '3年累计 − 获客成本',
      '回本月数': '获客成本 ÷ 月净收入（向上取整）'
    };
    // 通行费基准表（取 BENCHMARK_TABLES 第一张）
    const TOLL_TABLE = BENCHMARK_TABLES[0];
    const TOLL_IDX_FEE = TOLL_TABLE.head.indexOf('通行费均值');      // 替代硬编码 r[4]
    const TOLL_IDX_DAYS = TOLL_TABLE.head.indexOf('月通行天数');     // 替代硬编码 r[5]
    const ACQ_DEDUCT_KEYS = ['采购费', '办理费'];                    // 获客成本扣减项的关键词
    // 车型 → 套餐主键 映射（从 CUSTOMER_GROUPS 动态构建）
    function buildVehMap() {
      var vm = {};
      var cg = window.getCustomerGroups ? window.getCustomerGroups() : [];
      cg.forEach(function(g) { if (!g.vehicles.length) return; var primary = g.vehicles[0]; g.vehicles.forEach(function(v) { vm[v] = primary; }); });
      return vm;
    }

    // ---- 共享计算函数（单车模型、渠道模型共用底层口径） ----

    // 构建通行费 lookup 表
    function buildTollLookup() {
      var lookup = {};
      TOLL_TABLE.rows.forEach(function(r) { lookup[r[0]] = r; });
      return lookup;
    }
    function lookupToll(v, lookup) { var r = lookup[v]; return r ? parseNum(cellVal(r[TOLL_IDX_FEE], r, TOLL_TABLE.head)) : 0; }
    function lookupDays(v, lookup) { var r = lookup[v]; return r ? parseNum(cellVal(r[TOLL_IDX_DAYS], r, TOLL_TABLE.head)) : 0; }

    // 扁平化面客项目（ctItems 可能是 object{组: []} 或 array）
    function flatCustItems(ctItems) {
      var all = Array.isArray(ctItems) ? ctItems : [];
      if (!all.length) { for (var g in ctItems) { all = all.concat(ctItems[g] || []); } }
      return all;
    }

    // ---- 数据访问层 ----

    function getActiveProduct() {
      var st = window.getProducts ? window.getProducts() : { products: [] };
      return st.products.find(function(x) { return x.id === selId; });
    }
    function getVehicleTypes() { return dict()['车型'] ? Object.keys(dict()['车型']) : ['类型A', '类型B', '类型C', '类型D', '类型E']; }
    function buildCols(ch) {
      var p = getActiveProduct();
      var ratios = (p && p.channelModel && p.channelModel.ratios) || {};
      var cr = ratios[ch || selChannel] || {};
      var cols = [];
      getVehicleTypes().forEach(function(v) { cols.push({ v: v, pct: cr[v] || 0 }); });
      return cols;
    }

    // ---- 共享计算 ----
    // 面客扣减项（按名称关键词匹配，取 rate，调用方负责先扁平化）
    function deductFeeByName(flatItems, keyword) {
      for (var i = 0; i < flatItems.length; i++) {
        if ((flatItems[i].name || '').indexOf(keyword) !== -1) return isNaN(+flatItems[i].rate) ? 0 : +flatItems[i].rate;
      }
      return 0;
    }

    // 月服务费收入（通行费×费率% 或 通行天数×金额）
    // 返回 null 表示未配置有效的收费项目，表格将显示「—」
    function calcServiceFee(toll, days, items) {
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        if (it.rate == null || it.rate === '') continue;
        // 跳过获客扣减项（采购费/办理费等），它们由 calcAcqCost 单独处理，不产生服务收入
        if (ACQ_DEDUCT_KEYS.some(function(k) { return (it.name || '').indexOf(k) !== -1; })) continue;
        var r = +it.rate, std = it.standard || '';
        if (isNaN(r)) continue;
        if (std.indexOf('%') !== -1) return toll * r / 100;
        if (std.indexOf('元') !== -1) return days * DAILY_VEHICLE_MULTIPLIER * r;
      }
      return null;
    }

    // 月结算成本
    function calcSettleCost(toll, stlArr) {
      var r = 0;
      stlArr.forEach(function(it) { r += +it.value || 0; });
      return r ? toll * r / 100 : null;
    }

    // 获客成本（运营获客 + 渠道费用 − 采购费 − 办理费）
    function calcAcqCost(acqArr, channelItems, ctItems, v) {
      var r = 0;
      acqArr.forEach(function(it) { r += +it.value || 0; });
      channelItems.forEach(function(ch) { r += +(ch[v]) || 0; });
      var flatItems = flatCustItems(ctItems);
      ACQ_DEDUCT_KEYS.forEach(function(key) { r -= deductFeeByName(flatItems, key); });
      return r;
    }

    function getVehicleNetIncome() {
      var p = getActiveProduct();
      if (!p) return {};
      var lookup = buildTollLookup();
      var vehMap = buildVehMap();
      var ctItems = (p.customer && p.customer.items) || {};
      var ops = p.operations || {};
      var map = {}, vehicles = getVehicleTypes();
      vehicles.forEach(function(v) {
        var sf = calcServiceFee(lookupToll(v, lookup), lookupDays(v, lookup), ctItems[vehMap[v] || v] || []);
        var sc = calcSettleCost(lookupToll(v, lookup), ops.settlement || []);
        map[v] = (sf != null && sc != null) ? sf - sc : 0;
      });
      return map;
    }

    function getVehicleAcqCost() {
      var p = getActiveProduct();
      if (!p) return {};
      var ctItems = (p.customer && p.customer.items) || {};
      var ops = p.operations || {};
      var chItems = (p.channel && p.channel.items) || [];
      var vehicles = getVehicleTypes(), map = {};
      vehicles.forEach(function(v) {
        map[v] = calcAcqCost(ops.acquisition || [], chItems, ctItems, v);
      });
      return map;
    }

    function renderList() {
      const ps = (window.getProducts ? window.getProducts() : { products: [] }).products;
      if (!ps.length) { listEl.innerHTML = '<div class="product-empty">暂无方案</div>'; return; }
      if (!selId || !ps.find(function(p) { return p.id === selId; })) selId = ps[0].id;
      listEl.innerHTML = ps.map(function(p, i) {
        return '<div class="product-list-item' + (p.id === selId ? ' active' : '') + '" data-id="' + esc(p.id) + '">'
          + '<span style="flex:1;min-width:0;word-break:break-word">' + esc(p.name || '未命名方案') + '</span>'
          + '</div>';
      }).join('');
      showCalc(listEl.querySelector('.product-list-item.active'));
    }

    function showCalc(el) {
      if (!el) return;
      var last = mainEl.querySelector('.product-sub-tab.active');
      var lastKey = last ? last.getAttribute('data-sub') : SUB_MODELS[0].key;
      var tabs = '', panels = '', chartRes = null;
      var preNi = getVehicleNetIncome(), preAcMap = getVehicleAcqCost();
      // 确保 selChannel 已解析且渠道比例已初始化，再预计算 counts
      var p = getActiveProduct();
      if (p) ensureChannelRatios(p);
      if (!selChannel) {
        var items = p && p.channel && p.channel.items;
        selChannel = items && items[0] ? items[0].name : '';
      }
      var preCols = buildCols(), preCounts = buildMonthlyCounts(preCols);
      SUB_MODELS.forEach(function(s) {
        var active = s.key === lastKey;
        tabs += '<button class="product-sub-tab' + (active ? ' active' : '') + '" data-sub="' + s.key + '">' + s.tab + '</button>';
        var res;
        if (s.key === 'single') res = renderSingleModel(preAcMap);
        else if (s.key === 'channel') res = { html: renderChannelModel(preNi, preAcMap, preCounts) };
        else if (s.key === 'profit') res = { html: renderProfitModel(preNi, preAcMap, preCounts) };
        if (res && res.chartData) chartRes = res;
        var body = res ? res.html : '<p class="product-sub-section">「' + esc(el.querySelector('span').textContent) + '」' + s.tab + '（待实现）</p>';
        panels += '<div class="product-sub-panel' + (active ? ' active' : '') + '" id="unit-sub-' + s.key + '"><div class="product-sub-panel-content">' + body + '</div></div>';
      });
      var kGroup = '<div class="product-sub-tabs-right flex-center gap-2" id="kPresetGroup" style="display:' + (lastKey !== 'single' ? 'flex' : 'none') + '">'
        + '<span class="text-xs text-muted">发行规模</span>'
        + SCALE_PRESETS.map(function(k) {
            return '<button class="btn btn--sm scale-preset' + (k === selK ? ' btn--primary' : ' btn--secondary') + '" data-k="' + k + '">' + (k >= 1e4 ? (k / 1e4) + '万' : k) + '</button>';
          }).join('')
        + '</div>';
      mainEl.innerHTML = '<div class="product-form"><div class="product-sub-tabs"><div class="product-sub-tabs-left">' + tabs + '</div>' + kGroup + '</div>' + panels + '</div>';
      requestAnimationFrame(function() {
        if (chartRes && chartRes.chartData) drawPaybackChart(chartRes.chartData);
        var p = getActiveProduct();
        if (!p || !p.channelModel || !p.channelModel.ratios) return;
        if (!selChannel || !p.channelModel.ratios[selChannel]) return;
        drawScaleChart(preCols, preCounts);
        redrawIncomeChart(preNi, preAcMap, preCounts);
      });
    }

    function renderSingleModel(preAcMap) {
      const vehicles = getVehicleTypes();
      var lookup = buildTollLookup();
      var vehMap = buildVehMap();
      var p = getActiveProduct();
      var ctItems = (p && p.customer && p.customer.items) || {};
      var ops = (p && p.operations) || {};
      var acMap = preAcMap || getVehicleAcqCost();

      var h = '<div class="chart-box"><canvas id="chartPayback"></canvas></div><table class="data-table card-table"><thead><tr>';
      SINGLE_COLS.forEach(function(c) { h += '<th' + (SINGLE_TIPS[c] ? ' title="' + esc(SINGLE_TIPS[c]) + '"' : '') + '>' + c + '</th>'; });
      h += '</tr></thead><tbody>';
      var chartData = [];
      vehicles.forEach(function(v) {
        var row = lookup[v];
        var toll = lookupToll(v, lookup), days = lookupDays(v, lookup);
        var sf = calcServiceFee(toll, days, ctItems[vehMap[v]] || []);
        var sc = calcSettleCost(toll, ops.settlement || []);
        var ni = (sf != null && sc != null) ? sf - sc : null;
        var ac = acMap[v];
        if (row && ni != null) chartData.push({ v: v, ni: ni, ac: ac });
        h += '<tr><td>' + esc(v) + '</td>'
          + '<td class="number">' + (row ? cellVal(row[TOLL_IDX_FEE], row, TOLL_TABLE.head) : '—') + '</td>'
          + '<td class="number">' + (row ? cellVal(row[TOLL_IDX_DAYS], row, TOLL_TABLE.head) : '—') + '</td>'
          + '<td class="number">' + fmtNum(sf) + '</td>'
          + '<td class="number">' + fmtNum(sc) + '</td>'
          + '<td class="number">' + fmtNum(ni) + '</td>';
        [1, 2, 3].forEach(function(yr) {
          h += '<td class="number">' + fmtNum(ni != null ? ni * yr * 12 : null) + '</td>';
        });
        h += '<td class="number">' + fmtNum(ac) + '</td>'
          + '<td class="number">' + fmtNum(ni != null ? ni * 3 * 12 - ac : null) + '</td>'
          + '<td class="number">' + (ni > 0 ? (ac <= 0 ? '<1个月' : Math.ceil(ac / ni) + '个月') : '—') + '</td>';
        h += '</tr>';
      });
      return { html: h + '</tbody></table>', chartData: chartData };
    }

    function ensureChannelRatios(p) {
      if (!p.channelModel) p.channelModel = { ratios: {} };
      var vehicles = getVehicleTypes(), nv = vehicles.length;
      (p.channel && p.channel.items || []).forEach(function(ch) {
        if (!p.channelModel.ratios[ch.name]) {
          p.channelModel.ratios[ch.name] = {};
          vehicles.forEach(function(v, vi) { p.channelModel.ratios[ch.name][v] = Math.floor(100 / nv) + (vi === 0 ? 100 % nv : 0); });
        }
      });
    }

    function renderChannelModel(preNi, preAcMap, _counts) {
      var p = getActiveProduct();
      if (!p) return '<p class="product-sub-section">未找到方案</p>';
      ensureChannelRatios(p);
      var vehicles = getVehicleTypes();
      var nv = vehicles.length;
      if (!nv) return '<p class="product-sub-section">无车型数据</p>';
      var channels = p.channel && p.channel.items ? p.channel.items : [];
      var h = '<table class="data-table card-table"><thead><tr><th style="width:20%">渠道</th>';
      vehicles.forEach(function(v) { h += '<th style="width:15%">' + esc(v) + '</th>'; });
      h += '<th style="width:12%">合计</th><th style="width:36px"></th></tr></thead><tbody>';
      channels.forEach(function(ch) {
        var cn = ch.name || '未命名渠道', total = 0;
        h += '<tr><td style="white-space:nowrap">' + esc(cn) + '</td>';
        vehicles.forEach(function(v) {
          var val = p.channelModel.ratios[cn][v] || 0; total += val;
          h += '<td class="channel-cell"><div class="channel-row">'
            + '<input type="range" min="0" max="100" value="' + val + '" class="channel-range" data-cn="' + esc(cn) + '" data-vt="' + esc(v) + '">'
            + '<span class="channel-pct">' + val + '%</span></div></td>';
        });
        h += '<td class="number">' + total + '%</td>'
          + '<td class="channel-action-cell">'
          + '<button class="btn btn--ghost btn--sm channel-popover-toggle" style="cursor:pointer" data-action="channel-toggle">▼</button>'
          + '<div class="channel-popover bg-elevated border rounded-md shadow-popup p-1" style="position:fixed;width:100px;z-index:999;display:none">'
          + '<button class="btn btn--ghost btn--sm w-full" data-action="channel-copy" data-ch="' + esc(cn) + '" data-dir="up">同上</button>'
          + '<button class="btn btn--ghost btn--sm w-full" data-action="channel-copy" data-ch="' + esc(cn) + '" data-dir="down">同下</button>'
          + '<button class="btn btn--ghost btn--sm w-full" data-action="channel-avg" data-ch="' + esc(cn) + '">均分</button>'
          + '</div></td></tr>';
      });
      var chHdr = '<div class="flex-between" style="margin-bottom:var(--space-3)">'
        + '<span class="flex-center gap-2">'
        + '<select class="scale-channel-pick">';
      channels.forEach(function(ch) {
        var chn = ch.name || '';
        chHdr += '<option value="' + esc(chn) + '"' + (selChannel === chn ? ' selected' : '') + '>' + esc(chn || '未命名') + '</option>';
      });
      chHdr += '</select></span></div>';
      return h + '</tbody></table>'
        + '<div class="scale-section collapsed">'
        + chHdr
        + '<div style="display:flex;gap:var(--space-4);margin:var(--space-5) 0">'
        + ['chartScale', 'chartIncome'].map(function(id) { return '<div class="chart-box" style="flex:1;min-width:0"><canvas id="' + id + '"></canvas></div>'; }).join('')
        + '</div>'
        + '<div class="flex-between mb-2"><span class="collapse-toggle"></span><span class="income-toggle">' + (incomeStacked ? '堆积' : '折线') + '</span></div>'
        + '<div class="collapse-body">' + renderScaleTable(_counts) + renderIncomeTable(preNi, preAcMap, _counts) + '</div>'
        + '</div>';
    }

    function renderScaleTable(_counts) {
      var p = getActiveProduct();
      if (!p || !p.channelModel) return '';
      var vehicles = getVehicleTypes();
      var channels = p.channel && p.channel.items ? p.channel.items : [];
      if (!selChannel && channels.length) selChannel = channels[0].name;
      var ratios = p.channelModel.ratios || {};
      var h = '';
      // 列：选中渠道 × 车型
      var cr = ratios[selChannel] || {}, cols = [];
      vehicles.forEach(function(v) { cols.push({ v: v, pct: cr[v] || 0 }); });
      var counts = _counts || buildMonthlyCounts(cols);
      h += '<div class="table-section-title">发行规模</div>'
        + '<div class="scale-footnote">注：采用逻辑斯蒂增长曲线（k=0.5, t₀=6），各月数值 = K × 曲线比例 × 渠道占比，四舍五入取整后合计与 K 存在微小偏差。</div>'
        + '<table class="data-table card-table"><thead><tr><th>月份</th>';
      cols.forEach(function(c) { h += '<th>' + esc(c.v) + '</th>'; });
      h += '<th>合计</th></tr></thead><tbody id="scale-body">';
      h += renderScaleBody(cols, counts);
      return h + '</tbody></table>';
    }

    // 同步渠道滑块的 DOM 值（不重绘表格）
    function syncChannelSliders() {
      var p = getActiveProduct();
      if (!p || !p.channelModel) return;
      var sliders = mainEl.querySelectorAll('.channel-range');
      for (var i = 0; i < sliders.length; i++) {
        var s = sliders[i];
        var cn = s.getAttribute('data-cn');
        var vt = s.getAttribute('data-vt');
        var val = p.channelModel.ratios[cn] && p.channelModel.ratios[cn][vt] || 0;
        s.value = val;
        var pct = s.parentNode.querySelector('.channel-pct');
        if (pct) pct.textContent = val + '%';
        // 更新合计
        var tr = s.closest('tr');
        if (!tr) continue;
        var total = 0;
        tr.querySelectorAll('.channel-range').forEach(function(r) { total += parseInt(r.value) || 0; });
        var totalTd = tr.querySelector('.number');
        if (totalTd) totalTd.textContent = total + '%';
      }
    }

    // 刷新发行规模/累计净收入两张表+两张图
    function refreshChannelTables() {
      syncChannelSliders();
      var cols = buildCols(), counts = buildMonthlyCounts(cols);
      var ni = getVehicleNetIncome(), acMap = getVehicleAcqCost();
      var body = document.getElementById('scale-body');
      if (body) {
        body.innerHTML = renderScaleBody(cols, counts);
        var ib = document.querySelector('#unit-sub-channel .collapse-body table:last-of-type tbody');
        if (ib) ib.innerHTML = renderIncomeBody(ni, acMap, counts);
        drawScaleChart(cols, counts);
        redrawIncomeChart(ni, acMap, counts);
      }
      var pb = document.getElementById('profit-body');
      if (pb) {
        var pr = renderProfitBody(ni, acMap, counts);
        pb.innerHTML = pr.html;
        var kpiCards = document.querySelectorAll('#unit-sub-profit .profit-summary .card[data-kpi]');
        for (var i = 0; i < kpiCards.length; i++) {
          var card = kpiCards[i], key = card.getAttribute('data-kpi'), v = pr.sums[key] || 0;
          var mv = card.querySelector('.metric-value');
          if (mv) { mv.textContent = (v / 10000).toFixed(2) + '万'; mv.className = 'metric-value ' + profitCls(v); }
        }
      }
    }

    // 逻辑斯蒂增长
    function logistic(K, k, t0, t) { return Math.round(K / (1 + Math.exp(-k * (t - t0)))); }

    function buildMonthlyCounts(cols) {
      var counts = [];
      for (var m = 1; m <= FORECAST_MONTHS; m++) {
        var totalGrowth = logistic(selK, LOGISTIC_K, LOGISTIC_T0, m);
        var row = [];
        cols.forEach(function(c) { row.push(Math.round(totalGrowth * c.pct / 100)); });
        counts.push(row);
      }
      return counts;
    }

    function renderScaleBody(cols, counts) {
      var h = '';
      for (var m = 1; m <= FORECAST_MONTHS; m++) {
        var row = counts[m - 1], rowTotal = 0;
        h += '<tr><td>第' + m + '个月</td>';
        cols.forEach(function(c, vi) {
          var val = row[vi];
          rowTotal += val;
          h += '<td class="number scale-val" data-pct="' + c.pct + '">' + val.toLocaleString('en-US') + '</td>';
        });
        h += '<td class="number">' + rowTotal.toLocaleString('en-US') + '</td></tr>';
      }
      return h;
    }

    // 累计净收入公式：当月收入 + 历史收入 − 当月获客成本
    //   ① 当月净收入 = 当月规模车辆 × ni
    //   ② 历史净收入 = Σ(之前各月规模车辆) × ni
    //   ③ 总获客成本 = 当月规模车辆 × ac
    //   最终 = ① + ② − ③
    function computeIncomeMatrix(ni, acMap, _counts, channelRatios) {
      // channelRatios 可选：不传则从当前选中渠道读取（页面渲染），显式传入用于导出等场景
      if (!channelRatios) {
        var p = getActiveProduct(), ratios = (p && p.channelModel && p.channelModel.ratios) || {};
        channelRatios = ratios[selChannel] || {};
      }
      var cols = [], vehicles = getVehicleTypes();
      vehicles.forEach(function(v) { cols.push({ v: v, pct: channelRatios[v] || 0, ni: ni[v] || 0, ac: acMap[v] || 0 }); });
      var counts = _counts || buildMonthlyCounts(cols);
      var matrix = [], prevFleet = cols.map(function() { return 0; });
      for (var m = 1; m <= FORECAST_MONTHS; m++) {
        var row = counts[m - 1], dataRow = [];
        cols.forEach(function(c, vi) {
          var fleet = row[vi];
          var currentNi = fleet * c.ni;
          var historyNi = prevFleet[vi] * c.ni;
          var acCost = fleet * c.ac;
          dataRow.push(Math.round(currentNi + historyNi - acCost));
          prevFleet[vi] += fleet;
        });
        matrix.push(dataRow);
      }
      return { cols: cols, matrix: matrix };
    }

    function renderIncomeBody(ni, acMap, _counts) {
      var result = computeIncomeMatrix(ni, acMap, _counts);
      var h = '';
      for (var m = 1; m <= FORECAST_MONTHS; m++) {
        var row = result.matrix[m - 1], rowTotal = 0, cells = '';
        for (var vi = 0; vi < row.length; vi++) { rowTotal += row[vi]; cells += '<td class="number">' + row[vi].toLocaleString('en-US') + '</td>'; }
        h += '<tr><td>第' + m + '个月</td>' + cells + '<td class="number">' + rowTotal.toLocaleString('en-US') + '</td></tr>';
      }
      return h;
    }

    function renderIncomeTable(preNi, preAcMap, _counts) {
      var ni = preNi || getVehicleNetIncome(), acMap = preAcMap || getVehicleAcqCost(), vehicles = getVehicleTypes();
      var h = '<div class="table-section-spacer"></div><div class="table-section-title">累计净收入</div>'
        + '<div class="scale-footnote">注：每月 = 当月车辆×ni + 历史累计车辆×ni − 当月车辆×ac，车辆数取发行规模表。</div>'
        + '<table class="data-table card-table"><thead><tr><th>月份</th>';
      vehicles.forEach(function(v) { h += '<th>' + esc(v) + '</th>'; });
      h += '<th>合计</th></tr></thead><tbody>' + renderIncomeBody(ni, acMap, _counts) + '</tbody></table>';
      return h;
    }

    var RETENTION_Y2 = 0.95, RETENTION_Y3 = 0.90;

    function renderProfitModel(preNi, preAcMap, _counts) {
      var r = renderProfitBody(preNi, preAcMap, _counts);
      var sums = r.sums;
      function kw(v) { return (v / 10000).toFixed(2) + '万'; }
      function kpi(label, title, v, key) {
        return '<div class="card" data-kpi="' + key + '"><div class="metric-card"><div class="metric-label">' + label + '</div><div class="metric-value ' + profitCls(v) + '" title="' + title + '">' + kw(v) + '</div></div></div>';
      }
      var kpis = '<div class="text-sm font-semibold mb-3" style="color:var(--color-neutral-700);text-align:center">毛利概览</div><div class="profit-summary">'
        + kpi('Y1净收入', '当月车辆×ni + 历史累计车辆×ni − 当月车辆×ac，取第12个月累计值', sums.y1, 'y1')
        + kpi('Y2净收入(95%)', 'M12规模车数 × 95% × 月净收入 × 12', sums.y2, 'y2')
        + kpi('Y3净收入(90%)', 'M12规模车数 × 90% × 月净收入 × 12', sums.y3, 'y3')
        + kpi('3年总毛利', 'Y1 + Y2 + Y3', sums.total, 'total')
        + '</div>';
      var h = kpis + '<table class="data-table card-table"><thead><tr>'
        + '<th>车型</th>'
        + '<th title="M12月发行规模车辆数">车辆数</th>'
        + '<th title="单车月净收入 × 36 − 单车获客成本">单车3年毛利</th>'
        + '<th title="当月车辆×ni + 历史累计车辆×ni − 当月车辆×ac，取第12个月累计值">Y1净收入</th>'
        + '<th title="M12规模车数 × 95% × 月净收入 × 12">Y2净收入(95%)</th>'
        + '<th title="M12规模车数 × 90% × 月净收入 × 12">Y3净收入(90%)</th>'
        + '<th title="Y1 + Y2 + Y3">3年总毛利</th>'
        + '</tr></thead><tbody id="profit-body">';
      h += r.html;
      return h + '</tbody></table>';
    }

    function profitCls(v) { return v > 0 ? 'text-error' : v < 0 ? 'text-success' : ''; }

    function renderProfitBody(preNi, preAcMap, _counts) {
      var vehicles = getVehicleTypes();
      var ni = preNi || getVehicleNetIncome();
      var acMap = preAcMap || getVehicleAcqCost();
      var result = computeIncomeMatrix(ni, acMap, _counts);
      function td(v) { return '<td class="number ' + profitCls(v) + '">' + fmtNum(v) + '</td>'; }
      function tdw(v) { return '<td class="number ' + profitCls(v) + '">' + (v / 10000).toFixed(2) + '万</td>'; }
      var h = '', sumY1 = 0, sumY2 = 0, sumY3 = 0, sumTotal = 0;
      vehicles.forEach(function(v, vi) {
        var y1 = result.matrix[FORECAST_MONTHS - 1] ? result.matrix[FORECAST_MONTHS - 1][vi] : 0;
        var stock = _counts && _counts[FORECAST_MONTHS - 1] ? _counts[FORECAST_MONTHS - 1][vi] : 0;
        var y2 = Math.round(stock * RETENTION_Y2 * (ni[v] || 0) * 12);
        var y3 = Math.round(stock * RETENTION_Y3 * (ni[v] || 0) * 12);
        var per3y = Math.round((ni[v] || 0) * 36 - (acMap[v] || 0));
        var total = y1 + y2 + y3;
        sumY1 += y1; sumY2 += y2; sumY3 += y3; sumTotal += total;
        h += '<tr><td>' + esc(v) + '</td><td class="number">' + stock.toLocaleString('en-US') + '</td>' + td(per3y) + td(y1) + td(y2) + td(y3) + td(total) + '</tr>';
      });
      h += '<tr class="profit-sum"><td>合计</td><td class="number">—</td><td class="number">—</td>' + tdw(sumY1) + tdw(sumY2) + tdw(sumY3) + tdw(sumTotal) + '</tr>';
      return { html: h || '<tr><td colspan="7" class="text-muted text-xs p-3">暂未配置</td></tr>', sums: { y1: sumY1, y2: sumY2, y3: sumY3, total: sumTotal } };
    }

    // 渠道行弹出菜单 + 外部关闭
    mainEl.addEventListener('click', function(e) {
      var actionEl = e.target.closest('[data-action]');
      if (actionEl) {
        var action = actionEl.getAttribute('data-action');
        if (action === 'channel-toggle') {
          var popover = actionEl.parentNode.querySelector('.channel-popover');
          if (!popover) return;
          var rect = actionEl.getBoundingClientRect();
          popover.style.right = (window.innerWidth - rect.right) + 'px';
          popover.style.top = (rect.bottom + 4) + 'px';
          var all = mainEl.querySelectorAll('.channel-popover');
          var isOpen = popover.style.display === 'block';
          for (var i = 0; i < all.length; i++) all[i].style.display = 'none';
          if (!isOpen) popover.style.display = 'block';
          return;
        }
        // 菜单项
        var p = getActiveProduct();
        if (!p) return;
        var cn = actionEl.getAttribute('data-ch');
        var vehicles = getVehicleTypes(), nv = vehicles.length;
        if (action === 'channel-avg') {
          vehicles.forEach(function(v, vi) {
            p.channelModel.ratios[cn][v] = Math.floor(100 / nv) + (vi === 0 ? 100 % nv : 0);
          });
        } else if (action === 'channel-copy') {
          var dir = actionEl.getAttribute('data-dir');
          var ps = (window.getProducts ? window.getProducts() : { products: [] }).products;
          var curPIdx = -1;
          for (var i = 0; i < ps.length; i++) { if (ps[i].id === selId) { curPIdx = i; break; } }
          var srcPIdx = dir === 'up' ? curPIdx - 1 : curPIdx + 1;
          if (srcPIdx >= 0 && srcPIdx < ps.length) {
            var srcP = ps[srcPIdx];
            if (srcP.channel && srcP.channel.items && srcP.channel.items.length) {
              var srcCh = srcP.channel.items[0];
              ensureChannelRatios(srcP);
              var srcRatios = srcP.channelModel && srcP.channelModel.ratios && srcP.channelModel.ratios[srcCh.name];
              if (srcRatios) vehicles.forEach(function(v) { p.channelModel.ratios[cn][v] = srcRatios[v] || 0; });
            }
          }
        }
        window.saveProducts();
        refreshChannelTables();
        mainEl.querySelectorAll('.channel-popover').forEach(function(p) { p.style.display = 'none'; });
        return;
      }
      // 点击弹窗外部 → 关闭所有弹窗
      if (!e.target.closest('.channel-action-cell')) {
        mainEl.querySelectorAll('.channel-popover').forEach(function(p) { p.style.display = 'none'; });
      }
    });

    // 发行规模预设按钮事件
    mainEl.addEventListener('click', function(e) {
      var tog = e.target.closest('.collapse-toggle');
      if (tog) { var wrap = tog.closest('.scale-section'); wrap.classList.toggle('collapsed'); return; }
      var itog = e.target.closest('.income-toggle');
      if (itog) { incomeStacked = !incomeStacked; itog.textContent = incomeStacked ? '堆积' : '折线'; var ni = getVehicleNetIncome(), acMap = getVehicleAcqCost(), cols = buildCols(); drawScaleChart(cols, buildMonthlyCounts(cols)); redrawIncomeChart(ni, acMap); return; }
      var btn = e.target.closest('.scale-preset');
      if (!btn) return;
      selK = parseInt(btn.getAttribute('data-k'));
      // 更新按钮样式
      btn.parentNode.querySelectorAll('.scale-preset').forEach(function(b) { b.classList.toggle('btn--primary', b === btn); b.classList.toggle('btn--secondary', b !== btn); });
      // 全量重绘
      refreshChannelTables();
    });

    mainEl.addEventListener('change', function(e) {
      if (!e.target.closest('.scale-channel-pick')) return;
      selChannel = e.target.value;
      var sec = e.target.closest('.scale-section');
      if (!sec) return;
      // 全量重绘整个渠道模型区域
      var panel = document.getElementById('unit-sub-channel');
      if (panel) {
        var _ni = getVehicleNetIncome(), _acMap = getVehicleAcqCost(), _cols = buildCols(), _counts = buildMonthlyCounts(_cols);
        panel.querySelector('.product-sub-panel-content').innerHTML = renderChannelModel(_ni, _acMap, _counts);
        requestAnimationFrame(function() { drawScaleChart(_cols, _counts); redrawIncomeChart(_ni, _acMap); });
      }
    });

    // 滑块事件委托：百分比 + 合计 + 校验 + 保存
    mainEl.addEventListener('input', function(e) {
      var el = e.target.closest('.channel-range');
      if (!el) return;
      var v = parseInt(el.value), cn = el.getAttribute('data-cn'), vt = el.getAttribute('data-vt');
      var row = el.closest('tr'), ss = row.querySelectorAll('.channel-range'), t = 0;
      for (var i = 0; i < ss.length; i++) t += parseInt(ss[i].value) || 0;
      if (t > 100 && v > 1) { v -= t - 100; el.value = v; }
      el.nextElementSibling.textContent = v + '%';
      t = 0; for (i = 0; i < ss.length; i++) t += parseInt(ss[i].value) || 0;
      row.querySelector('td:last-child').textContent = t + '%';
      var p = getActiveProduct();
      if (p && p.channelModel && p.channelModel.ratios[cn]) {
        p.channelModel.ratios[cn][vt] = v;
        window.saveProducts ? window.saveProducts() : null;
      }
      // 联动刷新表格和图表
      refreshChannelTables();
    });

    listEl.addEventListener('click', function(e) {
      const el = e.target.closest('.product-list-item');
      if (!el) return;
      selId = el.getAttribute('data-id');
      selChannel = ''; selK = SCALE_PRESETS[0]; incomeStacked = true;
      listEl.querySelectorAll('.product-list-item').forEach(function(x) { x.classList.toggle('active', x === el); });
      showCalc(el);
    });

    var _labels = Array.from({ length: PAYBACK_MONTHS + 1 }, function(_, i) { return i; });
    var _scaleLabels = Array.from({ length: FORECAST_MONTHS }, function(_, i) { return i + 1; });
    function drawScaleChart(cols, counts) {
      var ds = [];
      cols.forEach(function(c, vi) {
        var data = [];
        for (var m = 1; m <= FORECAST_MONTHS; m++) data.push(counts[m - 1][vi]);
        ds.push(Object.assign({ label: esc(c.v), data: data, borderColor: CHART.C[vi % CHART.C.length], backgroundColor: CHART.F[vi % CHART.F.length] }, CHART_LINE_STYLE));
      });
      CHART.draw('chartScale', ds, _scaleLabels, { min: 1, max: FORECAST_MONTHS }, '发行规模趋势', '', 'line', { stacked: incomeStacked });
    }
    function drawPaybackChart(d) {
      var ds = [];
      d.forEach(function(r, vi) {
        var ni = r.ni != null ? r.ni : 0, ac = r.ac != null ? r.ac : 0, data = [], pm = 0;
        for (var m = 0; m <= PAYBACK_MONTHS; m++) data.push(Math.round(ni * m - ac));
        if (ni > 0) pm = ac <= 0 ? 0 : Math.ceil(ac / ni);
        var pr = data.map(function(_, m) { return m === pm && pm <= PAYBACK_MONTHS ? 4 : 0; });
        ds.push(Object.assign({}, CHART_LINE_STYLE, { label: esc(r.v), data: data, borderColor: CHART.C[vi % CHART.C.length], backgroundColor: CHART.F[vi % CHART.F.length], pointRadius: pr, pointBackgroundColor: CHART.C[vi % CHART.C.length] }));
      });
      CHART.draw('chartPayback', ds, _labels, { min: 0, max: PAYBACK_MONTHS }, '各车型累计收益曲线');
    }

    function redrawIncomeChart(ni, acMap, _counts) {
      ni = ni || getVehicleNetIncome();
      acMap = acMap || getVehicleAcqCost();
      var result = computeIncomeMatrix(ni, acMap, _counts);
      var ds = [];
      result.cols.forEach(function(c, vi) {
        var data = [];
        for (var m = 0; m < FORECAST_MONTHS; m++) data.push(result.matrix[m][vi]);
        ds.push(Object.assign({ label: esc(c.v), data: data, borderColor: CHART.C[vi % CHART.C.length], backgroundColor: CHART.F[vi % CHART.F.length] }, CHART_LINE_STYLE));
      });
      CHART.draw('chartIncome', ds, _scaleLabels, { min: 1, max: FORECAST_MONTHS }, '累计净收入趋势', '', 'line', { stacked: incomeStacked });
    }

    bindTabs({ container: mainEl, navSel: '.product-sub-tab', panelSel: '.product-sub-panel', attr: 'data-sub', prefix: 'unit-sub-', scope: mainEl });
    mainEl.addEventListener('click', function(e) {
      var btn = e.target.closest('.product-sub-tab');
      if (!btn) return;
      var row = document.getElementById('kPresetGroup');
      if (row) row.style.display = btn.getAttribute('data-sub') === 'single' ? 'none' : 'flex';
    });

    document.getElementById('tabNav').addEventListener('click', function(e) {
      const b = e.target.closest('button[data-tab]');
      if (b && b.getAttribute('data-tab') === 'unit' && b.classList.contains('active')) {
        var st = window.getProducts ? window.getProducts() : {};
        selId = st.activeId;
        renderList();
      }
    });

    document.getElementById('btnExportUnitExcel').addEventListener('click', exportToExcel);

    function exportToExcel() {
      var ps = (window.getProducts ? window.getProducts() : { products: [] }).products;
      if (!ps.length) { alert('暂无方案可导出'); return; }

      var vehicles = getVehicleTypes();
      var lookup = buildTollLookup();
      var vehMap = buildVehMap();
      var wb = XLSX.utils.book_new();

      function pushMonthly(data, rows) {
        for (var m = 1; m <= FORECAST_MONTHS; m++) {
          var vals = data[m - 1], row = ['第' + m + '个月'], t = 0;
          for (var vi = 0; vi < vals.length; vi++) { t += vals[vi]; row.push(vals[vi]); }
          row.push(t); rows.push(row);
        }
        rows.push([]);
      }

      ps.forEach(function(p) {
        var sheetName = (p.name || '未命名').replace(/[:\/\\\*\?\[\]]/g, '').slice(0, 31);
        var rows = [];
        var ctItems = (p.customer && p.customer.items) || {};
        var ops = p.operations || {};
        var chItems = (p.channel && p.channel.items) || [];

        // ── 单车模型 ──
        rows.push(['单车模型']);
        rows.push(SINGLE_COLS);
        var r2 = function(n) { return n != null ? Math.round(n * 100) / 100 : ''; };
        vehicles.forEach(function(v) {
          var toll = lookupToll(v, lookup);
          var days = lookupDays(v, lookup);
          var sf = calcServiceFee(toll, days, ctItems[vehMap[v] || v] || []);
          var sc = calcSettleCost(toll, ops.settlement || []);
          var ni = (sf != null && sc != null) ? sf - sc : null;
          var ac = calcAcqCost(ops.acquisition || [], chItems, ctItems, v);
          rows.push([v, toll, days,
            r2(sf), r2(sc), r2(ni), r2(ni * 12), r2(ni * 24), r2(ni * 36),
            r2(ac), r2(ni * 36 - ac),
            ni > 0 ? (ac <= 0 ? '<1个月' : Math.ceil(ac / ni) + '个月') : '—'
          ]);
        });

        rows.push([]);

        // ── 渠道占比 ──
        rows.push(['渠道占比']);
        var chHeader = ['渠道'].concat(vehicles).concat(['合计']);
        rows.push(chHeader);
        chItems.forEach(function(ch) {
          var row = [ch.name || ''];
          var total = 0;
          vehicles.forEach(function(v) {
            var val = (ch[v] != null && ch[v] !== '') ? +ch[v] : 0;
            row.push(val);
            total += val;
          });
          row.push(total);
          rows.push(row);
        });

        rows.push([]);

        // ── 渠道模型 — 发行规模 & 累计净收入（逻辑斯蒂，K=selK, k=0.5, t₀=6） ──
        var niMap = {}, acMap = {};
        vehicles.forEach(function(v) {
          var toll = lookupToll(v, lookup);
          var days = lookupDays(v, lookup);
          var sf = calcServiceFee(toll, days, ctItems[vehMap[v] || v] || []);
          var sc = calcSettleCost(toll, ops.settlement || []);
          niMap[v] = (sf != null && sc != null) ? sf - sc : 0;
          acMap[v] = calcAcqCost(ops.acquisition || [], chItems, ctItems, v);
        });

        var CM_K = selK;
        chItems.forEach(function(ch) {
          var cn = ch.name || '未命名渠道';
          var cr = (p.channelModel && p.channelModel.ratios && p.channelModel.ratios[cn]) || {};
          var cols = [];
          vehicles.forEach(function(v) { cols.push({ v: v, pct: cr[v] || 0 }); });

          // 发行规模（复用 buildMonthlyCounts + logistic）
          rows.push(['渠道模型 — ' + cn + ' 发行规模 (K=' + (CM_K >= 1e4 ? (CM_K / 1e4) + '万' : CM_K) + ')']);
          var hdr = ['月份'].concat(vehicles).concat(['合计']);
          rows.push(hdr);
          var counts = buildMonthlyCounts(cols);
          pushMonthly(counts, rows);

          // 累计净收入（复用 computeIncomeMatrix，与页面公式一致）
          rows.push(['渠道模型 — ' + cn + ' 累计净收入']);
          rows.push(hdr);
          var result = computeIncomeMatrix(niMap, acMap, counts, cr);
          pushMonthly(result.matrix, rows);
        });

        // ── 毛利模型（复用 computeIncomeMatrix，取第一个渠道） ──
        if (chItems.length) {
          var firstCr = (p.channelModel && p.channelModel.ratios && p.channelModel.ratios[chItems[0].name]) || {};
          var mCols = []; vehicles.forEach(function(v) { mCols.push({ v: v, pct: firstCr[v] || 0 }); });
          var mCounts = buildMonthlyCounts(mCols);
          var mResult = computeIncomeMatrix(niMap, acMap, mCounts, firstCr);
          rows.push(['毛利模型']);
          rows.push(['车型', '车辆数', '单车3年毛利', 'Y1净收入', 'Y2净收入(95%)', 'Y3净收入(90%)', '3年总毛利']);
          vehicles.forEach(function(v, vi) {
            var stock = mCounts[FORECAST_MONTHS - 1][vi];
            var y1 = mResult.matrix[FORECAST_MONTHS - 1] ? mResult.matrix[FORECAST_MONTHS - 1][vi] : 0;
            var y2 = Math.round(stock * RETENTION_Y2 * (niMap[v] || 0) * 12);
            var y3 = Math.round(stock * RETENTION_Y3 * (niMap[v] || 0) * 12);
            var per3y = Math.round((niMap[v] || 0) * 36 - (acMap[v] || 0));
            rows.push([v, stock, per3y, y1, y2, y3, y1 + y2 + y3]);
          });
          rows.push([]);
        }

        // ── 运营成本 ──
        [{ label: '结算成本', data: ops.settlement }, { label: '获客成本', data: ops.acquisition }].forEach(function(g) {
          rows.push(['运营成本 — ' + g.label]);
          rows.push(['项目', '计费单位', '金额/费率', '说明']);
          (g.data || []).forEach(function(it) { rows.push([it.name || '', it.unit || '', it.value || '', it.desc || '']); });
          rows.push([]);
        });

        var ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
      });

      XLSX.writeFile(wb, '运输服务收益测算导出.xlsx');
    }

    renderList();
  })();
</script>
</html>
