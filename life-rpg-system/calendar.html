    <script>
        // 数据存储
        let adminData = {
            tags: [],
            landmarks: [],
            landmarkQuests: {},
            questLevels: {},
            calendarEntries: {},
            checkpointCompletions: {}
        };

        // 状态
        let currentDate = new Date();
        let currentView = localStorage.getItem('lifeRpgCurrentView') || 'month';
        let draggedCheckpoint = null;
        let selectedDate = null;
        let editingEntryId = null;

        // ============================================
        // 地标选择状态 - 新增
        // ============================================
        let selectedLandmarkId = localStorage.getItem('lifeRpgSelectedLandmarkId') || null;

        /**
         * 获取选中的地标ID
         */
        function getSelectedLandmarkId() {
            return selectedLandmarkId;
        }

        /**
         * 设置选中的地标
         */
        function setSelectedLandmarkId(landmarkId) {
            selectedLandmarkId = landmarkId;
            localStorage.setItem('lifeRpgSelectedLandmarkId', landmarkId || '');
            console.log('[Landmark] Selected:', landmarkId);
        }

        /**
         * 获取指定地标下的所有检查项（扁平化）
         */
        function getCheckpointsByLandmark(landmarkId) {
            if (!landmarkId) return [];

            const checkpoints = [];
            const quests = adminData.landmarkQuests[landmarkId] || [];

            quests.forEach(quest => {
                const levels = adminData.questLevels[quest.id] || [];
                levels.forEach(level => {
                    (level.checkpoints || []).forEach(cp => {
                        checkpoints.push({
                            ...cp,
                            levelId: level.id,
                            questId: quest.id,
                            landmarkId: landmarkId,
                            levelName: level.name,
                            questName: quest.name,
                            landmarkName: getLandmarkName(landmarkId)
                        });
                    });
                });
            });

            return checkpoints;
        }

        /**
         * 获取指定地标在指定日期的日历条目
         */
        function getLandmarkCalendarEntries(landmarkId, dateStr) {
            const allEntries = adminData.calendarEntries[dateStr] || [];
            if (!landmarkId) return allEntries;

            // 获取该地标下的所有检查项ID
            const landmarkCheckpoints = getCheckpointsByLandmark(landmarkId);
            const checkpointIds = new Set(landmarkCheckpoints.map(cp => cp.id));

            return allEntries.filter(entry => checkpointIds.has(entry.checkpointId));
        }

        /**
         * 获取所有日期中指定地标的日历条目
         */
        function getAllCalendarEntriesForLandmark(landmarkId) {
            if (!landmarkId) return adminData.calendarEntries;

            const result = {};
            const landmarkCheckpoints = getCheckpointsByLandmark(landmarkId);
            const checkpointIds = new Set(landmarkCheckpoints.map(cp => cp.id));

            Object.keys(adminData.calendarEntries).forEach(dateStr => {
                const entries = adminData.calendarEntries[dateStr].filter(
                    entry => checkpointIds.has(entry.checkpointId)
                );
                if (entries.length > 0) {
                    result[dateStr] = entries;
                }
            });

            return result;
        }

        /**
         * 地标选择器变化处理
         */
        function onLandmarkSelectChange(landmarkId) {
            if (landmarkId) {
                switchLandmark(landmarkId);
            }
        }

        /**
         * 更新地标选择器选项
         */
        function updateLandmarkSelect() {
            const select = document.getElementById('landmarkSelect');
            if (!select) return;

            const currentValue = select.value;
            const landmarks = adminData.landmarks || [];

            // 只生成地标选项（不包含"全部地标"）
            let html = '';
            landmarks.forEach(landmark => {
                const selected = landmark.id === currentValue ? 'selected' : '';
                html += `<option value="${landmark.id}" ${selected}>${landmark.icon} ${LifeRPG.security.escapeHtml(landmark.name)}</option>`;
            });

            select.innerHTML = html;

            // 如果没有选中任何地标，默认选中第一个
            if (!selectedLandmarkId && landmarks.length > 0) {
                setSelectedLandmarkId(landmarks[0].id);
            }

            // 恢复选中状态
            if (selectedLandmarkId) {
                select.value = selectedLandmarkId;
            }
        }

        /**
         * 切换地标并刷新所有视图
         */
        function switchLandmark(landmarkId) {
            if (!landmarkId) return;

            setSelectedLandmarkId(landmarkId);

            // 更新选择器显示
            const select = document.getElementById('landmarkSelect');
            if (select) {
                select.value = landmarkId;
            }

            // 刷新所有视图（根据当前视图类型）
            renderScrollArchive();
            if (currentView === 'year') {
                renderYearMatrix();
            } else {
                renderChamberGrid(); // 内部会根据 currentView 渲染周视图或月视图
            }
            updateStats();

            showToast(`已切换到：${getLandmarkName(landmarkId)}`, 'success');
        }

        /**
         * 获取地标名称
         */
        function getLandmarkName(landmarkId) {
            const landmark = (adminData.landmarks || []).find(l => l.id === landmarkId);
            return landmark ? landmark.name : '未知地标';
        }

        // ============================================
        // 条带拖动状态管理 - 有限状态机
        // ============================================
        const DragMode = {
            NONE: 'none',
            REORDER: 'reorder',      // 条带排序
            CROSS_CELL: 'crossCell'  // 跨格子拖动
        };

        const dragState = {
            mode: DragMode.NONE,
            intent: null, // 'vertical' | 'horizontal' | null
            draggedStripe: null,
            ghostElement: null, // 幽灵元素（跨格子拖拽时使用）
            startX: 0,
            startY: 0,
            startLevel: 0,
            rowStripesContainer: null,
            sourceRowIndex: null,
            dropIndicator: null,
            targetLevel: null,
            currentRowIndex: null, // 当前悬停的行

            // 重置状态
            reset() {
                this.mode = DragMode.NONE;
                this.intent = null;
                this.draggedStripe = null;
                this.ghostElement = null;
                this.startX = 0;
                this.startY = 0;
                this.startLevel = 0;
                this.rowStripesContainer = null;
                this.sourceRowIndex = null;
                this.dropIndicator = null;
                this.targetLevel = null;
                this.currentRowIndex = null;
            },

            // 检查是否正在拖动
            get isActive() {
                return this.mode !== DragMode.NONE;
            }
        };

        // 兼容旧代码的别名
        let stripeDragState = dragState;

        /**
         * 初始化
         */
        // 周末折叠状态
        let isWeekendCollapsed = localStorage.getItem('lifeRpgWeekendCollapsed') === 'true';

        /**
         * 切换周末显示/隐藏
         */
        function toggleWeekend() {
            isWeekendCollapsed = !isWeekendCollapsed;
            localStorage.setItem('lifeRpgWeekendCollapsed', isWeekendCollapsed);
            applyWeekendToggle();
        }

        /**
         * 应用周末折叠状态
         */
        function applyWeekendToggle() {
            const grid = document.getElementById('chamberGrid');
            const btn = document.getElementById('weekendToggleBtn');

            if (isWeekendCollapsed) {
                grid.classList.add('weekend-collapsed');
                btn.classList.remove('active');
                btn.innerHTML = '<span>📅</span><span>显示周末</span>';
            } else {
                grid.classList.remove('weekend-collapsed');
                btn.classList.add('active');
                btn.innerHTML = '<span>📅</span><span>隐藏周末</span>';
            }
            // Grid 布局会自动处理条带位置，无需重新计算
        }

        function init() {
            try {
                loadData();

                // 数据迁移：为历史日历条目补全创建时间（已执行完毕，可注释掉）
                // migrateCalendarEntries();

                // 如果没有选中的地标，默认选中第一个
                if (!selectedLandmarkId && adminData.landmarks && adminData.landmarks.length > 0) {
                    setSelectedLandmarkId(adminData.landmarks[0].id);
                }

                renderScrollArchive();
                // 设置视图按钮的active状态
                updateViewButtons();

                // 根据当前视图渲染对应内容
                const chamberGrid = document.getElementById('chamberGrid');
                const yearMatrix = document.getElementById('yearMatrix');
                const timeSanctum = document.querySelector('.time-sanctum');

                if (currentView === 'year') {
                    if (chamberGrid) chamberGrid.style.display = 'none';
                    if (yearMatrix) {
                        yearMatrix.style.display = 'block';
                        renderYearMatrix();
                    }
                    if (timeSanctum) timeSanctum.classList.add('year-view-active');
                } else {
                    if (chamberGrid) chamberGrid.style.display = '';
                    if (yearMatrix) yearMatrix.style.display = 'none';
                    if (timeSanctum) timeSanctum.classList.remove('year-view-active');
                    renderChamberGrid();
                }

                updateStats();
                bindModalEvents();
                applyWeekendToggle();
                // Grid 布局会自动适应窗口大小，无需监听 resize
            } catch (error) {
                console.error('初始化失败:', error);
            }
        }

        /**
         * 更新视图按钮的active状态
         */
        function updateViewButtons() {
            document.querySelectorAll('.view-glyphs .glyph-btn').forEach(btn => {
                btn.classList.remove('active');
                const onclickAttr = btn.getAttribute('onclick');
                if (onclickAttr && onclickAttr.includes(`switchView('${currentView}')`)) {
                    btn.classList.add('active');
                }
            });
        }



        /**
         * 绑定弹窗事件
         */
        function bindModalEvents() {
            const modal = document.getElementById('scrollModal');
            if (modal) {
                LifeRPG.events.add(modal, 'click', function(e) {
                    if (e.target === this) closeModal();
                });
            }
        }

        /**
         * 加载数据
         */
        function loadData() {
            try {
                const savedData = LifeRPG.data.load();
                if (savedData) {
                    adminData = {
                        ...adminData,
                        ...savedData
                    };
                    if (!adminData.calendarEntries) adminData.calendarEntries = {};
                    if (!adminData.checkpointCompletions) adminData.checkpointCompletions = {};
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        /**
         * 数据迁移：为历史日历条目补全创建时间
         */
        function migrateCalendarEntries() {
            try {
                let migratedCount = 0;
                const entries = adminData.calendarEntries || {};

                Object.keys(entries).forEach(dateStr => {
                    entries[dateStr].forEach(entry => {
                        if (!entry.createdAt) {
                            // 如果没有创建时间，使用日期字符串作为近似时间
                            entry.createdAt = new Date(dateStr + 'T09:00:00').toISOString();
                            migratedCount++;
                        }
                    });
                });

                if (migratedCount > 0) {
                    saveData();
                    console.log(`[Migrate] 已为 ${migratedCount} 条历史日历条目补全创建时间`);
                }
            } catch (error) {
                console.error('数据迁移失败:', error);
            }
        }

        /**
         * 清空所有日历数据（调试用）
         */
        function clearAllCalendarData() {
            try {
                adminData.calendarEntries = {};
                adminData.checkpointCompletions = {};
                saveData();
                renderChamberGrid();
                renderScrollArchive();
                updateStats();
                console.log('✓ 所有日历数据已清空');
                alert('所有数据已清空，请刷新页面');
            } catch (error) {
                console.error('清空数据失败:', error);
            }
        }

        /**
         * 导出所有数据到CSV
         * 包含：地标、任务、关卡、检查项、日历条目、待办项
         */
        function exportToCSV() {
            try {
                const rows = [];
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');

                // CSV 头部
                rows.push([
                    '数据类型',
                    '地标ID', '地标名称', '地标图标',
                    '任务ID', '任务名称',
                    '关卡ID', '关卡名称',
                    '检查项ID', '检查项名称', '检查项完成状态',
                    '日期', '开始时间', '持续时间(分钟)',
                    '日历条目ID', '日历条目描述',
                    '待办项内容', '待办项完成状态',
                    '创建时间', '更新时间'
                ].map(escapeCSV).join(','));

                // 遍历所有地标
                (adminData.landmarks || []).forEach(landmark => {
                    const quests = adminData.landmarkQuests[landmark.id] || [];

                    quests.forEach(quest => {
                        const levels = adminData.questLevels[quest.id] || [];

                        levels.forEach(level => {
                            (level.checkpoints || []).forEach(cp => {
                                // 基础行数据（不含日历条目）
                                const baseRow = {
                                    dataType: '检查项',
                                    landmarkId: landmark.id,
                                    landmarkName: landmark.name,
                                    landmarkIcon: landmark.icon,
                                    questId: quest.id,
                                    questName: quest.name,
                                    levelId: level.id,
                                    levelName: level.name,
                                    checkpointId: cp.id,
                                    checkpointName: cp.name,
                                    checkpointCompleted: cp.completed ? '是' : '否'
                                };

                                // 查找该检查项的所有日历条目
                                let hasCalendarEntry = false;
                                Object.keys(adminData.calendarEntries || {}).forEach(dateStr => {
                                    const entries = adminData.calendarEntries[dateStr];
                                    entries.forEach(entry => {
                                        if (entry.checkpointId === cp.id) {
                                            hasCalendarEntry = true;
                                            const todos = entry.description ? markdownToTodos(entry.description) : [];

                                            if (todos.length === 0) {
                                                // 没有待办项，输出一行
                                                rows.push([
                                                    '日历条目',
                                                    baseRow.landmarkId, baseRow.landmarkName, baseRow.landmarkIcon,
                                                    baseRow.questId, baseRow.questName,
                                                    baseRow.levelId, baseRow.levelName,
                                                    baseRow.checkpointId, baseRow.checkpointName, baseRow.checkpointCompleted,
                                                    dateStr, entry.startTime || '', entry.duration || '',
                                                    entry.id || '', entry.description || '',
                                                    '', '', // 无待办项
                                                    entry.createdAt || '', entry.updatedAt || ''
                                                ].map(escapeCSV).join(','));
                                            } else {
                                                // 有待办项，每个待办输出一行
                                                todos.forEach(todo => {
                                                    rows.push([
                                                        '日历条目',
                                                        baseRow.landmarkId, baseRow.landmarkName, baseRow.landmarkIcon,
                                                        baseRow.questId, baseRow.questName,
                                                        baseRow.levelId, baseRow.levelName,
                                                        baseRow.checkpointId, baseRow.checkpointName, baseRow.checkpointCompleted,
                                                        dateStr, entry.startTime || '', entry.duration || '',
                                                        entry.id || '', entry.description || '',
                                                        todo.text, todo.completed ? '是' : '否',
                                                        entry.createdAt || '', entry.updatedAt || ''
                                                    ].map(escapeCSV).join(','));
                                                });
                                            }
                                        }
                                    });
                                });

                                // 如果没有日历条目，输出检查项基本信息
                                if (!hasCalendarEntry) {
                                    rows.push([
                                        baseRow.dataType,
                                        baseRow.landmarkId, baseRow.landmarkName, baseRow.landmarkIcon,
                                        baseRow.questId, baseRow.questName,
                                        baseRow.levelId, baseRow.levelName,
                                        baseRow.checkpointId, baseRow.checkpointName, baseRow.checkpointCompleted,
                                        '', '', '', '', '', '', '', '', '', ''
                                    ].map(escapeCSV).join(','));
                                }
                            });
                        });
                    });
                });

                // 添加原始数据结构摘要（作为注释行）
                rows.push(''); // 空行
                rows.push('# 原始数据结构摘要');
                rows.push(['数据类型', '记录数'].map(escapeCSV).join(','));
                rows.push(['landmarks', (adminData.landmarks || []).length].map(escapeCSV).join(','));
                rows.push(['landmarkQuests', Object.keys(adminData.landmarkQuests || {}).length].map(escapeCSV).join(','));
                rows.push(['questLevels', Object.keys(adminData.questLevels || {}).length].map(escapeCSV).join(','));
                rows.push(['calendarEntries', Object.keys(adminData.calendarEntries || {}).length].map(escapeCSV).join(','));
                rows.push(['checkpointCompletions', Object.keys(adminData.checkpointCompletions || {}).length].map(escapeCSV).join(','));

                // 生成并下载CSV文件
                const csvContent = '\uFEFF' + rows.join('\n'); // BOM for Excel
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `life-rpg-export-${timestamp}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showToast(`已导出 ${rows.length - 8} 条记录到CSV`, 'success');
                console.log('[Export] CSV exported:', rows.length - 8, 'rows');
            } catch (error) {
                console.error('导出CSV失败:', error);
                showToast('导出失败：' + error.message, 'error');
            }
        }

        /**
         * 转义CSV字段
         */
        function escapeCSV(value) {
            if (value === null || value === undefined) return '';
            const str = String(value);
            // 如果包含逗号、引号或换行，需要用引号包裹并转义内部引号
            if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
                return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
        }

        /**
         * 保存数据
         */
        function saveData() {
            try {
                LifeRPG.data.save(adminData);
            } catch (error) {

        /**
         * 根据 checkpointId 查找完整的层级信息（地标 → 任务 → 关卡 → 检查项）
         * @param {string} checkpointId - 检查项ID
         * @returns {Object|null} - { levelId, levelName, questId, questName, landmarkId, landmarkName, checkpointName } 或 null
         */
        function getCheckpointHierarchy(checkpointId) {
            if (!checkpointId) return null;

            // 遍历所有地标
            const landmarks = adminData.landmarks || [];
            for (const landmark of landmarks) {
                const quests = adminData.landmarkQuests[landmark.id] || [];
                for (const quest of quests) {
                    const levels = adminData.questLevels[quest.id] || [];
                    for (const level of levels) {
                        const checkpoint = level.checkpoints?.find(cp => cp.id === checkpointId);
                        if (checkpoint) {
                            return {
                                levelId: level.id,
                                levelName: level.name,
                                questId: quest.id,
                                questName: quest.name,
                                landmarkId: landmark.id,
                                landmarkName: landmark.name,
                                checkpointName: checkpoint.name
                            };
                        }
                    }
                }
            }
            return null;
        }

        /**
         * 通过检查项名称和关卡/任务ID在关卡数据中查找正确的检查项ID
         * @param {string} name - 检查项名称
         * @param {string} levelId - 关卡ID（可选）
         * @param {string} questId - 任务ID（可选）
         * @returns {string|null} - 找到的检查项ID，或 null
         */
        function findCheckpointIdByName(name, levelId, questId) {
            if (!name) return null;

            const landmarks = adminData.landmarks || [];
            for (const landmark of landmarks) {
                const quests = adminData.landmarkQuests[landmark.id] || [];
                for (const quest of quests) {
                    // 如果指定了questId，跳过不匹配的任务
                    if (questId && String(quest.id) !== String(questId)) continue;

                    const levels = adminData.questLevels[quest.id] || [];
                    for (const level of levels) {
                        // 如果指定了levelId，跳过不匹配的关卡
                        if (levelId && String(level.id) !== String(levelId)) continue;

                        const checkpoint = level.checkpoints?.find(cp => cp.name === name);
                        if (checkpoint) {
                            return checkpoint.id;
                        }
                    }
                }
            }
            return null;
        }

        /**
         * 在整个关卡数据中通过名称模糊匹配查找检查项ID
         * @param {string} name - 检查项名称
         * @returns {string|null} - 找到的检查项ID，或 null
         */
        function findCheckpointIdByNameInAllLevels(name) {
            if (!name) return null;

            const landmarks = adminData.landmarks || [];
            for (const landmark of landmarks) {
                const quests = adminData.landmarkQuests[landmark.id] || [];
                for (const quest of quests) {
                    const levels = adminData.questLevels[quest.id] || [];
                    for (const level of levels) {
                        const checkpoint = level.checkpoints?.find(cp => cp.name === name);
                        if (checkpoint) {
                            return checkpoint.id;
                        }
                    }
                }
            }
            return null;
        }

        /**
         * 获取检查点的完成历史
         */
        function getCheckpointHistory(checkpointId) {
            return adminData.checkpointCompletions[checkpointId] || [];
        }

        /**
         * 计算检查项的连续日期段
         * @param {string} checkpointId - 检查点ID
         * @returns {Array} - 连续日期段数组 [{startDate, endDate, duration}, ...]
         */
        function calculateContinuousRanges(checkpointId) {
            const history = getCheckpointHistory(checkpointId);
            if (history.length === 0) return [];

            // 提取所有日期并排序
            const dates = history.map(h => h.date).sort();

            const ranges = [];
            let currentRange = {
                startDate: dates[0],
                endDate: dates[0]
            };

            for (let i = 1; i < dates.length; i++) {
                const prevDate = parseLocalDate(dates[i - 1]);
                const currDate = parseLocalDate(dates[i]);

                // 计算日期差（天数）
                const diffTime = currDate - prevDate;
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays === 1) {
                    // 连续日期，扩展当前段
                    currentRange.endDate = dates[i];
                } else {
                    // 不连续，保存当前段并开始新段
                    currentRange.duration = calculateDuration(currentRange.startDate, currentRange.endDate);
                    ranges.push(currentRange);
                    currentRange = {
                        startDate: dates[i],
                        endDate: dates[i]
                    };
                }
            }

            // 保存最后一个段
            currentRange.duration = calculateDuration(currentRange.startDate, currentRange.endDate);
            ranges.push(currentRange);

            return ranges;
        }

        /**
         * 获取指定日期在连续段中的位置类型
         * @param {string} checkpointId - 检查点ID
         * @param {string} dateStr - 日期字符串
         * @returns {Object} - { type: 'solo'|'start'|'middle'|'end'|'none', range: Object|null, streak: number }
         */
        function getStripePosition(checkpointId, dateStr) {
            const ranges = calculateContinuousRanges(checkpointId);

            for (const range of ranges) {
                if (dateStr >= range.startDate && dateStr <= range.endDate) {
                    const dates = [];
                    let current = parseLocalDate(range.startDate);
                    const end = parseLocalDate(range.endDate);

                    while (current <= end) {
                        dates.push(formatDate(new Date(current)));
                        current.setDate(current.getDate() + 1);
                    }

                    const index = dates.indexOf(dateStr);
                    const total = dates.length;

                    if (total === 1) {
                        return { type: 'solo', range, streak: 1 };
                    } else if (index === 0) {
                        return { type: 'start', range, streak: total };
                    } else if (index === total - 1) {
                        return { type: 'end', range, streak: total };
                    } else {
                        return { type: 'middle', range, streak: total };
                    }
                }
            }

            return { type: 'none', range: null, streak: 0 };
        }

        /**
         * 获取检查点的完成日期（归档日期）
         */
        function getCheckpointArchiveDate(checkpointId) {
            const history = getCheckpointHistory(checkpointId);
            const archived = history.find(h => h.archived);
            return archived ? archived.date : null;
        }

        /**
         * 判断检查项在指定日期的显示状态
         */
        function getEntryStatusForDate(checkpointId, dateStr) {
            const history = getCheckpointHistory(checkpointId);
            const currentRecord = history.find(h => h.date === dateStr);
            const archivedRecord = history.find(h => h.archived);

            if (currentRecord && currentRecord.archived) {
                return 'archive-day';
            }

            if (archivedRecord) {
                const entryTime = parseLocalDate(dateStr).getTime();
                const archiveTime = parseLocalDate(archivedRecord.date).getTime();

                if (entryTime < archiveTime) return 'before-archive';
                if (entryTime === archiveTime) return 'archive-day';
                return 'no-archive';
            }

            return 'no-archive';
        }

        /**
         * 计算检查项的连续天数（从指定日期往前连续的天数）
         */
        function calculateStreak(checkpointId, dateStr) {
            const history = getCheckpointHistory(checkpointId);
            if (history.length === 0) return 0;

            // 按日期排序
            const sortedDates = history
                .map(h => h.date)
                .sort((a, b) => new Date(b) - new Date(a));

            const targetDate = new Date(dateStr);
            let streak = 0;

            // 检查目标日期是否有记录
            const hasRecordOnTarget = sortedDates.includes(dateStr);
            if (!hasRecordOnTarget) return 0;

            // 从目标日期往前数连续天数
            for (let i = 0; i < 365; i++) {
                const checkDate = new Date(targetDate);
                checkDate.setDate(targetDate.getDate() - i);
                const checkDateStr = formatDate(checkDate);

                if (sortedDates.includes(checkDateStr)) {
                    streak++;
                } else {
                    break;
                }
            }

            return streak;
        }

        /**
         * 高亮显示连续段中的所有条带
         * @param {string} checkpointId - 检查点ID
         * @param {string} startDate - 连续段开始日期
         * @param {string} endDate - 连续段结束日期
         */
        function highlightStreak(checkpointId, startDate, endDate) {
            if (!startDate || !endDate || startDate === endDate) return;

            // 找到同一检查点在同一连续段中的所有条带
            const stripes = document.querySelectorAll(`.checkpoint-stripe[data-cp-id="${checkpointId}"]`);
            stripes.forEach(stripe => {
                const stripeStart = stripe.dataset.streakStart;
                const stripeEnd = stripe.dataset.streakEnd;
                if (stripeStart === startDate && stripeEnd === endDate) {
                    stripe.classList.add('highlight');
                }
            });
        }

        /**
         * 取消高亮所有条带
         */
        function unhighlightStreak() {
            const highlighted = document.querySelectorAll('.checkpoint-stripe.highlight');
            highlighted.forEach(stripe => {
                stripe.classList.remove('highlight');
            });
        }

        /**
         * 根据任务名称获取颜色编码类名
         */
        function getQuestTypeClass(questName) {
            if (!questName) return 'stripe-default';

            const name = questName.toLowerCase();

            // 探索类任务
            if (name.includes('探索') || name.includes('发现') || name.includes('调研') ||
                name.includes('考察') || name.includes('调查') || name.includes('观察')) {
                return 'stripe-quest-explore';
            }

            // 战斗/挑战类任务
            if (name.includes('战斗') || name.includes('挑战') || name.includes('攻克') ||
                name.includes('突破') || name.includes('对抗') || name.includes('竞争')) {
                return 'stripe-quest-battle';
            }

            // 学习/研究类任务
            if (name.includes('学习') || name.includes('研究') || name.includes('阅读') ||
                name.includes('技能') || name.includes('知识') || name.includes('课程')) {
                return 'stripe-quest-study';
            }

            // 健康/运动类任务
            if (name.includes('健康') || name.includes('运动') || name.includes('健身') ||
                name.includes('锻炼') || name.includes('体能') || name.includes('养生')) {
                return 'stripe-quest-health';
            }

            // 创造/艺术类任务
            if (name.includes('创造') || name.includes('创作') || name.includes('艺术') ||
                name.includes('写作') || name.includes('设计') || name.includes('制作')) {
                return 'stripe-quest-creative';
            }

            return 'stripe-default';
        }

        /**
         * 渲染卷轴库（左侧）
         */
        function renderScrollArchive() {
            try {
                const container = document.getElementById('scrollCollection');
                if (!container) return;

                // 更新地标选择器
                updateLandmarkSelect();

                let html = '';

                // 获取选中的地标ID
                const selectedId = getSelectedLandmarkId();

                // 只渲染选中的地标（不再显示地标标题）
                if (selectedId) {
                    const landmark = (adminData.landmarks || []).find(l => l.id === selectedId);
                    if (landmark) {
                        const quests = adminData.landmarkQuests[landmark.id] || [];

                        quests.forEach(quest => {
                            if (!quest.id) {
                                console.warn('[ScrollArchive] quest missing id:', quest);
                                return;
                            }

                            const levels = adminData.questLevels[quest.id] || [];

                            levels.forEach(level => {
                                if (!level.id) {
                                    console.warn('[ScrollArchive] level missing id:', level);
                                    return;
                                }

                                let checkpointHtml = '';

                                level.checkpoints.forEach((cp, idx) => {
                                    if (!cp.id || cp.id === '') {
                                        cp.id = generateId();
                                        saveData();
                                        console.warn('[ScrollArchive] generated missing cp.id:', {
                                            quest: quest.name,
                                            level: level.name,
                                            checkpoint: cp.name,
                                            id: cp.id
                                        });
                                    }

                                    const archiveDate = getCheckpointArchiveDate(cp.id);
                                    const isArchived = !!archiveDate;
                                    const history = getCheckpointHistory(cp.id);
                                    const actualDays = history.length;
                                    const isLevelCheckpointCompleted = cp.completed === true;

                                    let hasUncompletedTodos = false;
                                    if (history.length > 0) {
                                        history.forEach(h => {
                                            const entries = adminData.calendarEntries[h.date] || [];
                                            const entry = entries.find(e => e.checkpointId === cp.id);
                                            if (entry && entry.description) {
                                                const todos = markdownToTodos(entry.description);
                                                if (todos.some(t => !t.completed)) {
                                                    hasUncompletedTodos = true;
                                                }
                                            }
                                        });
                                    }

                                    let statusText = '未开始';
                                    let statusClass = '';
                                    let isCompletedOrArchived = false;

                                    if (isArchived) {
                                        isCompletedOrArchived = true;
                                    } else if (isLevelCheckpointCompleted) {
                                        isCompletedOrArchived = true;
                                    } else if (actualDays > 0 || hasUncompletedTodos) {
                                        statusText = '进行中 ' + actualDays + '天';
                                    }

                                    if (isCompletedOrArchived) return;

                                    checkpointHtml += `
                                        <div class="checkpoint-parchment ${statusClass}"
                                            draggable="true"
                                            data-cp-id="${LifeRPG.security.escapeHtml(cp.id)}"
                                            data-level-id="${LifeRPG.security.escapeHtml(level.id)}"
                                            data-quest-id="${LifeRPG.security.escapeHtml(quest.id)}"
                                            data-cp-name="${LifeRPG.security.escapeHtml(cp.name || '检查点' + (idx + 1))}"
                                            data-landmark="${LifeRPG.security.escapeHtml(landmark.name)}"
                                            data-quest="${LifeRPG.security.escapeHtml(quest.name)}"
                                            data-level="${LifeRPG.security.escapeHtml(level.name)}"
                                            data-days="${actualDays}">
                                            <div class="parchment-text">${LifeRPG.security.escapeHtml(cp.name || '检查点' + (idx + 1))}</div>
                                            <div class="parchment-days">${statusText}</div>
                                        </div>
                                    `;
                                });

                                // 只显示有检查项的关卡
                                if (checkpointHtml) {
                                    html += `
                                        <div class="quest-scroll">
                                            <div class="quest-name">${LifeRPG.security.escapeHtml(quest.name)} › ${LifeRPG.security.escapeHtml(level.name)}</div>
                                            ${checkpointHtml}
                                        </div>
                                    `;
                                }
                            });
                        });
                    }
                }

                container.innerHTML = html || `
                    <div class="empty-archive">
                        <div class="empty-icon">📜</div>
                        <div>暂无卷轴</div>
                        <div style="font-size: 11px; margin-top: 8px;">请先创建关卡</div>
                    </div>
                `;

                bindParchmentDragEvents();
            } catch (error) {
                console.error('渲染卷轴库失败:', error);
            }
        }

        /**

            try {
                const parchments = document.querySelectorAll('.checkpoint-parchment');
                parchments.forEach(p => {
                    LifeRPG.events.add(p, 'dragstart', function(e) {
                        // 优先使用 getCheckpointHierarchy 获取完整层级信息

                        const hierarchy = getCheckpointHierarchy(cpId);

                        draggedCheckpoint = {

                            levelId: hierarchy?.levelId || this.dataset.levelId,

        /**
         * 获取日期待办统计
         * @param {string} dateStr - 日期字符串
         * @returns {Object} - { completed: number, total: number }
         */
        function getDateTodoStats(dateStr) {
            const selectedLandmarkId = getSelectedLandmarkId();
            const entries = getLandmarkCalendarEntries(selectedLandmarkId, dateStr);
            let completed = 0;
            let total = 0;

            entries.forEach(entry => {
                if (entry.description) {
                    const todos = markdownToTodos(entry.description);
                    todos.forEach(todo => {
                        total++;
                        if (todo.completed) completed++;
                    });
                }
            });

            return { completed, total };
        }

        /**

         */
        function renderChamberGrid() {
            try {
                const grid = document.getElementById('chamberGrid');
                if (!grid) return;

                // 根据视图类型渲染不同的内容
                if (currentView === 'week') {

        /**
         * 渲染月视图
         */
        function renderMonthView(grid) {
            try {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

            // 更新标题
            const monthNames = LifeRPG.constants.MONTH_NAMES;
            document.getElementById('chronicleTitle').textContent = `${year}年 ${monthNames[month]}`;

                // 星期标题
                const weekdays = LifeRPG.constants.WEEKDAYS;
                let html = '<div class="weekday-header">';
                html += weekdays.map(d => `<div class="weekday-pillar">${d}</div>`).join('');
                html += '</div>';

                // 日期区域
                html += '<div class="calendar-body">';

                const today = new Date();

                // 获取当月第一天和最后一天
                const firstDayOfMonth = new Date(year, month, 1);
                const lastDayOfMonth = new Date(year, month + 1, 0);

                // 计算当月第一天是周几（周一为0，周日为6）
                const firstDayWeekday = (firstDayOfMonth.getDay() + 6) % 7;

                // 计算需要的行数
                const daysInMonth = lastDayOfMonth.getDate();
                const totalCells = firstDayWeekday + daysInMonth;
                const rowsNeeded = Math.ceil(totalCells / 7);

                // 按行生成日历
                for (let row = 0; row < rowsNeeded; row++) {
                    html += `<div class="calendar-row" data-row="${row}">`;

                    // 先收集每列是否为空
                    const emptyCols = [];
                    for (let col = 0; col < 7; col++) {
                        const cellIndex = row * 7 + col;
                        const dayOffset = cellIndex - firstDayWeekday;
                        const date = new Date(year, month, dayOffset + 1);
                        if (date.getMonth() !== month) {
                            emptyCols.push(col);
                        }
                    }

                    for (let col = 0; col < 7; col++) {
                        const cellIndex = row * 7 + col;
                        const dayOffset = cellIndex - firstDayWeekday;
                        const date = new Date(year, month, dayOffset + 1);

                        // 只显示当月日期
                        if (date.getMonth() !== month) {
                            // 非当月日期显示为空格子
                            html += `<div class="time-chamber empty" data-index="${cellIndex}" data-col="${col}"></div>`;
                            continue;
                        }

                        const isToday = date.toDateString() === today.toDateString();
                        const dateStr = formatDate(date);

                        // 计算当日待办统计
                        const todoStats = getDateTodoStats(dateStr);
                        const statsHtml = todoStats.total > 0
                            ? `<span class="chamber-stats" title="已完成/总待办">${todoStats.completed === todoStats.total ? '🎉 ' : ''}${todoStats.completed}/${todoStats.total}</span>`
                            : '';

                        html += `
                            <div class="time-chamber ${isToday ? 'today' : ''}"
                                data-date="${dateStr}" data-index="${cellIndex}" data-col="${col}">
                                <div class="chamber-date">
                                    <span>${date.getDate()}</span>
                                    ${statsHtml}
                                </div>
                            </div>
                        `;
                    }

                    // 条带容器 - 放在行内，标记空列
                    const emptyColsAttr = emptyCols.length > 0 ? `data-empty-cols="${emptyCols.join(',')}"` : '';
                    html += `<div class="row-stripes" data-row="${row}" ${emptyColsAttr}></div>`;
                    html += `</div>`; // 结束 calendar-row
                }

                html += '</div>'; // 结束 calendar-body

                grid.setAttribute('data-rows', rowsNeeded.toString());
                grid.innerHTML = html;
                grid.className = 'chamber-grid';

                // 渲染检查点条带
                renderCheckpointStripes(grid, year, month, firstDayWeekday, daysInMonth);

                bindChamberDragEvents();
            } catch (error) {
                console.error('渲染月视图失败:', error);
            }
        }

        /**
         * 渲染年视图矩阵
         * 展示关卡名称，多日连续任务用绝对定位条带展示
         */
        function renderYearMatrix() {
            try {
                const year = currentDate.getFullYear();
                document.getElementById('chronicleTitle').textContent = `${year}年`;

                const headerContainer = document.getElementById('yearMatrixHeader');
                const bodyContainer = document.getElementById('yearMatrixBody');

                if (!headerContainer || !bodyContainer) return;

                // 渲染表头（1-31日）
                let headerHtml = '<div style="width: 36px; flex-shrink: 0;"></div>';
                for (let day = 1; day <= 31; day++) {
                    headerHtml += `<div class="year-matrix-day-header">${day}</div>`;
                }
                headerContainer.innerHTML = headerHtml;

                // 获取选中的地标ID
                const selectedLandmarkId = getSelectedLandmarkId();
                let allowedCheckpointIds = null;
                if (selectedLandmarkId) {
                    const landmarkCheckpoints = getCheckpointsByLandmark(selectedLandmarkId);
                    allowedCheckpointIds = new Set(landmarkCheckpoints.map(cp => cp.id));
                }

                // 收集所有任务（按关卡分组）
                const levelTasks = new Map();

                Object.keys(adminData.calendarEntries || {}).forEach(dateStr => {
                    const entries = adminData.calendarEntries[dateStr];
                    entries.forEach(entry => {
                        if (allowedCheckpointIds && !allowedCheckpointIds.has(entry.checkpointId)) {
                            return;
                        }

                        const hierarchy = getCheckpointHierarchy(entry.checkpointId);
                        if (!hierarchy) return;

                        const levelId = hierarchy.levelId;
                        const levelName = hierarchy.levelName;

                        if (!levelTasks.has(levelId)) {
                            levelTasks.set(levelId, {
                                name: levelName,
                                dates: new Set()
                            });
                        }
                        levelTasks.get(levelId).dates.add(dateStr);
                    });
                });

                // 渲染12个月
                let bodyHtml = '';
                for (let month = 1; month <= 12; month++) {
                    const daysInMonth = new Date(year, month, 0).getDate();

                    // 收集该月的任务
                    const monthTasks = [];
                    levelTasks.forEach((task, levelId) => {
                        const monthDates = [...task.dates].filter(dateStr => {
                            const date = new Date(dateStr);
                            return date.getFullYear() === year && date.getMonth() + 1 === month;
                        }).sort();

                        if (monthDates.length > 0) {
                            monthTasks.push({
                                levelId,
                                name: task.name,
                                dates: monthDates
                            });
                        }
                    });

                    bodyHtml += '<div class="year-matrix-row">';
                    bodyHtml += `<div class="year-matrix-month-label">${month}月</div>`;
                    bodyHtml += '<div class="year-matrix-cells">';

                    if (monthTasks.length === 0) {
                        // 该月无任务，渲染背景格子行
                        bodyHtml += '<div class="year-matrix-task-row">';
                        for (let day = 1; day <= 31; day++) {
                            if (day <= daysInMonth) {
                                bodyHtml += '<div class="year-matrix-cell"></div>';
                            } else {
                                bodyHtml += '<div class="year-matrix-cell" style="visibility: hidden;"></div>';
                            }
                        }
                        bodyHtml += '</div>';
                    } else {
                        // 有任务，只为每个任务创建行容器（不显示背景格子行）
                        monthTasks.forEach((task) => {
                            // 计算连续日期段
                            const segments = [];
                            let startDay = null;
                            let prevDay = null;

                            task.dates.forEach(dateStr => {
                                const day = parseInt(dateStr.split('-')[2]);
                                if (startDay === null) {
                                    startDay = day;
                                    prevDay = day;
                                } else if (day === prevDay + 1) {
                                    prevDay = day;
                                } else {
                                    segments.push({ start: startDay, end: prevDay });
                                    startDay = day;
                                    prevDay = day;
                                }
                            });
                            if (startDay !== null) {
                                segments.push({ start: startDay, end: prevDay });
                            }

                            // 创建任务行容器
                            bodyHtml += '<div class="year-matrix-task-row">';

                            // 为每个连续段渲染条带
                            segments.forEach(segment => {
                                const startPercent = ((segment.start - 1) / 31) * 100;
                                const endPercent = (segment.end / 31) * 100;
                                const widthPercent = endPercent - startPercent;

                                bodyHtml += `
                                    <div class="year-matrix-task-bar"
                                         style="left: ${startPercent}%; width: calc(${widthPercent}% - 2px);"
                                         title="${task.name}: ${month}月${segment.start}日-${segment.end}日">
                                        ${task.name}
                                    </div>
                                `;
                            });

                            bodyHtml += '</div>';
                        });
                    }

                    bodyHtml += '</div></div>';
                }

                bodyContainer.innerHTML = bodyHtml;
                console.log('[YearView] Rendered', 12, 'months');
            } catch (error) {
                console.error('渲染年视图失败:', error);
            }
        }

        /**
         * 渲染周视图
         */
        function renderWeekView() {
            const grid = document.getElementById('chamberGrid');
            if (!grid) return;

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const today = new Date();

            // 计算本周周一的日期
            const dayOfWeek = currentDate.getDay(); // 0=周日, 1=周一, ..., 6=周六
            const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
            const monday = new Date(currentDate);
            monday.setDate(currentDate.getDate() + diff);

            // 更新标题
            const weekEnd = new Date(monday);
            weekEnd.setDate(monday.getDate() + 6);
            document.getElementById('chronicleTitle').textContent =
                `${monday.getMonth() + 1}月${monday.getDate()}日 - ${weekEnd.getMonth() + 1}月${weekEnd.getDate()}日`;

            // 生成本周日期数组
            const weekDays = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                weekDays.push({
                    date: formatDate(date),
                    dayName: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'][i],
                    isToday: formatDate(date) === formatDate(today)
                });
            }

            // 时间轴刻度（9:00 - 18:00，每小时一个刻度）
            const timeSlots = [];
            for (let hour = 9; hour <= 18; hour++) {
                timeSlots.push({
                    time: `${hour}:00`,
                    hour: hour,
                    isLunchBreak: hour === 12
                });
            }

            // 构建周视图HTML
            let html = '<div class="week-view-header">';
            html += '<div class="time-axis-label"></div>'; // 左上角空白
            weekDays.forEach(day => {
                const todayClass = day.isToday ? 'today' : '';
                html += `
                    <div class="week-day-column ${todayClass}" data-date="${day.date}">
                        <div class="week-day-header">
                            <div class="week-day-name">${day.dayName}</div>
                            <div class="week-day-date">${day.date.slice(5)}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            // 周视图内容区域
            html += '<div class="week-view-body">';

            // 时间轴
            html += '<div class="time-axis">';
            timeSlots.forEach(slot => {
                const lunchClass = slot.isLunchBreak ? 'lunch-break' : '';
                html += `<div class="time-slot ${lunchClass}">${slot.time}</div>`;
            });
            html += '</div>';

            // 每一天的内容区
            weekDays.forEach(day => {
                const todayClass = day.isToday ? 'today' : '';
                html += `<div class="week-day-column ${todayClass}" data-date="${day.date}">`;
                html += `<div class="week-day-content" data-date="${day.date}">`;

                // 网格线背景
                html += '<div class="week-grid-lines">';
                timeSlots.forEach(slot => {
                    const lunchClass = slot.isLunchBreak ? 'lunch-break' : '';
                    html += `<div class="week-grid-line ${lunchClass}"></div>`;
                });
                html += '</div>';

                // 渲染该日期的检查点列表
                const dayCheckpoints = renderWeekViewCheckpoints(day.date);
                html += dayCheckpoints;

                html += '</div></div>';
            });

            html += '</div>'; // 结束 week-view-body

            grid.innerHTML = html;
            grid.className = 'week-view-grid';

            // 初始化拖拽和调整大小功能
            initWeekViewDragResize();
        }

        /**
         * 渲染周视图某一天的检查点列表
         * 支持同一时间段的检查项并排显示
         */
        function renderWeekViewCheckpoints(dateStr) {
            // 获取选中的地标ID并过滤条目
            const selectedLandmarkId = getSelectedLandmarkId();
            let entries = adminData.calendarEntries[dateStr] || [];

            if (selectedLandmarkId) {
                const landmarkCheckpoints = getCheckpointsByLandmark(selectedLandmarkId);
                const allowedIds = new Set(landmarkCheckpoints.map(cp => cp.id));
                entries = entries.filter(e => allowedIds.has(e.checkpointId));
            }

            if (entries.length === 0) return '';
            if (entries.length > 0) {
                setTimeout(() => {
                    const dayColumn = document.querySelector(`.week-day-content[data-date="${dateStr}"]`);
                    if (dayColumn) {
                        const stripes = dayColumn.querySelectorAll('.checkpoint-stripe');
                        // Debug: 验证渲染结果
                        if (stripes.length === 0) {
                            console.warn(`[WeekView] No stripes rendered for ${dateStr}`);
                        }
                    }
                }, 100);
            }

            let html = '<div class="week-day-checkpoints">';

            // 准备条目数据
            const entryDataList = entries.map((entry, index) => {
                // 解析时间
                let startTime, duration;
                if (entry.startTime && typeof entry.startTime === 'string' && entry.startTime.includes(':')) {
                    startTime = entry.startTime;
                    duration = entry.duration || 60;
                } else {
                    const orderIndex = entry.order !== undefined ? entry.order : index;
                    const defaultHour = 9 + (orderIndex % 10);
                    startTime = `${defaultHour}:00`;
                    duration = 60;
                    entry.startTime = startTime;
                    entry.duration = duration;
                }

                // 计算时间范围（分钟，从9:00开始）
                const [hour, minute] = startTime.split(':').map(Number);
                const startMinutes = (hour - 9) * 60 + minute;
                const endMinutes = startMinutes + duration;

                // 获取配色
                const checkpointHistory = getCheckpointHistory(entry.checkpointId);
                const stripeClass = getStripeColorByDuration(checkpointHistory.length);

                return {
                    entry,
                    startTime,
                    duration,
                    startMinutes,
                    endMinutes,
                    stripeClass,
                    index
                };
            });

            /**
             * ============================================================
             * 周视图智能布局算法
             * ============================================================
             * 目标：将检查项在时间轴上整齐排列，同一时间重叠的检查项并排显示
             *
             * 核心概念：
             * - 最大并发数(dayMaxCols)：全天任意时刻最多有多少个检查项同时存在
             * - 列索引(colIndex)：检查项在水平方向上的位置（0, 1, 2...）
             * - 时间切片：相邻时间点之间的区间，用于计算并发数
             *
             * 算法步骤：
             * 1. 收集所有检查项的开始和结束时间，排序得到时间点序列
             * 2. 将时间划分为切片，计算每个切片内的活跃检查项数量
             * 3. 找出最大并发数，作为全天统一的列数
             * 4. 按开始时间排序检查项，贪心算法分配列索引
             * 5. 计算每个检查项的位置(left)和宽度(width)
             *
             * 示例（3个检查项在9:00-11:00重叠）：
             *   检查项A: 9:00-11:00
             *   检查项B: 9:30-10:30
             *   检查项C: 10:00-12:00
             *
             *   最大并发数 = 3（10:00-10:30有3个同时存在）
             *   每个检查项宽度 = 100% / 3 = 33.3%
             *   列分配：A=第0列(0%), B=第1列(33.3%), C=第2列(66.7%)
             * ============================================================
             */

            const positionedEntries = [];

            // 预处理：按开始时间排序，开始时间相同则按结束时间排序
            const sortedEntries = [...entryDataList].sort((a, b) => {
                if (a.startMinutes !== b.startMinutes) {
                    return a.startMinutes - b.startMinutes;
                }
                return a.endMinutes - b.endMinutes;
            });

            // ========== 步骤1: 计算全天的时间切片和最大并发数 ==========
            // 收集所有时间点（每个检查项的开始和结束时间）
            const timePoints = new Set();
            sortedEntries.forEach(item => {
                timePoints.add(item.startMinutes);
                timePoints.add(item.endMinutes);
            });
            const sortedTimePoints = Array.from(timePoints).sort((a, b) => a - b);

            // 计算每个时间切片的最大并发数
            // 时间切片 = 相邻两个时间点之间的区间
            const timeSlices = [];
            for (let t = 0; t < sortedTimePoints.length - 1; t++) {
                const sliceStart = sortedTimePoints[t];
                const sliceEnd = sortedTimePoints[t + 1];
                // 找出在该切片内活跃的所有检查项
                const activeEntries = sortedEntries.filter(item =>
                    item.startMinutes < sliceEnd && item.endMinutes > sliceStart
                );
                timeSlices.push({
                    start: sliceStart,
                    end: sliceEnd,
                    activeEntries,
                    maxCols: activeEntries.length
                });
            }

            // 计算全天的最大并发数（用于确定最多需要多少列）
            // 如果全天都没有检查项，默认使用1列
            const dayMaxCols = Math.max(...timeSlices.map(s => s.maxCols), 1);

            // ========== 步骤2: 为每个条目分配列索引 ==========
            // 使用贪心算法：每个检查项尽可能使用最左边的可用列
            // columns[j] 表示第j列当前被占用到的结束时间
            const columns = []; // 每列的结束时间

            // 先为每个条目分配列索引
            const entriesWithColIndex = [];
            sortedEntries.forEach(item => {
                // 找到第一个可用列（该列的结束时间 <= 当前检查项的开始时间）
                let colIndex = -1;
                for (let j = 0; j < columns.length; j++) {
                    if (columns[j] <= item.startMinutes) {
                        colIndex = j;
                        break;
                    }
                }

                // 如果没有可用列，创建新列
                if (colIndex === -1) {
                    colIndex = columns.length;
                    columns.push(0);
                }

                // 更新该列的结束时间为当前检查项的结束时间
                columns[colIndex] = item.endMinutes;

                entriesWithColIndex.push({
                    ...item,
                    colIndex
                });
            });

            // ========== 步骤3: 为每个条目计算其时间范围内的最大并发数 ==========
            // 这样可以让独占某个时间段的条目占满全部宽度
            entriesWithColIndex.forEach(item => {
                // 找出该条目存在的所有时间切片
                const itemSlices = timeSlices.filter(slice =>
                    item.startMinutes < slice.end && item.endMinutes > slice.start
                );
                // 该条目时间范围内的最大并发数
                const itemMaxCols = Math.max(...itemSlices.map(s => s.maxCols), 1);

                positionedEntries.push({
                    ...item,
                    totalCols: itemMaxCols  // 使用该条目时间范围内的最大并发数
                });
            });

            // ========== 步骤3: 渲染条目 ==========
            // 根据计算好的列索引和总列数，计算每个检查项的位置和尺寸
            positionedEntries.forEach(data => {
                const { entry, startTime, duration, startMinutes, endMinutes, stripeClass, colIndex, totalCols } = data;

                // 垂直位置计算（基于时间）
                // 9:00 对应 0%，18:00 对应 100%
                const totalHours = 9;
                const startPercent = Math.max(0, Math.min(100, (startMinutes / 60) / totalHours * 100));
                // 固定最小高度为6%，确保有足够空间显示内容
                const heightPercent = Math.max(6, (duration / 60) / totalHours * 100);

                // 水平位置和宽度计算（基于全天最大列数）
                // 所有条目统一使用 totalCols，保持视觉整齐
                // 1个条目→33.3%, 2个条目→各33.3%, 3个条目→各33.3%
                const colWidth = 100 / totalCols;
                const leftPercent = colIndex * colWidth;
                // 增加间隙，让检查项之间有明显分隔
                const widthPercent = colWidth - 1.5;

                // 获取待办项
                const todos = entry.description ? markdownToTodos(entry.description) : [];

                // 检查是否是今天
                const isToday = dateStr === formatDate(new Date());

                // 构建待办项HTML和进度指示器
                let todosHtml = '';
                let progressHtml = '';
                let todoSummaryHtml = '';
                if (todos.length > 0) {
                    const completedCount = todos.filter(t => t.completed).length;

                    // 根据高度和列数决定显示策略
                    // 估算像素高度：假设内容区高度约 450px (9小时 * 50px/小时)
                    const containerHeight = 450;
                    const heightPx = (heightPercent / 100) * containerHeight;

                    // 根据可用高度和总列数决定显示策略
                    let displayStrategy = 'minimal';
                    if (totalCols === 1) {
                        // 单列时可以有更多空间显示待办
                        if (heightPx >= 35) displayStrategy = 'full';
                        else if (heightPx >= 20) displayStrategy = 'summary';
                    } else if (totalCols === 2) {
                        if (heightPx >= 45) displayStrategy = 'full';
                        else if (heightPx >= 25) displayStrategy = 'summary';
                    } else {
                        // 3列及以上，空间较紧
                        if (heightPx >= 55) displayStrategy = 'full';
                        else if (heightPx >= 35) displayStrategy = 'summary';
                    }

                    // 根据策略显示待办
                    // 检查今天是否有未完成的待办
                    const hasTodayPending = isToday && todos.some(t => !t.completed);
                    const todosOpacityClass = hasTodayPending ? 'today-pending-container' : '';

                    if (displayStrategy === 'full') {
                        // 完整显示：显示前3个待办
                        const maxDisplay = Math.min(3, todos.length);
                        const displayTodos = todos.slice(0, maxDisplay);
                        const remainingCount = todos.length - maxDisplay;
                        todosHtml = `
                            <div class="stripe-todos ${todosOpacityClass}">
                                ${displayTodos.map(todo => {
                                    // 今天且未完成，添加特殊 class
                                    const isTodayPending = isToday && !todo.completed;
                                    const todayClass = isTodayPending ? 'today-pending' : '';
                                    return `<span class="stripe-todo ${todo.completed ? 'completed' : ''} ${todayClass}" title="${LifeRPG.security.escapeHtml(todo.text)}">${LifeRPG.security.escapeHtml(todo.text)}</span>`;
                                }).join('')}
                                ${remainingCount > 0 ? `<span class="stripe-todo-more">+${remainingCount}</span>` : ''}
                            </div>
                        `;
                    } else if (displayStrategy === 'summary') {
                        // 摘要显示：只显示第一个待办 + 进度
                        const firstTodo = todos[0];
                        // 今天且未完成，添加特殊 class
                        const isTodayPending = isToday && !firstTodo.completed;
                        const todayClass = isTodayPending ? 'today-pending' : '';
                        todoSummaryHtml = `
                            <div class="stripe-todo-summary ${todosOpacityClass}">
                                <span class="stripe-todo ${firstTodo.completed ? 'completed' : ''} ${todayClass}">${LifeRPG.security.escapeHtml(firstTodo.text)}</span>
                                ${todos.length > 1 ? `<span class="stripe-todo-more">+${todos.length - 1}</span>` : ''}
                            </div>
                        `;
                    }
                    // minimal 策略：只显示进度，不显示待办详情

                    // 进度显示：完成数/总数
                    progressHtml = `<div class="stripe-progress"><span class="progress-text">${completedCount}/${todos.length}</span></div>`;
                }

                // 根据总列数调整显示
                const nameClass = totalCols >= 3 ? 'stripe-name truncated' : 'stripe-name';
                const nameStyle = totalCols >= 3 ? 'font-size: 8px;' : '';

                // 检查今天是否有未完成的待办，给条带添加特殊 class
                const hasTodayPendingTodos = isToday && todos.some(t => !t.completed);
                const todayStripeClass = hasTodayPendingTodos ? 'today-has-pending' : '';

                html += `
                    <div class="checkpoint-stripe ${stripeClass} ${todayStripeClass}"
                         data-checkpoint-id="${entry.checkpointId}"
                         data-entry-id="${entry.id}"
                         data-date="${dateStr}"
                         data-start-time="${startTime}"
                         data-duration="${duration}"
                         style="position: absolute; top: ${startPercent}%; height: ${heightPercent}%; left: ${leftPercent}%; width: ${widthPercent}%;">
                        <div class="resize-handle-bottom" data-resize="bottom"></div>
                        <div class="stripe-header">
                            <span class="${nameClass}" style="${nameStyle}" title="${LifeRPG.security.escapeHtml(entry.checkpointName)}">${LifeRPG.security.escapeHtml(entry.checkpointName)}</span>
                            ${progressHtml}
                        </div>
                        ${todosHtml || todoSummaryHtml}
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        /**
         * ============================================================
         * 周视图拖拽和调整大小功能
         * ============================================================
         * 功能：
         * 1. 拖动检查项上下移动，调整开始时间
         * 2. 拖动检查项下边缘，调整持续时间
         * 3. 自动吸附到15分钟刻度
         * 4. 拖动/调整后自动保存并刷新布局
         *
         * 实现原理：
         * - mousedown: 记录初始位置和状态
         * - mousemove: 计算偏移量，实时更新检查项位置
         * - mouseup: 吸附到网格，保存数据，刷新布局
         * ============================================================
         */
        function initWeekViewDragResize() {
            const weekViewBody = document.querySelector('.week-view-body');
            if (!weekViewBody) return;

            let isDragging = false;      // 是否正在拖动
            let isResizing = false;      // 是否正在调整大小
            let dragElement = null;      // 当前拖动的检查项元素
            let resizeElement = null;    // 当前调整大小的检查项元素
            let resizeHandle = null;     // 调整大小的手柄元素
            let startY = 0;              // 鼠标按下时的Y坐标
            let startTop = 0;            // 检查项初始top值（像素）
            let startHeight = 0;         // 检查项初始高度（像素）
            let startDuration = 0;       // 检查项初始持续时间
            let snapIndicator = null;    // 时间吸附指示器元素

            // 创建时间吸附指示器
            function createSnapIndicator() {
                const indicator = document.createElement('div');
                indicator.className = 'time-snap-indicator';
                indicator.style.display = 'none';
                weekViewBody.appendChild(indicator);
                return indicator;
            }

            snapIndicator = createSnapIndicator();

            // 动态更新检查项的待办显示
            function updateStripeTodosDisplay(stripe, heightPx) {
                const entryId = stripe.dataset.entryId;
                const dateStr = stripe.dataset.date;
                const entry = adminData.calendarEntries[dateStr]?.find(e => e.id === entryId);
                if (!entry || !entry.description) return;

                const todos = markdownToTodos(entry.description);
                if (todos.length === 0) return;

                // 根据高度决定显示策略（简化版，只在调整大小时使用）
                let maxTodos = 0;
                if (heightPx >= 25) maxTodos = 1;
                if (heightPx >= 40) maxTodos = 2;
                if (heightPx >= 55) maxTodos = 3;

                const todosContainer = stripe.querySelector('.stripe-todos');
                if (!todosContainer) return;

                if (maxTodos > 0) {
                    const displayTodos = todos.slice(0, maxTodos);
                    const remainingCount = todos.length - maxTodos;
                    todosContainer.innerHTML = `
                        ${displayTodos.map(todo => `
                            <span class="stripe-todo ${todo.completed ? 'completed' : ''}" title="${LifeRPG.security.escapeHtml(todo.text)}">${LifeRPG.security.escapeHtml(todo.text)}</span>
                        `).join('')}
                        ${remainingCount > 0 ? `<span class="stripe-todo-more">+${remainingCount}</span>` : ''}
                    `;
                    todosContainer.style.display = 'flex';
                } else {
                    todosContainer.style.display = 'none';
                }
            }

            // 获取容器高度
            function getContainerHeight() {
                const content = weekViewBody.querySelector('.week-day-content');
                return content ? content.offsetHeight : 400;
            }

            // 像素转换为时间（每30分钟一个刻度）
            function pixelsToTime(px) {
                const containerHeight = getContainerHeight();
                const totalHours = 9 + (px / containerHeight * 9);
                const hour = Math.floor(totalHours);
                const minute = Math.round((totalHours - hour) * 60 / 30) * 30;
                return { hour, minute: Math.min(59, minute) };
            }

            // 时间转换为百分比
            function timeToPercent(hour, minute) {
                return ((hour - 9) + minute / 60) / 9 * 100;
            }

            // 显示吸附指示器
            function showSnapIndicator(px) {
                const containerHeight = getContainerHeight();
                const { hour, minute } = pixelsToTime(px);
                const percent = timeToPercent(hour, minute);
                snapIndicator.style.top = percent + '%';
                snapIndicator.style.display = 'block';
                return { hour, minute, percent };
            }

            // 隐藏吸附指示器
            function hideSnapIndicator() {
                snapIndicator.style.display = 'none';
            }

            // 标记是否发生了拖拽或调整大小操作
            let hasDraggedOrResized = false;

            // 鼠标按下事件
            weekViewBody.addEventListener('mousedown', (e) => {
                const handle = e.target.closest('.resize-handle-top, .resize-handle-bottom');
                const stripe = e.target.closest('.checkpoint-stripe');

                if (handle) {
                    // 开始调整大小 - 只支持下边调整
                    e.preventDefault();
                    e.stopPropagation();
                    hasDraggedOrResized = false;
                    isResizing = true;
                    resizeElement = stripe;
                    resizeHandle = handle;
                    startY = e.clientY;
                    // 使用百分比
                    startTop = parseFloat(stripe.style.top) / 100 * getContainerHeight();
                    startHeight = parseFloat(stripe.style.height) / 100 * getContainerHeight();
                    startDuration = parseInt(stripe.dataset.duration);
                    handle.classList.add('resizing');
                } else if (stripe && !e.target.closest('.resize-handle-top, .resize-handle-bottom')) {
                    // 开始拖拽 - 记录初始位置，但等鼠标移动一定距离才真正开始
                    e.preventDefault();
                    hasDraggedOrResized = false;
                    dragElement = stripe;
                    startY = e.clientY;
                    // 使用百分比
                    startTop = parseFloat(stripe.style.top) / 100 * getContainerHeight();
                    stripe.dataset.dragStartY = e.clientY;
                    stripe.dataset.dragStartTop = startTop;
                }
            });

            // 点击事件 - 用于打开弹窗（只有在没有拖拽/调整大小时才触发）
            weekViewBody.addEventListener('click', (e) => {
                const stripe = e.target.closest('.checkpoint-stripe');
                if (stripe && !hasDraggedOrResized && !isDragging && !isResizing) {
                    const dateStr = stripe.dataset.date;
                    const entryId = stripe.dataset.entryId;
                    openEntryModal(dateStr, entryId);
                }
                // 重置标记
                hasDraggedOrResized = false;
            });

            // 鼠标移动事件
            document.addEventListener('mousemove', (e) => {
                // 处理拖拽启动（需要移动超过5px才真正开始拖拽）
                if (dragElement && !isDragging && !isResizing) {
                    const dragStartY = parseFloat(dragElement.dataset.dragStartY);
                    const deltaY = e.clientY - dragStartY;
                    if (Math.abs(deltaY) > 5) {
                        isDragging = true;
                        dragElement.dataset.dragging = 'true';
                        dragElement.classList.add('dragging');
                        startY = dragStartY;
                        startTop = parseFloat(dragElement.dataset.dragStartTop);
                        // 标记为已拖拽，阻止点击事件
                        hasDraggedOrResized = true;
                    }
                }

                if (isResizing && resizeElement) {
                    hasDraggedOrResized = true;
                    const deltaY = e.clientY - startY;
                    const containerHeight = getContainerHeight();

                    // 只调整高度，不改变位置（只支持下边调整）
                    const newHeightPx = Math.max(20, startHeight + deltaY);
                    const newHeightPercent = (newHeightPx / containerHeight) * 100;
                    resizeElement.style.height = newHeightPercent + '%';

                    // 动态更新待办显示数量
                    updateStripeTodosDisplay(resizeElement, newHeightPx);

                    showSnapIndicator(startTop + newHeightPx);
                } else if (isDragging && dragElement) {
                    hasDraggedOrResized = true;
                    const deltaY = e.clientY - startY;
                    const containerHeight = getContainerHeight();
                    const newTopPx = Math.max(0, startTop + deltaY);
                    const newTopPercent = (newTopPx / containerHeight) * 100;
                    dragElement.style.top = newTopPercent + '%';
                    showSnapIndicator(newTopPx);
                }
            });

            // 鼠标释放事件
            function handleMouseUp(e) {
                const containerHeight = getContainerHeight();

                if (isResizing && resizeElement) {
                    // 计算新的时间（使用百分比）
                    const topPercent = parseFloat(resizeElement.style.top);
                    const heightPercent = parseFloat(resizeElement.style.height);
                    const topPx = topPercent / 100 * containerHeight;
                    const heightPx = heightPercent / 100 * containerHeight;

                    // 只调整持续时间，不改变开始时间
                    const { hour: endHour, minute: endMinute } = pixelsToTime(topPx + heightPx);
                    const { hour: startHour, minute: startMinute } = pixelsToTime(topPx);
                    const newDuration = Math.round(((endHour - startHour) + (endMinute - startMinute) / 60) * 60);
                    resizeElement.dataset.duration = Math.max(15, newDuration);

                    // 吸附到网格
                    const { hour, minute, percent } = showSnapIndicator(topPx);
                    const snappedHeightPercent = Math.max(5, Math.round(heightPercent / 5) * 5);
                    resizeElement.style.height = snappedHeightPercent + '%';

                    // 保存数据
                    saveWeekViewEntryData(resizeElement);

                    resizeHandle.classList.remove('resizing');
                    resizeElement = null;
                    resizeHandle = null;
                    isResizing = false;
                } else if (isDragging && dragElement) {
                    // 吸附到网格
                    const topPercent = parseFloat(dragElement.style.top);
                    const topPx = topPercent / 100 * containerHeight;
