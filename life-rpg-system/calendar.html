        /**
         * 计算两个日期之间的天数
         */
        function calculateDuration(startDateStr, endDateStr) {
            const start = parseLocalDate(startDateStr);
            const end = parseLocalDate(endDateStr);
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            return diffDays;
        }

        /**
         * 渲染历史时间轴
         */
        function renderHistoryTimeline(checkpointId, currentDateStr) {
            try {
                const history = getCheckpointHistory(checkpointId);
                const timeline = document.getElementById('historyTimeline');
                const emptyState = document.getElementById('timelineEmpty');

                if (!timeline) return;

                if (history.length === 0) {
                    timeline.innerHTML = '';
                    if (emptyState) emptyState.style.display = 'block';
                    return;
                }

                if (emptyState) emptyState.style.display = 'none';

                const sortedHistory = [...history].sort((a, b) =>
                    new Date(a.date) - new Date(b.date)
                );

                let html = '';
                sortedHistory.forEach(h => {
                    const entry = findEntryById(h.date, h.entryId);
                    if (!entry) return;

                    const isCompleted = entry.completed || h.completed;
                    console.log('时间轴渲染:', h.date, 'entry.completed:', entry.completed, 'h.completed:', h.completed, 'isCompleted:', isCompleted);
                    const dateLabel = '';

                    // 获取标签数组（兼容新旧数据）
                    let tags = [];
                    if (entry.tags && Array.isArray(entry.tags)) {
                        tags = entry.tags;
                    } else if (entry.tag) {
                        tags = [entry.tag];
                    }
                    const tagsHtml = tags.map(tag =>
                        `<span class="timeline-tag">${LifeRPG.security.escapeHtml(tag)}</span>`
                    ).join('');

                    // 解析待办列表并格式化显示
                    let todosHtml = '';
                    if (entry.description) {
                        const todos = markdownToTodos(entry.description);
                        if (todos.length > 0) {
                            todosHtml = '<div class="timeline-todos">' + 
                                todos.map(todo => `
                                    <div class="timeline-todo ${todo.completed ? 'completed' : ''}">
                                        ${todo.completed ? '☑' : '☐'} ${LifeRPG.security.escapeHtml(todo.text)}
                                    </div>
                                `).join('') + 
                                '</div>';
                        } else {
                            todosHtml = `<span class="timeline-empty">${LifeRPG.security.escapeHtml(entry.description)}</span>`;
                        }
                    } else {
                        todosHtml = '<span class="timeline-empty">暂无记录</span>';
                    }

                    html += `
                        <div class="timeline-item ${isCompleted ? 'completed' : 'pending'}">
                            <div class="timeline-date">${h.date}${dateLabel}</div>
                            <div class="timeline-desc">
                                ${tagsHtml}
                                ${todosHtml}
                            </div>
                        </div>
                    `;
                });

                timeline.innerHTML = html || '<div class="timeline-empty">暂无历史记录</div>';

                // 滚动到底部显示最新记录
                setTimeout(() => {
                    timeline.scrollTop = timeline.scrollHeight;
                }, 0);
            } catch (error) {
                console.error('渲染历史时间轴失败:', error);
            }
        }

        /**
         * 根据日期和条目ID查找条目
         */
        function findEntryById(dateStr, entryId) {
            const entries = adminData.calendarEntries[dateStr] || [];
            return entries.find(e => e.id === entryId);
        }

        /**
         * 复制到下一天（周五则复制到下周一）
         */
        // 复制功能的临时数据存储
        let copyTempData = null;

        function copyToNextDay() {
            try {
                if (!selectedDate || !editingEntryId) return;

                // 先获取当前条目和日期（在保存之前，因为saveEntry会关闭弹窗清理状态）
                const entry = adminData.calendarEntries[selectedDate]?.find(e => e.id === editingEntryId);
                if (!entry) return;
                const currentDateStr = selectedDate;

                // 计算下一天日期（使用本地时间避免时区问题）
                const currentDate = parseLocalDate(currentDateStr);
                let nextDate = new Date(currentDate);
                nextDate.setDate(currentDate.getDate() + 1);

                // 如果是周五(5)，则跳到下周一(增加3天)
                if (currentDate.getDay() === 5) {
                    nextDate.setDate(currentDate.getDate() + 3);
                }

                const nextDateStr = formatDate(nextDate);

                // 检查下一天是否已有相同检查点的记录
                const nextDayEntries = adminData.calendarEntries[nextDateStr] || [];
                const existingEntry = nextDayEntries.find(e => e.checkpointId === entry.checkpointId);

                // 调试日志：帮助排查数据问题
                console.log('复制检查:', {
                    nextDateStr,
                    nextDayEntries,
                    checkpointId: entry.checkpointId,
                    existingEntry
                });

                if (existingEntry) {
                    // 存储临时数据
                    copyTempData = { entry, nextDateStr, existingEntry, isNew: false };
                    showConfirmModal({
                        title: '覆盖确认',
                        message: `${nextDateStr} 已有该检查点的记录，是否覆盖？`,
                        icon: '⚠️',
                        confirmText: '覆盖',
                        confirmClass: 'rune-btn-danger',
                        onConfirm: executeCopy
                    });
                } else {
                    // 存储临时数据
                    copyTempData = { entry, nextDateStr, existingEntry: null, isNew: true };
                    executeCopy();
                }

            } catch (error) {
                console.error('复制到下一天失败:', error);
                showConfirmModal({
                    title: '复制失败',
                    message: '复制失败: ' + error.message,
                    icon: '❌',
                    confirmText: '确定',
                    onConfirm: () => {}
                });
            }
        }

        /**
         * 执行复制操作
         */
        function executeCopy() {
            if (!copyTempData) return;

            const { entry, nextDateStr, existingEntry, isNew } = copyTempData;

            if (existingEntry) {
                // 覆盖现有记录（不复制描述，只复制标签）
                existingEntry.tags = entry.tags || (entry.tag ? [entry.tag] : []);

                // 确保 checkpointCompletions 中也有对应的记录（处理旧数据不一致的情况）
                if (!adminData.checkpointCompletions[entry.checkpointId]) {
                    adminData.checkpointCompletions[entry.checkpointId] = [];
                }
                const historyRecord = adminData.checkpointCompletions[entry.checkpointId]
                    .find(h => h.date === nextDateStr && h.entryId === existingEntry.id);
                if (!historyRecord) {
                    adminData.checkpointCompletions[entry.checkpointId].push({
                        date: nextDateStr,
                        entryId: existingEntry.id,
                        completed: existingEntry.completed || false
                    });
                }
            } else {
                // 创建新记录（不复制描述，只复制标签，不再存储冗余字段）
                const newEntry = {
                    id: generateId(),
                    checkpointId: entry.checkpointId,
                    checkpointName: entry.checkpointName,
                    description: '',
                    tags: entry.tags || (entry.tag ? [entry.tag] : []),
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                if (!adminData.calendarEntries[nextDateStr]) {
                    adminData.calendarEntries[nextDateStr] = [];
                }
                adminData.calendarEntries[nextDateStr].push(newEntry);

                // 同步创建 checkpointCompletions 记录，使条带能正确渲染
                if (!adminData.checkpointCompletions[entry.checkpointId]) {
                    adminData.checkpointCompletions[entry.checkpointId] = [];
                }
                adminData.checkpointCompletions[entry.checkpointId].push({
                    date: nextDateStr,
                    entryId: newEntry.id,
                    completed: false
                });
            }

            saveData();

            // 刷新日历视图
            renderChamberGrid();

            // 显示成功提示
            const btn = document.getElementById('copyNextBtn');
            const originalText = btn.textContent;
            btn.textContent = '✓ 已复制';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 1500);

            // 关闭弹窗
            closeModal();

            copyTempData = null;
        }

        // 改期功能的临时数据存储
        let moveTempData = null;

        /**
         * 改期到下一天（周五则改到下周一）
         */
        function moveToNextDay() {
            try {
                if (!selectedDate || !editingEntryId) return;

                // 先获取当前条目和日期（在保存之前）
                const entry = adminData.calendarEntries[selectedDate]?.find(e => e.id === editingEntryId);
                if (!entry) return;
                const currentDateStr = selectedDate;

                // 计算下一天日期（使用本地时间避免时区问题）
                const currentDate = parseLocalDate(currentDateStr);
                let nextDate = new Date(currentDate);
                nextDate.setDate(currentDate.getDate() + 1);

                // 如果是周五(5)，则跳到下周一(增加3天)
                if (currentDate.getDay() === 5) {
                    nextDate.setDate(currentDate.getDate() + 3);
                }

                const nextDateStr = formatDate(nextDate);

                // 检查下一天是否已有相同检查点的记录
                const nextDayEntries = adminData.calendarEntries[nextDateStr] || [];
                const existingEntry = nextDayEntries.find(e => e.checkpointId === entry.checkpointId);

                if (existingEntry) {
                    // 存储临时数据
                    moveTempData = { entry, currentDateStr, nextDateStr, existingEntry, isNew: false };
                    showConfirmModal({
                        title: '覆盖确认',
                        message: `${nextDateStr} 已有该检查点的记录，是否覆盖并删除原日期的记录？`,
                        icon: '⚠️',
                        confirmText: '覆盖并移动',
                        confirmClass: 'rune-btn-danger',
                        onConfirm: executeMove
                    });
                } else {
                    // 存储临时数据
                    moveTempData = { entry, currentDateStr, nextDateStr, existingEntry: null, isNew: true };
                    executeMove();
                }

            } catch (error) {
                console.error('改期失败:', error);
                showConfirmModal({
                    title: '改期失败',
                    message: '改期失败: ' + error.message,
                    icon: '❌',
                    confirmText: '确定',
                    onConfirm: () => {}
                });
            }
        }

        /**
         * 执行改期操作
         */
        function executeMove() {
            if (!moveTempData) return;

            const { entry, currentDateStr, nextDateStr, existingEntry, isNew } = moveTempData;

            // 1. 从原日期删除记录
            if (adminData.calendarEntries[currentDateStr]) {
                adminData.calendarEntries[currentDateStr] = adminData.calendarEntries[currentDateStr]
                    .filter(e => e.id !== entry.id);
                if (adminData.calendarEntries[currentDateStr].length === 0) {
                    delete adminData.calendarEntries[currentDateStr];
                }
            }

            // 2. 从 checkpointCompletions 中删除原日期的记录
            if (adminData.checkpointCompletions[entry.checkpointId]) {
                adminData.checkpointCompletions[entry.checkpointId] =
                    adminData.checkpointCompletions[entry.checkpointId].filter(h =>
                        !(h.date === currentDateStr && h.entryId === entry.id)
                    );
            }

            if (existingEntry) {
                // 覆盖现有记录（合并待办和标签）
                // 1. 合并待办：将原日期的待办迁移到新日期
                if (entry.description) {
                    const sourceTodos = markdownToTodos(entry.description);
                    const targetTodos = existingEntry.description ? markdownToTodos(existingEntry.description) : [];
                    // 合并待办（去重，以文本内容为准）
                    const existingTexts = new Set(targetTodos.map(t => t.text));
                    const newTodos = [...targetTodos];
                    sourceTodos.forEach(todo => {
                        if (!existingTexts.has(todo.text)) {
                            newTodos.push(todo);
                        }
                    });
                    existingEntry.description = todosToMarkdown(newTodos);
                }

                // 2. 合并标签
                const sourceTags = entry.tags || (entry.tag ? [entry.tag] : []);
                const targetTags = existingEntry.tags || (existingEntry.tag ? [existingEntry.tag] : []);
                const mergedTags = [...new Set([...targetTags, ...sourceTags])];
                existingEntry.tags = mergedTags;
                delete existingEntry.tag; // 删除旧格式的 tag 字段

                // 确保 checkpointCompletions 中有对应的记录
                if (!adminData.checkpointCompletions[entry.checkpointId]) {
                    adminData.checkpointCompletions[entry.checkpointId] = [];
                }
                const historyRecord = adminData.checkpointCompletions[entry.checkpointId]
                    .find(h => h.date === nextDateStr && h.entryId === existingEntry.id);
                if (!historyRecord) {
                    adminData.checkpointCompletions[entry.checkpointId].push({
                        date: nextDateStr,
                        entryId: existingEntry.id,
                        completed: existingEntry.completed || false
                    });
                }
            } else {
                // 创建新记录（移动原记录的所有数据，包括待办和标签）
                const movedEntry = {
                    ...entry,
                    date: nextDateStr,
                    createdAt: entry.createdAt || new Date().toISOString()
                };

                if (!adminData.calendarEntries[nextDateStr]) {
                    adminData.calendarEntries[nextDateStr] = [];
                }
                adminData.calendarEntries[nextDateStr].push(movedEntry);

                // 同步更新 checkpointCompletions
                if (!adminData.checkpointCompletions[entry.checkpointId]) {
                    adminData.checkpointCompletions[entry.checkpointId] = [];
                }
                // 先删除可能存在的旧记录（同一日期）
                adminData.checkpointCompletions[entry.checkpointId] =
                    adminData.checkpointCompletions[entry.checkpointId].filter(h =>
                        !(h.date === nextDateStr && h.entryId === entry.id)
                    );
                // 添加新记录
                adminData.checkpointCompletions[entry.checkpointId].push({
                    date: nextDateStr,
                    entryId: entry.id,
                    completed: entry.completed || false
                });
            }

            saveData();

            // 刷新日历视图
            renderChamberGrid();
            renderScrollArchive();
            updateStats();

            // 关闭弹窗并提示成功
            closeModal();
            showToast(`已改期到 ${nextDateStr}`, 'success');

            moveTempData = null;
        }

        /**
         * 获取检查项的所有标签（从历史记录中收集）
         */
        function getCheckpointTags(checkpointId) {
            const tags = new Set();
            const history = getCheckpointHistory(checkpointId);

            history.forEach(h => {
                const entry = findEntryById(h.date, h.entryId);
                if (entry && entry.tags && Array.isArray(entry.tags)) {
                    entry.tags.forEach(tag => tags.add(tag));
                } else if (entry && entry.tag) {
                    // 兼容旧数据（单标签）
                    tags.add(entry.tag);
                }
            });

            return Array.from(tags).sort();
        }

        // 当前编辑的标签数组
        let currentTags = [];

        /**
         * 渲染标签列表
         */
        function renderTagList() {
            const tagList = document.getElementById('tagList');
            tagList.innerHTML = currentTags.map((tag, index) => `
                <span class="tag-item">
                    ${LifeRPG.security.escapeHtml(tag)}
                    <span class="tag-remove" onclick="removeTag(${index})" title="移除">×</span>
                </span>
            `).join('');
        }

        /**
         * 添加标签
         */
        function addTag(tagName) {
            tagName = tagName.trim();
            if (!tagName) return;
            if (currentTags.includes(tagName)) return;

            currentTags.push(tagName);
            renderTagList();
        }

        /**
         * 移除标签
         */
        function removeTag(index) {
            currentTags.splice(index, 1);
            renderTagList();
        }

        // 当前检查点的可用标签
        let availableTags = [];

        /**
         * 加载检查项标签
         */
        function loadCheckpointTags(checkpointId, entryTags) {
            const tagInput = document.getElementById('tagInput');
            const tagSuggestions = document.getElementById('tagSuggestions');

            // 初始化当前标签数组
            if (entryTags && Array.isArray(entryTags)) {
                currentTags = [...entryTags];
            } else if (entryTags) {
                // 兼容旧数据（单标签字符串）
                currentTags = [entryTags];
            } else {
                currentTags = [];
            }
            renderTagList();

            // 清空输入框
            tagInput.value = '';

            // 加载已有标签选项
            availableTags = getCheckpointTags(checkpointId);

            // 显示标签建议列表的函数
            function showTagSuggestions(filterValue = '') {
                const value = filterValue.trim().toLowerCase();
                
                // 过滤标签（排除已添加的）
                let matches = availableTags.filter(tag =>
                    !currentTags.includes(tag)
                );
                
                // 如果有输入值，则进一步过滤
                if (value) {
                    matches = matches.filter(tag =>
                        tag.toLowerCase().includes(value)
                    );
                }

                if (matches.length > 0) {
                    tagSuggestions.innerHTML = matches.map(tag =>
                        `<div class="tag-suggestion-item" data-tag="${LifeRPG.security.escapeHtml(tag)}">${LifeRPG.security.escapeHtml(tag)}</div>`
                    ).join('');
                    tagSuggestions.classList.add('active');

                    // 绑定点击事件
                    tagSuggestions.querySelectorAll('.tag-suggestion-item').forEach(item => {
                        item.onclick = function() {
                            addTag(this.dataset.tag);
                            tagInput.value = '';
                            tagSuggestions.classList.remove('active');
                        };
                    });
                } else {
                    tagSuggestions.classList.remove('active');
                }
            }

            // 绑定输入事件（显示建议）
            tagInput.oninput = function() {
                showTagSuggestions(this.value);
            };

            // 绑定聚焦事件（点击输入框时显示所有可用标签）
            tagInput.onfocus = function() {
                showTagSuggestions(this.value);
            };

            // 绑定回车事件
            tagInput.onkeydown = function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const activeItem = tagSuggestions.querySelector('.tag-suggestion-item.active');
                    if (activeItem) {
                        addTag(activeItem.dataset.tag);
                    } else if (this.value.trim()) {
                        addTag(this.value);
                    }
                    this.value = '';
                    tagSuggestions.classList.remove('active');
                } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    const items = tagSuggestions.querySelectorAll('.tag-suggestion-item');
                    if (items.length === 0) return;

                    let activeIndex = Array.from(items).findIndex(item => item.classList.contains('active'));
                    if (e.key === 'ArrowDown') {
                        activeIndex = activeIndex < items.length - 1 ? activeIndex + 1 : 0;
                    } else {
                        activeIndex = activeIndex > 0 ? activeIndex - 1 : items.length - 1;
                    }

                    items.forEach(item => item.classList.remove('active'));
                    items[activeIndex].classList.add('active');
                }
            };

            // 点击外部关闭建议
            const clickOutsideHandler = function(e) {
                if (!e.target.closest('.tag-input-wrapper')) {
                    tagSuggestions.classList.remove('active');
                }
            };
            document.addEventListener('click', clickOutsideHandler);

            // 存储处理器引用以便后续清理
            window._tagClickHandler = clickOutsideHandler;
        }

        // ==================== 待办列表功能 ====================

        // 当前待办列表
        let currentTodos = [];

        /**
         * 将待办列表转换为 Markdown 格式
         * @param {Array} todos - [{text: string, completed: boolean}]
         * @returns {string} - Markdown 格式字符串
         */
        function todosToMarkdown(todos) {
            if (!todos || todos.length === 0) return '';
            return todos.map(todo => {
                const checkbox = todo.completed ? '[x]' : '[ ]';
                return `${checkbox} ${todo.text}`;
            }).join('\n');
        }

        /**
         * 从 Markdown 解析待办列表
         * @param {string} markdown - Markdown 格式字符串
         * @returns {Array} - [{text: string, completed: boolean}]
         */
        function markdownToTodos(markdown) {
            if (!markdown || !markdown.trim()) return [];
            const lines = markdown.trim().split('\n');
            return lines.map(line => {
                const completed = line.trim().startsWith('[x]') || line.trim().startsWith('[X]');
                const text = line.replace(/^\[[ xX]\]\s*/, '').trim();
                return { text, completed };
            }).filter(todo => todo.text);
        }

        /**
         * 渲染待办列表
         */
        function renderTodoList() {
            const todoList = document.getElementById('todoList');
            if (!todoList) return;

            // 计算改期提示语
            let rescheduleTitle = "改期到下一天";
            if (selectedDate) {
                const currentDate = parseLocalDate(selectedDate);
                const dayOfWeek = currentDate.getDay();
                if (dayOfWeek === 5) { // 周五
                    rescheduleTitle = "改期到下周一";
                }
            }

            todoList.innerHTML = currentTodos.map((todo, index) => `
                <div class="todo-item" data-index="${index}">
                    <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodoItem(${index})">
                        ${todo.completed ? '✓' : ''}
                    </div>
                    <input type="text" class="todo-input ${todo.completed ? 'completed' : ''}"
                        value="${LifeRPG.security.escapeHtml(todo.text)}"
                        onchange="updateTodoText(${index}, this.value)"
                        placeholder="输入进展内容...">
                    <div class="todo-reschedule" onclick="rescheduleTodoItem(${index})" title="${rescheduleTitle}">📅</div>
                    <div class="todo-delete" onclick="deleteTodoItem(${index})">×</div>
                </div>
            `).join('');

            // 更新隐藏字段的 Markdown 数据
            document.getElementById('todoData').value = todosToMarkdown(currentTodos);

            // 更新改期按钮状态
            updateMoveNextButtonState();
        }

        /**
         * 添加待办项
         */
        function addTodoItem() {
            currentTodos.push({ text: '', completed: false });
            renderTodoList();
            // 聚焦到新添加的输入框
            setTimeout(() => {
                const inputs = document.querySelectorAll('.todo-input');
                if (inputs.length > 0) {
                    inputs[inputs.length - 1].focus();
                }
            }, 0);
        }

        /**
         * 切换待办项完成状态
         */
        function toggleTodoItem(index) {
            if (currentTodos[index]) {
                currentTodos[index].completed = !currentTodos[index].completed;
                renderTodoList();
                updateMoveNextButtonState();
            }
        }

        /**
         * 更新改期按钮状态
         * 如果有任意待办项被勾选，则置灰改期按钮
         */
        function updateMoveNextButtonState() {
            const moveBtn = document.getElementById('moveNextBtn');
            if (!moveBtn) return;

            const hasCompletedTodo = currentTodos.some(todo => todo.completed);
            if (hasCompletedTodo) {
                moveBtn.disabled = true;
                moveBtn.style.opacity = '0.5';
                moveBtn.style.cursor = 'not-allowed';
                moveBtn.title = '有已勾选的待办项，不支持改期';
            } else {
                moveBtn.disabled = false;
                moveBtn.style.opacity = '';
                moveBtn.style.cursor = '';
                moveBtn.title = '';
            }
        }

        /**
         * 更新待办项文本
         */
        function updateTodoText(index, text) {
            if (currentTodos[index]) {
                const trimmed = text.trim();
                const MAX_LENGTH = 500;
                if (trimmed.length > MAX_LENGTH) {
                    showToast('待办内容过长，最多 500 字符', 'warning');
                    return;
                }
                currentTodos[index].text = trimmed;
                document.getElementById('todoData').value = todosToMarkdown(currentTodos);
            }
        }

        /**
         * 删除待办项
         */
        function deleteTodoItem(index) {
            currentTodos.splice(index, 1);
            renderTodoList();
        }

        /**
         * 改期待办项
         * 将待办项移动到下一天（周五则移动到周一）
         */
        function rescheduleTodoItem(index) {
            if (!selectedDate || !editingEntryId) {
                showToast('无法获取当前检查项信息', 'error');
                return;
            }

            const entry = adminData.calendarEntries[selectedDate]?.find(e => e.id === editingEntryId);
            if (!entry) {
                showToast('无法获取当前检查项信息', 'error');
                return;
            }

            const todo = currentTodos[index];
            if (!todo) {
                showToast('待办项不存在', 'error');
                return;
            }

            // 计算目标日期：下一天，如果是周五则下周一
            const currentDate = parseLocalDate(selectedDate);
            const dayOfWeek = currentDate.getDay(); // 0=周日, 1=周一, ..., 5=周五, 6=周六

            let targetDate = new Date(currentDate);
            if (dayOfWeek === 5) { // 周五
                targetDate.setDate(currentDate.getDate() + 3); // 下周一
            } else {
                targetDate.setDate(currentDate.getDate() + 1); // 下一天
            }
            const targetDateStr = formatDate(targetDate);

            // 检查目标日期是否已有该检查项
            const targetEntries = adminData.calendarEntries[targetDateStr] || [];
            let targetEntry = targetEntries.find(e => e.checkpointId === entry.checkpointId);

            if (!targetEntry) {
                // 创建新的检查项（不再存储冗余字段）
                targetEntry = {
                    id: generateId(),
                    checkpointId: entry.checkpointId,
                    checkpointName: entry.checkpointName,
                    date: targetDateStr,
                    description: '',
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                if (!adminData.calendarEntries[targetDateStr]) {
                    adminData.calendarEntries[targetDateStr] = [];
                }
                adminData.calendarEntries[targetDateStr].push(targetEntry);

                // 更新完成记录
                if (!adminData.checkpointCompletions[entry.checkpointId]) {
                    adminData.checkpointCompletions[entry.checkpointId] = [];
                }
                adminData.checkpointCompletions[entry.checkpointId].push({
                    date: targetDateStr,
                    entryId: targetEntry.id,
                    archived: false
                });
            }

            // 将待办项添加到目标检查项
            const targetTodos = targetEntry.description ? markdownToTodos(targetEntry.description) : [];
            targetTodos.push({ text: todo.text, completed: todo.completed });
            targetEntry.description = todosToMarkdown(targetTodos);

            // 从当前检查项中移除待办项
            currentTodos.splice(index, 1);
            entry.description = todosToMarkdown(currentTodos);

            // 保存数据
            saveData();

            // 刷新界面
            renderTodoList();
            renderChamberGrid();
            updateStats();

            showToast(`已改期到 ${targetDateStr}`, 'success');
        }

        /**
         * 加载待办列表
         */
        function loadTodos(markdown) {
            if (!markdown || !markdown.trim()) {
                currentTodos = [];
            } else if (markdown.includes('[ ]') || markdown.includes('[x]') || markdown.includes('[X]')) {
                // 新格式：Markdown 待办列表
                currentTodos = markdownToTodos(markdown);
            } else {
                // 旧格式：纯文本，转换为单条未完成的待办
                currentTodos = [{ text: markdown.trim(), completed: false }];
            }
            renderTodoList();
        }

        // ==================== Excel 导出/导入功能 ====================

        /**
         * 导出待办列表到 Excel
         */
        function exportTodosToExcel() {
            const markdown = todosToMarkdown(currentTodos);
            if (!markdown) {
                showToast('没有待办事项可导出', 'warning');
                return;
            }

            // 创建 CSV 内容（Excel 可以直接打开）
            const csvContent = '待办列表\n' + markdown.split('\n').map(line => {
                const completed = line.startsWith('[x]') || line.startsWith('[X]');
                const text = line.replace(/^\[[ xX]\]\s*/, '');
                return `${completed ? '已完成' : '未完成'},"${text.replace(/"/g, '""')}"`;
            }).join('\n');

            // 下载文件
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `待办列表_${formatDate(new Date())}.csv`;
            link.click();

            showToast('已导出到 Excel', 'success');
        }

        /**
         * 从 Excel 导入待办列表
         */
        function importTodosFromExcel(file) {
            // 验证文件类型
            if (!file.name.endsWith('.csv') && file.type !== 'text/csv' && file.type !== 'application/vnd.ms-excel') {
                showToast('请上传 CSV 文件', 'warning');
                return;
            }

            // 验证文件大小 (限制 1MB)
            const MAX_FILE_SIZE = 1024 * 1024;
            if (file.size > MAX_FILE_SIZE) {
                showToast('文件大小超过 1MB 限制', 'warning');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;

                    // 验证内容长度
                    if (content.length > 100000) {
                        showToast('文件内容过长', 'warning');
                        return;
                    }

                    const lines = content.split('\n').slice(1); // 跳过标题行

                    currentTodos = lines.map(line => {
                        const parts = line.split(',');
                        if (parts.length >= 2) {
                            const completed = parts[0].trim() === '已完成';
                            const text = parts.slice(1).join(',').replace(/^"|"$/g, '').replace(/""/g, '"');
                            return { text, completed };
                        }
                        return null;
                    }).filter(todo => todo && todo.text);

                    // 限制导入数量
                    const MAX_TODOS = 100;
                    if (currentTodos.length > MAX_TODOS) {
                        currentTodos = currentTodos.slice(0, MAX_TODOS);
                        showToast(`待办过多，仅导入前 ${MAX_TODOS} 条`, 'warning');
                    }

                    renderTodoList();
                    showToast('导入成功', 'success');
                } catch (error) {
                    console.error('导入失败:', error);
                    showToast('导入失败，请检查文件格式', 'warning');
                }
            };
            reader.onerror = function() {
                showToast('文件读取失败', 'warning');
            };
            reader.readAsText(file);
        }

        /**
         * 显示条带悬停提示（显示鼠标所在当天的待办）
         */
        function showStripeTooltip(e) {
            const tooltip = document.getElementById('stripeTooltip');
            const stripe = this;

            // 计算鼠标所在的日期
            const startDateStr = stripe.dataset.startDate;
            const endDateStr = stripe.dataset.endDate;
            const startDate = parseLocalDate(startDateStr);
            const endDate = parseLocalDate(endDateStr);
            const dayCount = Math.round((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

            const rect = stripe.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const colWidth = rect.width / dayCount;
            const dayOffset = Math.floor(clickX / colWidth);

            const hoveredDate = new Date(startDate.getTime());
            hoveredDate.setDate(startDate.getDate() + dayOffset);
            const hoveredDateStr = formatDate(hoveredDate);

            // 获取该日期的待办
            const checkpointId = stripe.dataset.checkpointId;
            const entries = adminData.calendarEntries[hoveredDateStr] || [];
            const entry = entries.find(e => e.checkpointId === checkpointId);

            if (!entry || !entry.description) {
                tooltip.classList.remove('active');
                return;
            }

            const todos = markdownToTodos(entry.description);
            if (todos.length === 0) {
                tooltip.classList.remove('active');
                return;
            }

            // 生成待办列表 HTML
            let html = '';
            todos.forEach(todo => {
                const icon = todo.completed ? '☑' : '☐';
                const completedClass = todo.completed ? 'completed' : '';
                html += `<div class="tooltip-todo ${completedClass}"><span class="todo-icon">${icon}</span>${LifeRPG.security.escapeHtml(todo.text)}</div>`;
            });

            tooltip.innerHTML = html;
            tooltip.classList.add('active');

            // 定位 tooltip
            const tooltipRect = tooltip.getBoundingClientRect();
            let left = e.clientX + 12;
            let top = e.clientY + 12;

            if (left + tooltipRect.width > window.innerWidth) {
                left = e.clientX - tooltipRect.width - 12;
            }
            if (top + tooltipRect.height > window.innerHeight) {
                top = e.clientY - tooltipRect.height - 12;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        /**
         * 隐藏条带悬停提示
         */
        function hideStripeTooltip() {
            const tooltip = document.getElementById('stripeTooltip');
            tooltip.classList.remove('active');
        }

        /**

        function executeArchive() {
            try {
                const entry = adminData.calendarEntries[selectedDate].find(e => e.id === editingEntryId);
                if (!entry) return;

                entry.description = todosToMarkdown(currentTodos); // 进展记录保存为 Markdown

                        date: selectedDate,
                        entryId: entry.id,
                        archived: true
                    });

        // ==================== 周总结功能 ====================

        let weeklySummaryData = null;

        /**
         * 获取指定日期所在周的周一到周五的日期
         * @param {Date} baseDate - 基准日期，默认为当前日历显示的日期
         */
        function getWeekDays(baseDate = null) {
            const referenceDate = baseDate || currentDate;
            const dayOfWeek = referenceDate.getDay(); // 0=周日, 1=周一, ..., 6=周六
            const today = new Date();
            const days = [];

            // 计算本周周一的日期
            const monday = new Date(referenceDate);
            const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
            monday.setDate(referenceDate.getDate() + diff);

            // 生成周一到周五的日期
            for (let i = 0; i < 5; i++) {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                days.push({
                    date: formatDate(date),
                    dayName: ['周一', '周二', '周三', '周四', '周五'][i],
                    isToday: formatDate(date) === formatDate(today)
                });
            }

            return days;
        }

        /**
         * 显示周总结弹窗
         * @param {string} baseDateStr - 基准日期字符串，默认为当前选中的日期
         */
        function showWeeklySummary(baseDateStr = null) {
            // 使用传入的日期或当前选中的日期，如果没有则使用日历当前日期
            const referenceDateStr = baseDateStr || selectedDate;
            let weekDays;
            if (referenceDateStr) {
                weekDays = getWeekDays(parseLocalDate(referenceDateStr));
            } else {
                weekDays = getWeekDays();
            }
            const selectedLandmarkId = getSelectedLandmarkId();
            const summary = weekDays.map(day => {
                const entries = getLandmarkCalendarEntries(selectedLandmarkId, day.date);
                let totalTodos = 0;
                let completedTodos = 0;
                let todos = [];

                entries.forEach(entry => {
                    if (entry.description) {
                        const entryTodos = markdownToTodos(entry.description);
                        entryTodos.forEach(todo => {
                            totalTodos++;
                            if (todo.completed) completedTodos++;
                            todos.push({
                                text: todo.text,
                                completed: todo.completed,
                                checkpointName: entry.checkpointName
                            });
                        });
                    }
                });

                return {
                    ...day,
                    entries,
                    totalTodos,
                    completedTodos,
                    todos,
                    completionRate: totalTodos > 0 ? Math.round((completedTodos / totalTodos) * 100) : 0
                };
            });

            weeklySummaryData = summary;
            renderWeeklySummary(summary);
            document.getElementById('weeklySummaryModal').classList.add('active');
        }

        /**
         * 渲染周总结内容（按检查项分组，显示详细待办）
         */
        function renderWeeklySummary(summary) {
            const container = document.getElementById('weeklySummaryContent');

            // 按检查项重新组织数据
            const checkpointMap = new Map();

            summary.forEach(day => {
                day.entries.forEach(entry => {
                    if (!checkpointMap.has(entry.checkpointId)) {
                        // 使用 getCheckpointHierarchy 获取层级信息
                        const hierarchy = getCheckpointHierarchy(entry.checkpointId);
                        checkpointMap.set(entry.checkpointId, {
                            id: entry.checkpointId,
                            name: entry.checkpointName,
                            landmarkName: hierarchy?.landmarkName || entry.landmarkName || '',
                            questName: hierarchy?.questName || entry.questName || '',
                            levelName: hierarchy?.levelName || entry.levelName || '',
                            days: {}
                        });
                    }

                    const cp = checkpointMap.get(entry.checkpointId);
                    const todos = entry.description ? markdownToTodos(entry.description) : [];
                    cp.days[day.date] = {
                        dayName: day.dayName,
                        isToday: day.isToday,
                        date: day.date,
                        todos: todos,
                        completed: todos.filter(t => t.completed).length,
                        total: todos.length
                    };
                });
            });



            // 渲染每个检查项（详细版）
            let html = '';
            checkpointMap.forEach(cp => {
                // 生成每天的详细待办列表
                let dayDetailsHtml = '';
                summary.forEach(day => {
                    const dayData = cp.days[day.date];
                    if (dayData && dayData.total > 0) {
                        const todosHtml = dayData.todos.map(todo => `
                            <div class="weekly-detail-todo ${todo.completed ? 'completed' : ''}">
                                <span class="todo-icon">${todo.completed ? '☑' : '☐'}</span>
                                <span class="todo-text">${LifeRPG.security.escapeHtml(todo.text)}</span>
                            </div>
                        `).join('');

                        dayDetailsHtml += `
                            <div class="weekly-detail-section">
                                <div class="weekly-detail-day-header ${day.isToday ? 'today' : ''}">
                                    <span class="weekly-detail-day-name">${day.dayName}</span>
                                    <span class="weekly-detail-day-date">${day.date.slice(5)}</span>
                                </div>
                                <div class="weekly-detail-todos">
                                    ${todosHtml}
                                </div>
                            </div>
                        `;
                    }
                });

                if (!dayDetailsHtml) {
                    dayDetailsHtml = '<div class="weekly-detail-empty">本周暂无待办记录</div>';
                }

                html += `
                    <div class="checkpoint-weekly-card">
                        <div class="checkpoint-weekly-header">
                            <div class="checkpoint-weekly-name">${LifeRPG.security.escapeHtml(cp.name)}</div>
                        </div>
                        <div class="checkpoint-weekly-details">
                            ${dayDetailsHtml}
                        </div>
                    </div>
                `;
            });

            if (checkpointMap.size === 0) {
                html = '<div class="weekly-summary-empty">本周暂无检查项</div>';
            }

            // 添加总体统计（简化版）
            html += `
                <div class="weekly-summary-total">
                    <div style="font-size: 14px; color: var(--text-secondary);">本周共 ${checkpointMap.size} 个项目</div>
                </div>
            `;

            container.innerHTML = html;
        }

        /**
         * 关闭周总结弹窗
         */
        function closeWeeklySummary(event) {
            if (!event || event.target.id === 'weeklySummaryModal' || event.target.classList.contains('close-btn')) {
                document.getElementById('weeklySummaryModal').classList.remove('active');
            }
        }

        /**
         * 导出周总结为 Markdown（按检查项分组，包含详细待办）
         */
        function exportWeeklySummary() {
            if (!weeklySummaryData) return;

            // 从 weeklySummaryData 中提取日期范围（与弹窗显示的一致）
            const weekDays = weeklySummaryData.map(d => ({ date: d.date, dayName: d.dayName }));
            const weekRange = `${weekDays[0].date} ~ ${weekDays[4].date}`;

            // 按检查项重新组织数据
            const checkpointMap = new Map();
            weeklySummaryData.forEach(day => {
                day.entries.forEach(entry => {
                    if (!checkpointMap.has(entry.checkpointId)) {
                        // 使用 getCheckpointHierarchy 获取层级信息
                        const hierarchy = getCheckpointHierarchy(entry.checkpointId);
                        checkpointMap.set(entry.checkpointId, {
                            name: entry.checkpointName,
                            landmarkName: hierarchy?.landmarkName || entry.landmarkName || '',
                            questName: hierarchy?.questName || entry.questName || '',
                            levelName: hierarchy?.levelName || entry.levelName || '',
                            days: {}
                        });
                    }
                    const cp = checkpointMap.get(entry.checkpointId);
                    const todos = entry.description ? markdownToTodos(entry.description) : [];
                    cp.days[day.date] = {
                        dayName: day.dayName,
                        todos: todos,
                        completed: todos.filter(t => t.completed).length,
                        total: todos.length
                    };
                });
            });

            let totalAll = 0;
            let completedAll = 0;

            let mdContent = `# 📊 本周项目总结 (${weekRange})\n\n`;

            // 每个项目的详细总结
            let projectIndex = 1;
            checkpointMap.forEach(cp => {
                mdContent += `## ${projectIndex}. ${cp.name}\n\n`;

                // 遍历每天显示待办
                weekDays.forEach(day => {
                    const dayData = cp.days[day.date];
                    if (dayData && dayData.total > 0) {
                        mdContent += `### ${day.dayName} (${day.date})\n\n`;
                        dayData.todos.forEach(todo => {
                            const checkbox = todo.completed ? '[x]' : '[ ]';
                            mdContent += `- ${checkbox} ${todo.text}\n`;
                        });
                        mdContent += `\n`;
                    }
                });

                mdContent += `---\n\n`;
                projectIndex++;
            });

            // 总体统计
            mdContent += `## 📈 本周总体\n\n`;
            mdContent += `- **项目数**: ${checkpointMap.size} 个\n\n`;

            mdContent += `*生成时间: ${new Date().toLocaleString()}*\n`;

            // 下载文件
            const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `本周项目总结_${weekDays[0].date}_${weekDays[4].date}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast('周总结已导出', 'success');
        }

        /**
         * 同步周总结到 Obsidian（使用 URL Scheme 一键发送）
         */
        async function syncWeeklySummaryToObsidian() {
            if (!weeklySummaryData) {
                showToast('没有周总结数据可同步', 'warning');
                return;
            }

            try {
                // 从 weeklySummaryData 中提取日期范围（与弹窗显示的一致）
                const weekDays = weeklySummaryData.map(d => ({ date: d.date, dayName: d.dayName }));
                const weekRange = `${weekDays[0].date} ~ ${weekDays[4].date}`;
                const fileName = `本周项目总结_${weekDays[0].date}_${weekDays[4].date}`;

                // 按检查项重新组织数据
                const checkpointMap = new Map();
                let totalAll = 0;
                let completedAll = 0;

                weeklySummaryData.forEach(day => {
                    day.entries.forEach(entry => {
                        if (!checkpointMap.has(entry.checkpointId)) {
                            const hierarchy = getCheckpointHierarchy(entry.checkpointId);
                            checkpointMap.set(entry.checkpointId, {
                                name: entry.checkpointName,
                                landmarkName: hierarchy?.landmarkName || entry.landmarkName || '',
                                questName: hierarchy?.questName || entry.questName || '',
                                levelName: hierarchy?.levelName || entry.levelName || '',
                                days: {}
                            });
                        }
                        const cp = checkpointMap.get(entry.checkpointId);
                        const todos = entry.description ? markdownToTodos(entry.description) : [];
                        cp.days[day.date] = {
                            dayName: day.dayName,
                            todos: todos,
                            completed: todos.filter(t => t.completed).length,
                            total: todos.length
                        };
                        totalAll += todos.length;
                        completedAll += todos.filter(t => t.completed).length;
                    });
                });

                // 构建 Markdown 内容
                let mdContent = `---\n`;
                mdContent += `title: 本周项目总结 (${weekRange})\n`;
                mdContent += `created: ${new Date().toISOString()}\n`;
                mdContent += `modified: ${new Date().toISOString()}\n`;
                mdContent += `tags: [周总结, 人生开放系统]\n`;
                mdContent += `source: 人生开放系统\n`;
                mdContent += `week_range: ${weekRange}\n`;
                mdContent += `project_count: ${checkpointMap.size}\n`;
                mdContent += `total_todos: ${totalAll}\n`;
                mdContent += `completed_todos: ${completedAll}\n`;
                mdContent += `completion_rate: ${totalAll > 0 ? Math.round((completedAll / totalAll) * 100) : 0}\n`;
                mdContent += `---\n\n`;
                mdContent += `# 📊 本周项目总结 (${weekRange})\n\n`;

                // 总体统计
                const completionRate = totalAll > 0 ? Math.round((completedAll / totalAll) * 100) : 0;
                mdContent += `## 📈 总体统计\n\n`;
                mdContent += `- **项目数**: ${checkpointMap.size} 个\n`;
                mdContent += `- **总待办**: ${totalAll} 项\n`;
                mdContent += `- **已完成**: ${completedAll} 项\n`;
                mdContent += `- **完成率**: ${completionRate}%\n\n`;
                mdContent += `---\n\n`;

                // 每个项目的详细总结
                let projectIndex = 1;
                checkpointMap.forEach(cp => {
                    mdContent += `## ${projectIndex}. ${cp.name}\n\n`;

                    if (cp.landmarkName || cp.questName || cp.levelName) {
                        mdContent += `> **路径**: ${cp.landmarkName} › ${cp.questName} › ${cp.levelName}\n\n`;
                    }

                    // 遍历每天显示待办
                    weekDays.forEach(day => {
                        const dayData = cp.days[day.date];
                        if (dayData && dayData.total > 0) {
                            mdContent += `### ${day.dayName} (${day.date})\n\n`;
                            dayData.todos.forEach(todo => {
                                const checkbox = todo.completed ? '[x]' : '[ ]';
                                mdContent += `- ${checkbox} ${todo.text}\n`;
                            });
                            mdContent += `\n`;
                        }
                    });

                    mdContent += `---\n\n`;
                    projectIndex++;
                });

                mdContent += `\n*同步时间: ${new Date().toLocaleString()}*`;

                // 构建 Obsidian URI（保存到 "周报/" 路径下）
                const obsidianFilePath = `周报/${fileName}`;
                // 路径按段编码，保留目录分隔符 "/"
                const encodedFilePath = obsidianFilePath.split('/').map(seg => encodeURIComponent(seg)).join('/');
                // 指定 vault 名称，精准投递到目标仓库
                const vaultName = 'Faye';

                // 使用 clipboard 模式：先复制内容到剪贴板，再让 Obsidian 从剪贴板读取
                // 这样避免了把长内容编码到 URL 中
                await navigator.clipboard.writeText(mdContent);

                // 构建 obsidian://new URI（使用 clipboard 参数，不再包含 content）
                const obsidianUrl = `obsidian://new?vault=${encodeURIComponent(vaultName)}&file=${encodedFilePath}&clipboard`;

                // 触发 Obsidian URL Scheme
                const link = document.createElement('a');
                link.href = obsidianUrl;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showToast('已唤起 Obsidian，内容通过剪贴板发送到 周报/', 'success');

            } catch (error) {
                console.error('Obsidian Sync 失败:', error);
                showToast('同步失败: ' + error.message, 'error');
            }
        }

        // ==================== 周总结功能结束 ====================

        /**
         * 切换月份
         */
        function changeMonth(delta) {
            try {
                if (currentView === 'week') {
                    // 周视图：切换周（加减7天）
                    currentDate.setDate(currentDate.getDate() + delta * 7);
                    renderChamberGrid();
                } else {
                    // 月视图：切换月份
                    currentDate.setMonth(currentDate.getMonth() + delta);
                    renderChamberGrid();
                }
                updateStats();
            } catch (error) {
                console.error('切换时间失败:', error);
            }
        }

        /**
         * 切换视图
         */
        function switchView(view) {
            try {
                currentView = view;
                localStorage.setItem('lifeRpgCurrentView', view);

                // 更新按钮状态
                document.querySelectorAll('.glyph-btn').forEach(btn => {
                    btn.classList.remove('active');
                    const onclickAttr = btn.getAttribute('onclick');
                    if (onclickAttr && onclickAttr.includes(`switchView('${view}')`)) {
                        btn.classList.add('active');
                    }
                });

                // 切换视图显示
                const chamberGrid = document.getElementById('chamberGrid');
                const yearMatrix = document.getElementById('yearMatrix');
                const timeSanctum = document.querySelector('.time-sanctum');

                if (view === 'year') {
                    if (chamberGrid) chamberGrid.style.display = 'none';
                    if (yearMatrix) {
                        yearMatrix.style.display = 'block';
                        renderYearMatrix();
                    }
                    if (timeSanctum) timeSanctum.classList.add('year-view-active');
                } else {
                    if (chamberGrid) chamberGrid.style.display = '';
                    if (yearMatrix) yearMatrix.style.display = 'none';
                    if (timeSanctum) timeSanctum.classList.remove('year-view-active');
                    renderChamberGrid();
                }
            } catch (error) {
                console.error('切换视图失败:', error);
            }
        }

        /**
         * 更新统计（活跃日、已完成、未完成）
         */
        function updateStats() {
            try {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

                let completed = 0;
                let pending = 0;
                let activeDays = 0;

                // 获取选中的地标ID，只统计该地标的条目
                const selectedLandmarkId = getSelectedLandmarkId();
                let allowedCheckpointIds = null;
                if (selectedLandmarkId) {
                    const landmarkCheckpoints = getCheckpointsByLandmark(selectedLandmarkId);
                    allowedCheckpointIds = new Set(landmarkCheckpoints.map(cp => cp.id));
                }

                const daysInMonth = new Date(year, month + 1, 0).getDate();
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = formatDate(new Date(year, month, day));
                    let entries = adminData.calendarEntries[dateStr] || [];

                    // 如果选中了地标，只统计该地标下的检查项条目
                    if (allowedCheckpointIds) {
                        entries = entries.filter(entry => allowedCheckpointIds.has(entry.checkpointId));
                    }

                    if (entries.length > 0) {
                        activeDays++;
                        // 统计该日期所有条目的待办完成情况
                        entries.forEach(entry => {
                            if (entry.description) {
                                const todos = markdownToTodos(entry.description);
                                todos.forEach(todo => {
                                    if (todo.completed) {
                                        completed++;
                                    } else {
                                        pending++;
                                    }
                                });
                            }
                        });
                    }
                }

                document.getElementById('statActive').textContent = activeDays;
                document.getElementById('statCompleted').textContent = completed;
                document.getElementById('statPending').textContent = pending;
            } catch (error) {
                console.error('更新统计失败:', error);
            }
        }

        /**
         * 将日期字符串解析为本地日期（避免时区问题）
         * @param {string} dateStr - 格式: "YYYY-MM-DD"
         * @returns {Date} - 本地日期对象
         */
        function parseLocalDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day); // month 是 0-based
        }

        /**
         * 格式化日期
         */
        function formatDate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // 确认弹窗回调函数
        let confirmCallback = null;

        /**
         * 显示确认弹窗
         * @param {Object} options - 配置选项
         * @param {string} options.title - 标题
         * @param {string} options.message - 消息内容
         * @param {string} options.icon - 图标（emoji）
         * @param {string} options.confirmText - 确认按钮文字
         * @param {string} options.confirmClass - 确认按钮样式类
         * @param {Function} options.onConfirm - 确认回调
         * @param {Function} options.onCancel - 取消回调
         */

        /**
         * 显示 Loading 遮罩
         */
        function showLoading(message = '处理中...') {
            let loading = document.getElementById('loadingOverlay');
            if (!loading) {
                loading = document.createElement('div');
                loading.id = 'loadingOverlay';
                loading.innerHTML = `
                    <div class="loading-content">
                        <div class="loading-spinner"></div>
                        <div class="loading-text"></div>
                    </div>
                `;
                document.body.appendChild(loading);
            }
            loading.querySelector('.loading-text').textContent = message;
            loading.classList.add('active');
        }

        /**
         * 隐藏 Loading 遮罩
         */
        function hideLoading() {
            const loading = document.getElementById('loadingOverlay');
            if (loading) {
                loading.classList.remove('active');
            }
        }

        /**
         * 显示 Toast 提示
         * @param {string} message - 提示消息
         * @param {string} type - 类型：'info' | 'warning' | 'success'
         * @param {number} duration - 显示时长（毫秒）
         */
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            if (!container) {
                console.error('Toast container not found');
                return;
            }

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;

            const iconMap = {
                info: 'ℹ️',
                warning: '⚠️',
                success: '✅'
            };

            toast.innerHTML = `
                <span class="toast-icon">${iconMap[type] || 'ℹ️'}</span>
                <span class="toast-message">${LifeRPG.security.escapeHtml(message)}</span>
            `;

            container.appendChild(toast);

            // 使用 requestAnimationFrame 确保 DOM 更新后再添加动画类
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });

            // 自动移除
            setTimeout(() => {
                toast.classList.add('hiding');
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 300);
            }, duration);
        }

        function showConfirmModal(options) {
            const modal = document.getElementById('confirmModal');
            const icon = document.getElementById('confirmIcon');
            const title = document.getElementById('confirmTitle');
            const message = document.getElementById('confirmMessage');
            const okBtn = document.getElementById('confirmOk');

            icon.textContent = options.icon || '⚠️';
            title.textContent = options.title || '确认操作';
            message.textContent = options.message || '确定要执行此操作吗？';
            okBtn.textContent = options.confirmText || '确认';

            // 设置确认按钮样式
            okBtn.className = 'rune-btn ' + (options.confirmClass || 'rune-btn-primary');

            confirmCallback = options.onConfirm || null;

            modal.classList.add('active');

            // 绑定取消回调
            if (options.onCancel) {
                document.getElementById('confirmCancel').onclick = function() {
                    closeConfirmModal();
                    options.onCancel();
                };
            } else {
                document.getElementById('confirmCancel').onclick = closeConfirmModal;
            }
        }

        /**
         * 关闭确认弹窗
         */
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmCallback = null;
        }

        /**
         * 生成唯一 ID
         * 使用随机数 + 时间戳，避免快速操作时产生重复 ID
         */
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        }

        /**
         * 执行确认回调
         */
        function executeConfirmCallback() {
            if (confirmCallback) {
                confirmCallback();
            }
            closeConfirmModal();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();

            // 点击遮罩关闭确认弹窗
            document.getElementById('confirmModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeConfirmModal();
                }
            });
        });
    </script>

    <!-- 自定义确认弹窗 -->
    <div class="confirm-modal-overlay" id="confirmModal">
        <div class="confirm-modal">
            <div class="confirm-modal-icon" id="confirmIcon">⚠️</div>
            <div class="confirm-modal-title" id="confirmTitle">确认操作</div>
            <div class="confirm-modal-message" id="confirmMessage">确定要执行此操作吗？</div>
            <div class="confirm-modal-actions">
                <button class="rune-btn rune-btn-secondary" id="confirmCancel" onclick="closeConfirmModal()">取消</button>
                <button class="rune-btn" id="confirmOk" onclick="executeConfirmCallback()">确认</button>
            </div>
        </div>
    </div>

    <!-- 周总结弹窗 -->
    <div class="weekly-summary-overlay" id="weeklySummaryModal" onclick="closeWeeklySummary(event)">
        <div class="weekly-summary-modal" onclick="event.stopPropagation()">
            <div class="weekly-summary-header">
                <h3>📊 本周总结</h3>
                <button class="close-btn" onclick="closeWeeklySummary()">×</button>
            </div>
            <div class="weekly-summary-content" id="weeklySummaryContent">
                <!-- 动态生成 -->
            </div>
            <div class="weekly-summary-actions">
                <button class="rune-btn rune-btn-secondary" onclick="closeWeeklySummary()">关闭</button>
                <button class="rune-btn rune-btn-secondary" onclick="syncWeeklySummaryToObsidian()">📝 发送到 Obsidian</button>
                <button class="rune-btn" onclick="exportWeeklySummary()">📥 导出 Markdown</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 自定义 Tooltip -->
    <div class="stripe-tooltip" id="stripeTooltip"></div>
</body>
