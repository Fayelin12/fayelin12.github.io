                    const { hour, minute, percent } = showSnapIndicator(topPx);
                    dragElement.style.top = percent + '%';

                    // 更新开始时间
                    const newStartTime = `${hour}:${String(minute).padStart(2, '0')}`;
                    dragElement.dataset.startTime = newStartTime;

                    // 保存数据
                    saveWeekViewEntryData(dragElement);

                    // 清除拖拽状态
                    dragElement.classList.remove('dragging');
                    delete dragElement.dataset.dragging;
                    delete dragElement.dataset.dragStartY;
                    delete dragElement.dataset.dragStartTop;
                    dragElement = null;
                    isDragging = false;
                } else if (dragElement && !isDragging) {
                    // 如果没有真正拖拽（移动距离小于阈值），清理状态
                    delete dragElement.dataset.dragStartY;
                    delete dragElement.dataset.dragStartTop;
                    dragElement = null;
                }
                hideSnapIndicator();
            }

            document.addEventListener('mouseup', handleMouseUp);

            // 备用：如果鼠标离开窗口也触发释放
            document.addEventListener('mouseleave', handleMouseUp);

            // 防止内存泄漏，在视图切换时清理
            weekViewBody.dataset.hasDragInit = 'true';
        }

        /**
         * 保存周视图检查项的时间和持续时间数据
         */
        function saveWeekViewEntryData(element) {
            const dateStr = element.dataset.date;
            const entryId = element.dataset.entryId;
            const startTime = element.dataset.startTime;
            const duration = parseInt(element.dataset.duration);

            console.log(`[WeekView] Saving entry ${entryId}: startTime=${startTime}, duration=${duration}`);

            // 更新数据
            if (adminData.calendarEntries[dateStr]) {
                const entry = adminData.calendarEntries[dateStr].find(e => e.id === entryId);
                if (entry) {
                    entry.startTime = startTime;
                    entry.duration = duration;
                    saveData();
                    console.log(`[WeekView] Saved successfully`);

                    // 自动重新渲染该日期的检查项以更新布局
                    refreshWeekViewDayCheckpoints(dateStr);
                }
            }
        }

        /**
         * 刷新周视图某一天的所有检查项显示
         * 用于拖动/调整大小后自动更新布局
         */
        function refreshWeekViewDayCheckpoints(dateStr) {
            const dayColumn = document.querySelector(`.week-day-content[data-date="${dateStr}"]`);
            if (!dayColumn) return;

            // 移除旧的检查项容器
            const oldCheckpoints = dayColumn.querySelector('.week-day-checkpoints');
            if (oldCheckpoints) {
                oldCheckpoints.remove();
            }

            // 重新渲染该日期的检查项
            const newCheckpointsHtml = renderWeekViewCheckpoints(dateStr);
            if (newCheckpointsHtml) {
                dayColumn.insertAdjacentHTML('beforeend', newCheckpointsHtml);
            }

            console.log(`[WeekView] Refreshed checkpoints for ${dateStr}`);
        }

        /**
         * 计算检查点的连续日期范围
         */
        function calculateStripeRanges(checkpointId) {
            const history = getCheckpointHistory(checkpointId);
            if (history.length === 0) return [];

            // 提取所有日期并排序
            const dates = history.map(h => h.date).sort();

            const ranges = [];
            let currentRange = {
                startDate: dates[0],
                endDate: dates[0],
                entries: [history.find(h => h.date === dates[0])]
            };

            for (let i = 1; i < dates.length; i++) {
                const prevDate = parseLocalDate(dates[i - 1]);
                const currDate = parseLocalDate(dates[i]);
                const diffDays = Math.round((currDate - prevDate) / (1000 * 60 * 60 * 24));

                if (diffDays === 1) {
                    // 连续日期，扩展当前范围
                    currentRange.endDate = dates[i];
                    currentRange.entries.push(history.find(h => h.date === dates[i]));
                } else {
                    // 不连续，保存当前范围并开始新范围
                    ranges.push({...currentRange});
                    currentRange = {
                        startDate: dates[i],
                        endDate: dates[i],
                        entries: [history.find(h => h.date === dates[i])]
                    };
                }
            }

            // 保存最后一个范围
            ranges.push(currentRange);

            // 计算每个范围的持续时间
            ranges.forEach(range => {
                range.duration = calculateDuration(range.startDate, range.endDate);
            });

            return ranges;
        }

        /**
         * 根据历时天数获取条带颜色类
         * 天数越长颜色越深（使用当月历时天数，最大31天均匀分布）
         */
        function getStripeColorByDuration(totalDuration) {
            if (totalDuration <= 1) return 'theme-gold-light';      // 1天
            if (totalDuration <= 6) return 'theme-gold';            // 2-6天
            if (totalDuration <= 12) return 'theme-gold-deep';      // 7-12天
            if (totalDuration <= 18) return 'theme-ember';          // 13-18天
            if (totalDuration <= 24) return 'theme-ember-deep';     // 19-24天
            return 'theme-slate';                                    // 25-31天
        }

        /**
         * 渲染检查点条带（分层 Grid 布局，支持 order 排序）
         */
        function renderCheckpointStripes(grid, year, month, firstDayWeekday, daysInMonth) {
            // 构建日期索引映射 - 只包含当月日期
            const dateIndexMap = {};
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = formatDate(date);
                const index = firstDayWeekday + (day - 1);
                dateIndexMap[dateStr] = {
                    index: index,
                    row: Math.floor(index / 7),
                    col: index % 7
                };
            }

            // 按行收集所有条带数据
            const rowStripesData = {}; // { rowIndex: [stripeData, ...] }

            // 获取选中的地标ID
            const selectedLandmarkId = getSelectedLandmarkId();

            // 获取选中地标下的所有检查项ID（用于过滤）
            let allowedCheckpointIds = null;
            if (selectedLandmarkId) {
                const landmarkCheckpoints = getCheckpointsByLandmark(selectedLandmarkId);
                allowedCheckpointIds = new Set(landmarkCheckpoints.map(cp => cp.id));
            }

            // 收集每个检查点的所有条目
            const checkpointData = {};
            Object.keys(adminData.calendarEntries || {}).forEach(dateStr => {
                const entries = adminData.calendarEntries[dateStr];
                entries.forEach(entry => {
                    // 如果选中了地标，只收集该地标下的检查项
                    if (allowedCheckpointIds && !allowedCheckpointIds.has(entry.checkpointId)) {
                        return;
                    }

                    if (!checkpointData[entry.checkpointId]) {
                        // 使用 getCheckpointHierarchy 获取层级信息，不再依赖 entry 中的冗余字段
                        const hierarchy = getCheckpointHierarchy(entry.checkpointId);
                        checkpointData[entry.checkpointId] = {
                            name: entry.checkpointName || hierarchy?.checkpointName || '未知检查项',
                            entries: [],
                            levelId: hierarchy?.levelId || null,
                            questId: hierarchy?.questId || null,
                            landmarkName: hierarchy?.landmarkName || '',
                            questName: hierarchy?.questName || '',
                            levelName: hierarchy?.levelName || ''
                        };
                    }
                    checkpointData[entry.checkpointId].entries.push({
                        ...entry,
                        date: dateStr
                    });
                });
            });

            // 为每个检查点计算连续范围并收集条带数据
            Object.keys(checkpointData).forEach(checkpointId => {
                const cpData = checkpointData[checkpointId];
                const ranges = calculateStripeRanges(checkpointId);

                ranges.forEach(range => {
                    // 检查该范围是否与当前月份有交集
                    const rangeStart = parseLocalDate(range.startDate);
                    const rangeEnd = parseLocalDate(range.endDate);
                    const monthStart = new Date(year, month, 1);
                    const monthEnd = new Date(year, month + 1, 0);

                    if (rangeEnd < monthStart || rangeStart > monthEnd) return;

                    const actualStartDate = rangeStart < monthStart ? formatDate(monthStart) : range.startDate;
                    const actualEndDate = rangeEnd > monthEnd ? formatDate(monthEnd) : range.endDate;

                    const startInfo = dateIndexMap[actualStartDate];
                    const endInfo = dateIndexMap[actualEndDate];

                    if (!startInfo || !endInfo) return;

                    const startRow = startInfo.row;
                    const startCol = startInfo.col;
                    const endCol = endInfo.col;
                    const duration = endCol - startCol + 1;

                    const firstEntry = cpData.entries.find(e => e.date === range.startDate);
                    if (!firstEntry) return;

                    // 获取 order 值（用于排序）
                    const order = firstEntry.order || 0;

                    const archiveDate = getCheckpointArchiveDate(checkpointId);
                    const isArchived = !!archiveDate;

                    const history = getCheckpointHistory(checkpointId);
                    const sortedHistory = [...history].sort((a, b) => new Date(a.date) - new Date(b.date));
                    const firstDate = sortedHistory.length > 0 ? sortedHistory[0].date : range.startDate;
                    const lastDate = sortedHistory.length > 0 ? sortedHistory[sortedHistory.length - 1].date : range.startDate;
                    const totalDuration = calculateDuration(firstDate, lastDate);

                    const isContinuous = range.startDate !== range.endDate;

                    let stripeClass = getStripeColorByDuration(duration);
                    if (isContinuous) {
                        stripeClass += ' continuous';
                    }
                    if (isArchived) {
                        stripeClass += ' archived';
                    }

                    let stripeContent;
                    if (isContinuous) {
                        stripeContent = `<span class="stripe-level">${LifeRPG.security.escapeHtml(cpData.levelName)}</span><span class="stripe-separator">›</span><span class="stripe-name">${LifeRPG.security.escapeHtml(cpData.name)}</span><span class="stripe-duration">${totalDuration}天</span>`;
                    } else {
                        stripeContent = `<span class="stripe-name">${LifeRPG.security.escapeHtml(cpData.name)}</span><span class="stripe-duration">${totalDuration}天</span>`;
                    }

                    // 收集条带数据
                    if (!rowStripesData[startRow]) rowStripesData[startRow] = [];
                    rowStripesData[startRow].push({
                        checkpointId,
                        startCol,
                        endCol,
                        order,
                        stripeClass,
                        stripeContent,
                        range,
                        cpData,
                        firstEntry,
                        isArchived,
                        totalDuration
                    });
                });
            });

            // 按行渲染条带，根据 order 排序
            Object.keys(rowStripesData).forEach(rowIndex => {
                const stripes = rowStripesData[rowIndex];

                // 按 order 排序，order 相同则按 startCol 排序
                stripes.sort((a, b) => {
                    if (a.order !== b.order) return a.order - b.order;
                    return a.startCol - b.startCol;
                });

                // 分配 level（考虑重叠）
                const occupied = []; // [{level, startCol, endCol}]
                stripes.forEach(stripeData => {
                    let level = 1;
                    let found = false;
                    while (!found) {
                        const conflict = occupied.some(o =>
                            o.level === level &&
                            !(stripeData.endCol < o.startCol || stripeData.startCol > o.endCol)
                        );
                        if (!conflict) {
                            found = true;
                        } else {
                            level++;
                        }
                    }
                    occupied.push({ level, startCol: stripeData.startCol, endCol: stripeData.endCol });
                    stripeData.level = level;
                });

                // 创建条带元素
                stripes.forEach(stripeData => {
                    const stripe = createStripeElement(stripeData, rowIndex);

                    // 添加到对应行的条带容器
                    const rowStripesContainer = grid.querySelector(`.row-stripes[data-row="${rowIndex}"]`);
                    if (rowStripesContainer) {
                        rowStripesContainer.appendChild(stripe);
                    }
                });
            });
        }

        /**
         * 创建条带元素
         */
        function createStripeElement(stripeData, rowIndex) {
            const {
                checkpointId, startCol, endCol, level, order,
                stripeClass, stripeContent, range, cpData, firstEntry
            } = stripeData;

            const stripe = document.createElement('div');
            stripe.className = `checkpoint-stripe ${stripeClass}`;
            stripe.innerHTML = stripeContent;
            // 禁用原生拖拽，使用纯JS方案
            stripe.draggable = false;
            stripe.style.setProperty('--start', startCol + 1);
            stripe.style.setProperty('--end', endCol + 2);
            stripe.style.setProperty('--level', level);
            stripe.dataset.checkpointId = checkpointId;
            stripe.dataset.startDate = range.startDate;
            stripe.dataset.endDate = range.endDate;
            stripe.dataset.entryId = firstEntry.id;
            stripe.dataset.levelId = cpData.levelId;
            stripe.dataset.questId = cpData.questId;
            stripe.dataset.landmark = LifeRPG.security.escapeHtml(cpData.landmarkName);
            stripe.dataset.quest = LifeRPG.security.escapeHtml(cpData.questName);
            stripe.dataset.level = LifeRPG.security.escapeHtml(cpData.levelName);
            stripe.dataset.cpName = LifeRPG.security.escapeHtml(cpData.name);
            stripe.dataset.sourceDate = range.startDate;
            stripe.dataset.rowIndex = rowIndex;
            stripe.dataset.order = order;

            // 悬停显示自定义 tooltip
            stripe.addEventListener('mousemove', showStripeTooltip);
            stripe.addEventListener('mouseleave', hideStripeTooltip);

            // 点击打开弹窗
            stripe.onclick = function(e) {
                e.stopPropagation();

                const startDateStr = this.dataset.startDate;
                const endDateStr = this.dataset.endDate;
                const startDate = parseLocalDate(startDateStr);
                const endDate = parseLocalDate(endDateStr);
                const dayCount = Math.round((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

                const rect = this.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const colWidth = rect.width / dayCount;
                const clickedDayOffset = Math.floor(clickX / colWidth);

                const clickedDate = new Date(startDate.getTime());
                clickedDate.setDate(startDate.getDate() + clickedDayOffset);
                const clickedDateStr = formatDate(clickedDate);

                const entries = adminData.calendarEntries[clickedDateStr] || [];
                const entry = entries.find(e => e.checkpointId === checkpointId);

                if (entry) {
                    openEntryModal(clickedDateStr, entry.id);
                } else {
                    openEntryModal(startDateStr, firstEntry.id);
                }
            };

            // 条带拖拽事件 - 纯JS方案统一处理
            stripe.addEventListener('mousedown', onStripeMouseDown);

            return stripe;
        }

        /**
         * 条带鼠标按下 - 统一入口
         * 纯JS拖拽方案：禁用原生HTML5拖拽，完全由鼠标事件接管
         */
        function onStripeMouseDown(e) {
            // 只响应左键
            if (e.button !== 0) return;

            const stripe = e.currentTarget;

            console.log('[StripeDrag] mousedown on stripe:', stripe.dataset.cpName);

            // 记录初始状态
            dragState.draggedStripe = stripe;
            dragState.startX = e.clientX;
            dragState.startY = e.clientY;
            dragState.sourceRowIndex = stripe.dataset.rowIndex;

            // 绑定全局鼠标事件
            document.addEventListener('mousemove', onStripeMouseMove);
            document.addEventListener('mouseup', onStripeMouseUp);

            // 阻止默认行为，防止选中文本
            e.preventDefault();
        }

        /**
         * 条带鼠标移动 - 意图检测与拖拽处理
         * 纯JS方案：根据移动方向判断意图，进入不同模式
         */
        function onStripeMouseMove(e) {
            const stripe = dragState.draggedStripe;
            if (!stripe) return;

            const deltaX = Math.abs(e.clientX - dragState.startX);
            const deltaY = Math.abs(e.clientY - dragState.startY);
            const minDistance = 5; // 最小移动阈值

            // 移动距离不够，继续等待
            if (dragState.mode === DragMode.NONE && deltaX < minDistance && deltaY < minDistance) {
                return;
            }

            // 意图检测阶段
            if (dragState.mode === DragMode.NONE) {
                if (deltaY > deltaX) {
                    // 垂直移动占主导 - 进入排序模式
                    console.log('[StripeDrag] Vertical intent, entering REORDER mode');
                    dragState.mode = DragMode.REORDER;
                    dragState.intent = 'vertical';
                    startReorderMode(stripe);
                } else {
                    // 水平移动占主导 - 进入跨格子拖拽模式
                    console.log('[StripeDrag] Horizontal intent, entering CROSS_CELL mode');
                    dragState.mode = DragMode.CROSS_CELL;
                    dragState.intent = 'horizontal';
                    startCrossCellMode(stripe, e);
                }
            }

            // 根据当前模式执行相应逻辑
            if (dragState.mode === DragMode.REORDER) {
                handleReorderMove(e);
            } else if (dragState.mode === DragMode.CROSS_CELL) {
                handleCrossCellMove(e);
            }
        }

        /**
         * 条带鼠标抬起 - 结束拖拽
         */
        function onStripeMouseUp(e) {
            // 移除全局鼠标事件
            document.removeEventListener('mousemove', onStripeMouseMove);
            document.removeEventListener('mouseup', onStripeMouseUp);

            const stripe = dragState.draggedStripe;
            if (!stripe) {
                dragState.reset();
                return;
            }

            // 根据当前模式执行结束逻辑
            if (dragState.mode === DragMode.REORDER) {
                finishReorder(e);
            } else if (dragState.mode === DragMode.CROSS_CELL) {
                finishCrossCell(e);
            }

            // 重置状态
            dragState.reset();
        }

        /**
         * 启动排序模式
         */
        function startReorderMode(stripe) {
            const rowIndex = stripe.dataset.rowIndex;
            const rowContainer = document.querySelector(`.row-stripes[data-row="${rowIndex}"]`);

            if (!rowContainer) {
                dragState.reset();
                return;
            }

            console.log('[Reorder] Start:', stripe.dataset.cpName);

            dragState.rowStripesContainer = rowContainer;
            dragState.startLevel = parseInt(stripe.style.getPropertyValue('--level')) || 1;

            // 视觉反馈
            stripe.classList.add('dragging');

            // 创建放置指示器
            const indicator = document.createElement('div');
            indicator.className = 'stripe-drop-indicator';
            indicator.style.display = 'none';
            rowContainer.appendChild(indicator);
            dragState.dropIndicator = indicator;
        }

        /**
         * 处理排序移动
         */
        function handleReorderMove(e) {
            const { draggedStripe, rowStripesContainer, dropIndicator } = dragState;
            if (!draggedStripe || !rowStripesContainer || !dropIndicator) return;

            // 检查是否移出容器
            const containerRect = rowStripesContainer.getBoundingClientRect();
            const isOutside = e.clientY < containerRect.top || e.clientY > containerRect.bottom;

            if (isOutside) {
                dropIndicator.style.display = 'none';
                return;
            }

            // 获取容器内所有条带
            const allStripes = [...rowStripesContainer.querySelectorAll('.checkpoint-stripe')];
            const totalStripes = allStripes.length;

            // 计算目标位置
            const relativeY = e.clientY - containerRect.top;
            const rowHeight = 20;
            const gap = 2;
            const totalRowHeight = rowHeight + gap;
            const maxLevel = totalStripes + 1;

            let targetLevel = Math.floor(relativeY / totalRowHeight) + 1;
            targetLevel = Math.max(1, Math.min(maxLevel, targetLevel));

            dragState.targetLevel = targetLevel;

            // 显示放置指示器
            const indicatorTop = (targetLevel - 1) * totalRowHeight;
            dropIndicator.style.display = 'block';
            dropIndicator.style.top = Math.max(-2, indicatorTop) + 'px';
        }

        /**
         * 结束排序
         */
        function finishReorder(e) {
            const { draggedStripe, rowStripesContainer, targetLevel, startLevel } = dragState;

            if (!draggedStripe || !rowStripesContainer) return;

            console.log('[Reorder] End, target:', targetLevel, 'start:', startLevel);

            // 移除视觉反馈
            draggedStripe.classList.remove('dragging');

            // 执行重排
            if (targetLevel && targetLevel !== startLevel) {
                reorderStripesInRow(rowStripesContainer, draggedStripe, targetLevel);
            }

            // 移除放置指示器
            const indicator = rowStripesContainer.querySelector('.stripe-drop-indicator');
            if (indicator) indicator.remove();
        }

        /**
         * 条带排序 - 移动
         */
        function onReorderDragMove(e) {
            if (dragState.mode !== DragMode.REORDER) return;

            const { draggedStripe, rowStripesContainer, dropIndicator } = dragState;

            // 检查是否移出容器
            const containerRect = rowStripesContainer.getBoundingClientRect();
            const isOutside = e.clientY < containerRect.top || e.clientY > containerRect.bottom;

            if (isOutside) {
                console.log('[Reorder] Outside container, canceling');
                cancelReorder();
                return;
            }

            // 获取容器内所有条带（包括正在拖拽的，用于计算总数）
            const allStripes = [...rowStripesContainer.querySelectorAll('.checkpoint-stripe')];
            const totalStripes = allStripes.length;

            // 计算目标位置
            const relativeY = e.clientY - containerRect.top;

            // 计算实际条带高度（包含 gap）
            // grid-auto-rows: 20px, gap: 2px 0
            const rowHeight = 20;
            const gap = 2;
            const totalRowHeight = rowHeight + gap;

            // 最大层级 = 总条带数 + 1（可以拖到最后一行之后）
            const maxLevel = totalStripes + 1;

            // 计算目标层级（1-based）
            let targetLevel = Math.floor(relativeY / totalRowHeight) + 1;
            targetLevel = Math.max(1, Math.min(maxLevel, targetLevel));

            dragState.targetLevel = targetLevel;

            // 显示放置指示器
            const indicatorTop = (targetLevel - 1) * totalRowHeight;
            dropIndicator.style.display = 'block';
            dropIndicator.style.top = Math.max(-2, indicatorTop) + 'px';
        }

        /**
         * 条带排序 - 结束
         */
        function onReorderDragEnd(e) {
            if (dragState.mode !== DragMode.REORDER) return;

            const { draggedStripe, rowStripesContainer, targetLevel, startLevel } = dragState;

            console.log('[Reorder] End, target:', targetLevel, 'start:', startLevel);

            // 执行重排
            if (targetLevel && targetLevel !== startLevel) {
                reorderStripesInRow(rowStripesContainer, draggedStripe, targetLevel);
            }

            // 清理
            cleanupReorder();
        }

        /**
         * 取消排序
         */
        function cancelReorder() {
            cleanupReorder();
        }

        /**
         * 清理排序状态
         */
        function cleanupReorder() {
            const { draggedStripe, dropIndicator } = dragState;

            if (draggedStripe) {
                draggedStripe.classList.remove('dragging');
                draggedStripe.draggable = true; // 恢复跨格子拖动能力
            }

            if (dropIndicator) {
                dropIndicator.remove();
            }

            dragState.reset();
        }

        /**
         * 启动跨格子拖拽模式
         */
        function startCrossCellMode(stripe, e) {
            console.log('[CrossCell] Start ghost drag:', stripe.dataset.cpName);

            // 设置 draggedCheckpoint 用于跨格子拖放
            draggedCheckpoint = {
                id: stripe.dataset.checkpointId,
                levelId: stripe.dataset.levelId,
                questId: stripe.dataset.questId,
                name: stripe.dataset.cpName,
                landmark: stripe.dataset.landmark,
                quest: stripe.dataset.quest,
                level: stripe.dataset.level,
                sourceDate: stripe.dataset.sourceDate,
                isMoving: true,
                isStripe: true
            };

            // 创建幽灵元素
            const ghost = stripe.cloneNode(true);
            ghost.classList.add('stripe-ghost');
            ghost.style.position = 'fixed';
            ghost.style.pointerEvents = 'none';
            ghost.style.zIndex = '9999';
            ghost.style.opacity = '0.8';
            ghost.style.width = stripe.offsetWidth + 'px';
            ghost.style.height = stripe.offsetHeight + 'px';
            document.body.appendChild(ghost);
            dragState.ghostElement = ghost;

            // 初始位置
            updateGhostPosition(e.clientX, e.clientY);

            // 视觉反馈
            stripe.classList.add('dragging');
            document.body.classList.add('dragging');
        }

        /**
         * 更新幽灵元素位置
         */
        function updateGhostPosition(clientX, clientY) {
            const ghost = dragState.ghostElement;
            if (!ghost) return;

            const offsetX = ghost.offsetWidth / 2;
            const offsetY = ghost.offsetHeight / 2;
            ghost.style.left = (clientX - offsetX) + 'px';
            ghost.style.top = (clientY - offsetY) + 'px';
        }

        /**
         * 处理跨格子移动
         */
        function handleCrossCellMove(e) {
            // 更新幽灵元素位置
            updateGhostPosition(e.clientX, e.clientY);

            // 使用 elementFromPoint 检测当前悬停的行
            const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
            if (!elementBelow) return;

            // 查找行容器
            const rowContainer = elementBelow.closest('.row-stripes');
            if (rowContainer) {
                const rowIndex = rowContainer.dataset.row;
                if (rowIndex !== dragState.currentRowIndex) {
                    dragState.currentRowIndex = rowIndex;
                    console.log('[CrossCell] Hovering row:', rowIndex);
                }
            }
        }

        /**
         * 结束跨格子拖拽
         */
        function finishCrossCell(e) {
            const stripe = dragState.draggedStripe;
            const ghost = dragState.ghostElement;

            if (!stripe) return;

            console.log('[CrossCell] Finish ghost drag');

            // 移除幽灵元素
            if (ghost) {
                ghost.remove();
            }

            // 移除视觉反馈
            stripe.classList.remove('dragging');
            document.body.classList.remove('dragging');

            // 使用 elementFromPoint 获取释放位置的元素
            const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
            if (elementBelow) {
                // 检查是否释放在有效的放置区域
                const chamberCell = elementBelow.closest('.chamber-cell');
                const rowStripes = elementBelow.closest('.row-stripes');

                if (chamberCell || rowStripes) {
                    // 获取目标日期
                    let targetDate = null;
                    if (chamberCell) {
                        targetDate = chamberCell.dataset.date;
                    } else if (rowStripes) {
                        // 从行容器获取日期（需要计算）
                        targetDate = getDateFromRowStripes(rowStripes, e.clientX);
                    }

                    if (targetDate && targetDate !== stripe.dataset.sourceDate) {
                        console.log('[CrossCell] Dropped on date:', targetDate);
                        // 执行跨格子移动
                        executeCrossCellMove(stripe, targetDate);
                    }
                }
            }

            draggedCheckpoint = null;
        }

        /**
         * 执行跨格子移动
         */
        function executeCrossCellMove(stripe, targetDate) {
            const checkpointId = stripe.dataset.checkpointId;
            const sourceDate = stripe.dataset.sourceDate;

            // 检查目标日期是否已有相同检查点
            const targetEntries = adminData.calendarEntries[targetDate] || [];
            const existingEntry = targetEntries.find(e => e.checkpointId === checkpointId);

            if (existingEntry) {
                showToast('目标日期已有该检查点', 'warning');
                return;
            }

            // 创建新记录
            const newEntry = {
                id: generateId(),
                checkpointId: checkpointId,
                checkpointName: stripe.dataset.cpName,
                description: '',
                tags: [],
                completed: false,
                createdAt: new Date().toISOString()
            };

            if (!adminData.calendarEntries[targetDate]) {
                adminData.calendarEntries[targetDate] = [];
            }
            adminData.calendarEntries[targetDate].push(newEntry);

            // 更新 checkpointCompletions
            if (!adminData.checkpointCompletions[checkpointId]) {
                adminData.checkpointCompletions[checkpointId] = [];
            }
            adminData.checkpointCompletions[checkpointId].push({
                date: targetDate,
                entryId: newEntry.id,
                completed: false
            });

            saveData();
            renderChamberGrid();
            updateStats();

            showToast(`已移动到 ${targetDate}`, 'success');
        }

        /**
         * 重排行内条带顺序
         */
        function reorderStripesInRow(rowContainer, draggedStripe, targetLevel) {
            const checkpointId = draggedStripe.dataset.checkpointId;
            const startDate = draggedStripe.dataset.startDate;
            const endDate = draggedStripe.dataset.endDate;

            // 获取当前所有条带（按当前DOM顺序）
            const allStripes = [...rowContainer.querySelectorAll('.checkpoint-stripe')];
            const draggedIndex = allStripes.indexOf(draggedStripe);

            // 如果找不到拖拽的条带，退出
            if (draggedIndex === -1) {
                console.error('找不到拖拽的条带，可能DOM已变化');
                return;
            }

            // 重新排序条带数组
            allStripes.splice(draggedIndex, 1);
            allStripes.splice(targetLevel - 1, 0, draggedStripe);

            // 收集新的顺序映射 {checkpointId: newOrder}
            // 注意：同一个 checkpointId 在同一天内可能出现多次（跨天条带分段显示）
            const newOrderMap = {};
            allStripes.forEach((stripe, index) => {
                const cpId = stripe.dataset.checkpointId;
                // 使用第一次出现的索引作为 order（因为跨天条带的所有分段应该共享同一个 order）
                if (!newOrderMap.hasOwnProperty(cpId)) {
                    newOrderMap[cpId] = index;
                }
            });

            // 更新所有条带所有日期的 entry order
            allStripes.forEach(stripe => {
                const cpId = stripe.dataset.checkpointId;
                const sDate = stripe.dataset.startDate;
                const eDate = stripe.dataset.endDate;
                const newOrder = newOrderMap[cpId];

                let curr = parseLocalDate(sDate);
                const end = parseLocalDate(eDate);
                while (curr <= end) {
                    const dateStr = formatDate(new Date(curr));
                    const entries = adminData.calendarEntries[dateStr];
                    if (entries) {
                        const entry = entries.find(e => e.checkpointId === cpId);
                        if (entry) {
                            entry.order = newOrder;
                        }
                    }
                    curr.setDate(curr.getDate() + 1);
                }
            });

            // 保存数据
            saveData();

            // 重新渲染整个日历（确保跨天条带的所有部分都更新）
            renderChamberGrid();

            // 显示提示
            showToast('条带顺序已更新', 'success');
        }



        /**
         * 从条带容器获取目标日期
         * 根据鼠标X坐标计算落在哪一列，结合行索引导出日期
         */
        function getDateFromRowStripes(rowStripes, clientX) {
            const rect = rowStripes.getBoundingClientRect();
            const relativeX = clientX - rect.left;

            // 检测是否隐藏周末
            const grid = document.querySelector('.chamber-grid');
            const isWeekendCollapsed = grid && grid.classList.contains('weekend-collapsed');

            // 获取行索引
            const rowIndex = parseInt(rowStripes.dataset.row);

            // 计算当前月的第一天是星期几
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const startDayOfWeek = firstDay.getDay(); // 0=周日, 1=周一...

            // 计算该行的起始日期
            const rowStartDayOfMonth = rowIndex * 7 - startDayOfWeek + 1;

            let targetDate;

            if (isWeekendCollapsed) {
                // 隐藏周末时，条带容器是5列（周一到周五）
                // 需要找到该行所有工作日，然后根据鼠标位置选择对应的工作日

                // 收集该行的所有工作日
                const workDays = [];
                for (let i = 0; i < 7; i++) {
                    const checkDay = rowStartDayOfMonth + i;
                    if (checkDay < 1) continue;

                    const checkDate = new Date(year, month, checkDay);
                    const checkDayOfWeek = checkDate.getDay();

                    // 只收集工作日
                    if (checkDayOfWeek !== 0 && checkDayOfWeek !== 6) {
                        workDays.push({
                            dayOfMonth: checkDay,
                            date: checkDate,
                            colIndex: i // 在7列网格中的列索引
                        });
                    }
                }

                // 如果没有工作日，返回该行的第一个有效日期
                if (workDays.length === 0) {
                    targetDate = new Date(year, month, Math.max(1, rowStartDayOfMonth));
                    return formatDate(targetDate);
                }

                // 根据鼠标X位置计算落在哪个工作日
                const colWidth = rect.width / workDays.length;
                let colIndex = Math.floor(relativeX / colWidth);
                colIndex = Math.max(0, Math.min(colIndex, workDays.length - 1));

                targetDate = workDays[colIndex].date;
            } else {
                // 正常模式，7列
                const colWidth = rect.width / 7;
                let colIndex = Math.floor(relativeX / colWidth);
                colIndex = Math.max(0, Math.min(colIndex, 6));

                const dayOfMonth = rowIndex * 7 + colIndex - startDayOfWeek + 1;
                targetDate = new Date(year, month, dayOfMonth);
            }

            return formatDate(targetDate);
        }

        /**
         * 创建检查点记录
         */
        function createCheckpointEntry(dateStr, checkpoint) {
            console.group('[CreateEntry] 创建日历记录');
            console.log('拖拽的checkpoint:', checkpoint);

            // 步骤1: 尝试直接查找（用拖拽带来的ID）
            let effectiveCheckpointId = checkpoint.id ? String(checkpoint.id) : '';
            let foundInLevels = effectiveCheckpointId;

            // 步骤2: 如果直接查找失败，通过名称+关卡信息反向查找正确的ID
            if (!foundInLevels) {
                console.log('ID为空，尝试通过名称和关卡信息查找...');
                foundInLevels = findCheckpointIdByName(
                    checkpoint.name,
                    checkpoint.levelId,
                    checkpoint.questId
                );
                if (foundInLevels) {
                    console.log('通过反向查找找到ID:', foundInLevels);
                    effectiveCheckpointId = foundInLevels;
                }
            }

            // 步骤3: 如果还是找不到，检查是否是因为关卡数据ID和日历记录ID不一致
            // 这种情况下，通过名称在关卡数据中模糊匹配
            if (!foundInLevels && checkpoint.name) {
                console.log('反向查找失败，尝试通过名称在关卡数据中模糊匹配...');
                foundInLevels = findCheckpointIdByNameInAllLevels(checkpoint.name);
                if (foundInLevels) {
                    console.log('通过名称模糊匹配找到ID:', foundInLevels);
                    effectiveCheckpointId = foundInLevels;
                }
            }

            // 步骤4: 如果所有查找都失败，生成新ID（仅在确实不存在时）
            if (!effectiveCheckpointId) {
                console.warn('所有查找都失败，生成新ID');
                effectiveCheckpointId = generateId();
            }

            console.log('最终使用的checkpointId:', effectiveCheckpointId);
            console.groupEnd();
            
            // 检查该日期是否已有相同检查项（同一检查点ID）
            const existingEntries = adminData.calendarEntries[dateStr] || [];
            console.log('📋 该日期已有条目数:', existingEntries.length);
            
            const existingEntry = existingEntries.find((entry, idx) => {
                const storedId = String(entry.checkpointId || '');
                const isMatch = storedId === effectiveCheckpointId && storedId !== '';
                
                const existingHierarchy = getCheckpointHierarchy(entry.checkpointId);
                const existingLevelName = existingHierarchy?.levelName || entry.levelName || '';
                console.log(`  条目[${idx}] checkpointId: ${entry.checkpointId} (${typeof entry.checkpointId}), 名称: ${entry.checkpointName}, 关卡: ${existingLevelName}`);
                console.log(`  比较: "${storedId}" === "${effectiveCheckpointId}" => ${isMatch}`);
                
                return isMatch;
            });
            console.groupEnd();

            if (existingEntry) {
                // 提供更详细的错误信息
                // 使用 getCheckpointHierarchy 获取层级信息
                const existingHierarchy = getCheckpointHierarchy(existingEntry.checkpointId);
                const existingLevelName = existingHierarchy?.levelName || existingEntry.levelName || '';
                const msg = `「${checkpoint.name}」已在该日期存在（${existingLevelName}）`;
                showToast(msg, 'warning');
                console.warn('[Duplicate] 详细对比:', {
                    dragging: {
                        id: checkpoint.id,
                        idType: typeof checkpoint.id,
                        name: checkpoint.name,
                        level: checkpoint.level
                    },
                    existing: {
                        id: existingEntry.checkpointId,
                        idType: typeof existingEntry.checkpointId,
                        name: existingEntry.checkpointName,
                        level: existingLevelName
                    }
                });
                return false;
            }

            // 注意：允许同名但不同ID的检查项存在（不同关卡可能有同名检查项）

            // 不再存储冗余字段，只保存核心数据
            const entry = {
                id: generateId(),
                checkpointId: effectiveCheckpointId,
                checkpointName: checkpoint.name,
                date: dateStr,
                description: '',
                completed: false,
                createdAt: new Date().toISOString()
            };

            if (!adminData.calendarEntries[dateStr]) {
                adminData.calendarEntries[dateStr] = [];
            }
            adminData.calendarEntries[dateStr].push(entry);

            if (!adminData.checkpointCompletions[effectiveCheckpointId]) {
                adminData.checkpointCompletions[effectiveCheckpointId] = [];
            }
            adminData.checkpointCompletions[effectiveCheckpointId].push({
                date: dateStr,
                entryId: entry.id,
                archived: false
            });

            saveData();
            renderScrollArchive();
            renderChamberGrid();
            updateStats();

            return true;
        }

        /**
         * 绑定密室拖拽事件
         */
        function bindChamberDragEvents() {
            try {
                // 绑定日期格子拖放事件
                const chambers = document.querySelectorAll('.time-chamber');
                chambers.forEach(chamber => {
                    LifeRPG.events.add(chamber, 'dragover', function(e) {
                        e.preventDefault();
                        this.classList.add('drag-over');
                    });

                    LifeRPG.events.add(chamber, 'dragleave', function() {
                        this.classList.remove('drag-over');
                    });

                    LifeRPG.events.add(chamber, 'drop', function(e) {
                        e.preventDefault();
                        this.classList.remove('drag-over');

                        console.log('[Drop] drop event fired, draggedCheckpoint:', draggedCheckpoint);

                        if (!draggedCheckpoint) return;

                        const dateStr = this.dataset.date;

                        console.log('[Drop] target date:', dateStr, 'source date:', draggedCheckpoint.sourceDate);

                        // 如果是条带拖动
                        if (draggedCheckpoint.isStripe) {
                            // 如果是同一日期，不处理（让排序逻辑处理或忽略）
                            if (draggedCheckpoint.sourceDate === dateStr) {
                                console.log('[Drop] Same date, ignoring');
                                draggedCheckpoint = null;
                                return;
                            }
                            // 跨格子拖动，继续执行创建新记录逻辑
                            console.log('[Drop] Cross-cell drag detected, creating new entry');
                        }

                        createCheckpointEntry(dateStr, draggedCheckpoint);
                        draggedCheckpoint = null;
                    });
                });

                // 绑定条带容器拖放事件
                const rowStripesContainers = document.querySelectorAll('.row-stripes');
                rowStripesContainers.forEach(container => {
                    LifeRPG.events.add(container, 'dragover', function(e) {
                        // 如果正在执行条带排序，不处理拖放事件
                        if (dragState.mode === DragMode.REORDER) return;

                        e.preventDefault();
                        this.classList.add('drag-over');
                    });

                    LifeRPG.events.add(container, 'dragleave', function() {
                        // 如果正在执行条带排序，不处理
                        if (dragState.mode === DragMode.REORDER) return;

                        this.classList.remove('drag-over');
                    });

                    LifeRPG.events.add(container, 'drop', function(e) {
                        // 如果正在执行条带排序，不处理拖放事件
                        if (dragState.mode === DragMode.REORDER) return;

                        e.preventDefault();
                        this.classList.remove('drag-over');

                        console.log('[Drop] drop on row-stripes, draggedCheckpoint:', draggedCheckpoint);

                        if (!draggedCheckpoint) return;

                        // 计算目标日期
                        const dateStr = getDateFromRowStripes(this, e.clientX);

                        console.log('[Drop] calculated date:', dateStr, 'source date:', draggedCheckpoint.sourceDate);

                        // 如果是条带拖动且同一日期，不处理
                        if (draggedCheckpoint.isStripe && draggedCheckpoint.sourceDate === dateStr) {
                            console.log('[Drop] Same date on stripe container, ignoring');
                            draggedCheckpoint = null;
                            return;
                        }

                        createCheckpointEntry(dateStr, draggedCheckpoint);
                        draggedCheckpoint = null;
                    });
                });
            } catch (error) {
                console.error('绑定密室拖拽事件失败:', error);
            }
        }

        /**
         * 移动历史未完成的待办到今天
         */
        async function moveUnfinishedTodosToToday(checkpointId, todayStr) {
            const history = getCheckpointHistory(checkpointId);
            if (history.length === 0) return;

            let hasMoved = false;
            const todayEntry = adminData.calendarEntries[todayStr]?.find(e => e.checkpointId === checkpointId);
            if (!todayEntry) return;

            // 获取今天的待办列表
            let todayTodos = todayEntry.description ? markdownToTodos(todayEntry.description) : [];

            // 遍历历史记录，查找未完成的待办
            for (const record of history) {
                if (record.date === todayStr) continue; // 跳过今天

                const entries = adminData.calendarEntries[record.date] || [];
                const entry = entries.find(e => e.checkpointId === checkpointId);
                if (!entry || !entry.description) continue;

                const todos = markdownToTodos(entry.description);
                const unfinishedTodos = todos.filter(t => !t.completed);

                if (unfinishedTodos.length > 0) {
                    // 将未完成的待办移动到今天
                    todayTodos = [...todayTodos, ...unfinishedTodos];

                    // 从历史记录中移除已移动的待办（标记为完成）
                    const finishedTodos = todos.filter(t => t.completed);
                    entry.description = todosToMarkdown(finishedTodos);

                    hasMoved = true;
                }
            }

            if (hasMoved) {
                // 更新今天的待办
                todayEntry.description = todosToMarkdown(todayTodos);
                saveData();

                // 显示提示
                showToast('已将历史未完成的待办移动到今日', 'success');
            }
        }
