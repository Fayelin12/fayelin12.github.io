<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命名管理 | LIFE RPG</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="common.js"></script>
    <style>
        /* 页面特有样式 */
    </style>
</head>
<body>
    <div class="bg-texture"></div>

    <header class="temple-header">
        <div class="temple-brand">
            <div class="temple-seal">⚔️</div>
            <div class="temple-title">LIFE RPG</div>
        </div>
        <nav class="temple-nav">
            <a href="index.html" class="nav-rune">世界地图</a>
            <a href="admin.html" class="nav-rune active">命名管理</a>
            <a href="quest-admin.html" class="nav-rune">任务管理</a>
            <a href="level-admin.html" class="nav-rune">关卡管理</a>
            <a href="calendar.html" class="nav-rune">日历视图</a>
        </nav>
    </header>

    <!-- 主内容 -->
    <main class="main-container">
        <div class="page-header">
            <h1>命名管理系统</h1>
            <p>管理标签类型和地标命名</p>
        </div>

        <div class="panels-grid">
            <!-- 标签管理面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="panel-title-icon">🏷️</span>
                        地标类型标签
                    </div>
                    <span class="panel-count" id="tagCount">0 个标签</span>
                </div>
                <div class="panel-body">
                    <!-- 添加标签表单 -->
                    <div class="form-section">
                        <div class="form-row">
                            <div class="form-group" style="flex: 0 0 80px;">
                                <label>图标</label>
                                <select id="newTagIcon">
                                    <!-- 动态生成 -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label>标签名称</label>
                                <input type="text" id="newTagName" placeholder="例如：城堡、废墟、魔法学院">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>描述（可选）</label>
                                <input type="text" id="newTagDesc" placeholder="简短描述这个标签的用途">
                            </div>
                            <div class="form-group" style="flex: 0 0 120px; display: flex; align-items: flex-end;">
                                <button class="btn btn-primary" onclick="addTag()" style="width: 100%;">添加标签</button>
                            </div>
                        </div>
                    </div>

                    <!-- 标签列表 -->
                    <div class="item-list" id="tagList">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 地标管理面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="panel-title-icon">🗺️</span>
                        地标命名库
                    </div>
                    <span class="panel-count" id="landmarkCount">0 个地标</span>
                </div>
                <div class="panel-body">
                    <!-- 添加地标表单 -->
                    <div class="form-section">
                        <div class="form-row">
                            <div class="form-group" style="flex: 0 0 80px;">
                                <label>图标</label>
                                <select id="newLandmarkIcon">
                                    <!-- 动态生成 -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label>地标名称</label>
                                <input type="text" id="newLandmarkName" placeholder="例如：史东薇尔城">
                            </div>
                            <div class="form-group" style="flex: 0 0 150px;">
                                <label>类型</label>
                                <select id="newLandmarkType">
                                    <!-- 动态从标签加载 -->
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>描述</label>
                                <textarea id="newLandmarkDesc" placeholder="描述这个地标的特点和背景..."></textarea>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>BOSS名称（可选）</label>
                                <input type="text" id="newLandmarkBoss" placeholder="镇守此地的BOSS">
                            </div>
                            <div class="form-group" style="flex: 0 0 120px; display: flex; align-items: flex-end;">
                                <button class="btn btn-primary" onclick="addLandmark()" style="width: 100%;">添加地标</button>
                            </div>
                        </div>
                    </div>

                    <!-- 地标列表 -->
                    <div class="item-list" id="landmarkList">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- 提示消息 -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message">操作成功</span>
    </div>

    <script>
        // 数据存储
        let adminData = {
            tags: [
                { id: 1, name: '城堡', icon: '🏰', desc: '古老的防御工事，通常由贵族统治' },
                { id: 2, name: '洞窟', icon: '🕳️', desc: '地下洞穴，常有怪物栖息' },
                { id: 3, name: '废墟', icon: '🗿', desc: '曾经繁荣的城市遗迹' },
                { id: 4, name: '魔法学院', icon: '🔮', desc: '魔法师学习和研究的地方' },
                { id: 5, name: '森林', icon: '🌲', desc: '茂密的树林，充满神秘' },
                { id: 6, name: '山脉', icon: '⛰️', desc: '高耸入云的山峰' }
            ],
            landmarks: [
                { id: 1, name: '史东薇尔城', icon: '🏰', type: '城堡', desc: '一座被战争摧毁的古老城堡，隐藏着无数秘密', boss: '接肢贵族' },
                { id: 2, name: '摩恩城', icon: '🗿', type: '废墟', desc: '曾经繁荣的城市，如今只剩下断壁残垣', boss: '狮子混种' },
                { id: 3, name: '求学洞窟', icon: '🕳️', type: '洞窟', desc: '魔法师们曾经的修行之地', boss: '魔像守卫' },
                { id: 4, name: '雷亚卢卡利亚', icon: '🔮', type: '魔法学院', desc: '辉石魔法师的最高学府', boss: '满月女王' },
                { id: 5, name: '希芙拉河', icon: '🕳️', type: '洞窟', desc: '地下河流，永恒之城的一部分', boss: '祖灵' },
                { id: 6, name: '盖利德要塞', icon: '🏰', type: '城堡', desc: '被猩红腐败侵蚀的堡垒', boss: '熔炉骑士' }
            ],
            landmarkQuests: {
                1: [
                    { id: 101, name: '探索城堡外围', type: 'main', rewardType: 'exp', rewardAmount: 100, desc: '初步探索区域' },
                    { id: 102, name: '寻找隐藏的密室', type: 'side', rewardType: 'fragment', rewardAmount: 1, desc: '发现秘密区域' },
                    { id: 103, name: '击败守卫队长', type: 'main', rewardType: 'exp', rewardAmount: 200, desc: '战胜强敌' },
                    { id: 104, name: '收集古代符文', type: 'side', rewardType: 'fragment', rewardAmount: 1, desc: '收集稀有物品' }
                ],
                2: [
                    { id: 201, name: '调查废墟', type: 'main', rewardType: 'exp', rewardAmount: 150, desc: '探索废弃区域' },
                    { id: 202, name: '寻找幸存者', type: 'side', rewardType: 'fragment', rewardAmount: 1, desc: '救援任务' }
                ],
                3: [
                    { id: 301, name: '学习基础魔法', type: 'main', rewardType: 'exp', rewardAmount: 100, desc: '掌握新技能' },
                    { id: 302, name: '收集魔法材料', type: 'side', rewardType: 'fragment', rewardAmount: 1, desc: '采集资源' }
                ],
                4: [
                    { id: 401, name: '通过入学考试', type: 'main', rewardType: 'exp', rewardAmount: 300, desc: '证明你的魔法天赋' },
                    { id: 402, name: '借阅禁书', type: 'side', rewardType: 'fragment', rewardAmount: 1, desc: '获取禁忌知识' }
                ],
                5: [
                    { id: 501, name: '点燃八座火盆', type: 'main', rewardType: 'exp', rewardAmount: 200, desc: '照亮地下世界' }
                ],
                6: [
                    { id: 601, name: '清除腐败', type: 'main', rewardType: 'exp', rewardAmount: 250, desc: '净化被侵蚀的区域' }
                ]
            }
        };

        /**
         * 生成唯一ID
         */
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        }

        /**
         * 初始化
         */
        function init() {
            try {
                loadData();
                renderTags();
                renderLandmarks();
                updateTypeSelect();
                initIconSelects();
            } catch (error) {
                console.error('初始化失败:', error);
                showToast('初始化失败，请刷新页面重试', '⚠️');
            }
        }

        /**
         * 初始化图标选择器
         */
        function initIconSelects() {
            const icons = LifeRPG.constants.ICONS;
            const tagIconSelect = document.getElementById('newTagIcon');
            const landmarkIconSelect = document.getElementById('newLandmarkIcon');

            const iconOptions = icons.map(icon => `<option value="${icon}">${icon}</option>`).join('');

            if (tagIconSelect) tagIconSelect.innerHTML = iconOptions;
            if (landmarkIconSelect) landmarkIconSelect.innerHTML = iconOptions;
        }

        /**
         * 从localStorage加载数据
         */
        function loadData() {
            try {
                const savedData = LifeRPG.data.load();
                if (savedData) {
                    adminData = {
                        ...adminData,
                        ...savedData,
                        landmarkQuests: savedData.landmarkQuests || adminData.landmarkQuests || {}
                    };
                    // 为没有任务的地标初始化空数组
                    adminData.landmarks.forEach(lm => {
                        if (!adminData.landmarkQuests[lm.id]) {
                            adminData.landmarkQuests[lm.id] = [];
                        }
                    });
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        /**
         * 保存数据到localStorage
         */
        function saveData() {
            try {
                LifeRPG.data.save(adminData);
            } catch (error) {
                console.error('保存数据失败:', error);
                showToast('保存失败', '⚠️');
            }
        }

        /**
         * 显示提示
         */
        function showToast(message, icon = '✓') {
            try {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.querySelector('.toast-icon').textContent = icon;
                toast.querySelector('.toast-message').textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            } catch (error) {
                console.error('显示提示失败:', error);
            }
        }

        // ========== 标签管理 ==========

        /**
         * 渲染标签列表
         */
        function renderTags() {
            try {
                const list = document.getElementById('tagList');
                const count = document.getElementById('tagCount');
                if (!list || !count) return;

                count.textContent = `${adminData.tags.length} 个标签`;

                if (adminData.tags.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🏷️</div>
                            <p>暂无标签，请添加</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = adminData.tags.map(tag => `
                    <div class="item" id="tag-${tag.id}">
                        <div class="item-icon">${tag.icon}</div>
                        <div class="item-content">
                            <div class="item-name">${LifeRPG.security.escapeHtml(tag.name)}</div>
                            <div class="item-desc">${LifeRPG.security.escapeHtml(tag.desc || '暂无描述')}</div>
                        </div>
                        <div class="item-actions">
                            <button class="btn btn-secondary btn-small" onclick="editTag(${tag.id})">编辑</button>
                            <button class="btn btn-danger" onclick="deleteTag(${tag.id})">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('渲染标签失败:', error);
            }
        }

        /**
         * 添加标签
         */
        function addTag() {
            try {
                const icon = document.getElementById('newTagIcon').value;
                const name = document.getElementById('newTagName').value.trim();
                const desc = document.getElementById('newTagDesc').value.trim();

                if (!name) {
                    showToast('请输入标签名称', '⚠️');
                    return;
                }

                if (adminData.tags.some(t => t.name === name)) {
                    showToast('该标签已存在', '⚠️');
                    return;
                }

                const newTag = {
                    id: generateId(),
                    name: name,
                    icon: icon,
                    desc: desc
                };

                adminData.tags.push(newTag);
                saveData();
                renderTags();
                updateTypeSelect();

                document.getElementById('newTagName').value = '';
                document.getElementById('newTagDesc').value = '';

                showToast(`标签「${LifeRPG.security.escapeHtml(name)}」已添加`);
            } catch (error) {
                console.error('添加标签失败:', error);
                showToast('添加失败', '⚠️');
            }
        }

        /**
         * 编辑标签
         */
        function editTag(id) {
            try {
                const tag = adminData.tags.find(t => t.id === id);
                if (!tag) return;

                const item = document.getElementById(`tag-${id}`);
                if (!item) return;

                const icons = LifeRPG.constants.ICONS;
                const iconOptions = icons.map(icon =>
                    `<option value="${icon}" ${tag.icon === icon ? 'selected' : ''}>${icon}</option>`
                ).join('');

                item.classList.add('editing');
                item.innerHTML = `
                    <div class="item-content">
                        <div class="form-group" style="flex: 0 0 80px;">
                            <label>图标</label>
                            <select id="editTagIcon-${id}">${iconOptions}</select>
                        </div>
                        <div class="form-group">
                            <label>标签名称</label>
                            <input type="text" id="editTagName-${id}" value="${LifeRPG.security.escapeHtml(tag.name)}">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>描述</label>
                            <input type="text" id="editTagDesc-${id}" value="${LifeRPG.security.escapeHtml(tag.desc || '')}">
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-secondary btn-small" onclick="cancelEditTag(${id})">取消</button>
                        <button class="btn btn-primary btn-small" onclick="saveTag(${id})">保存</button>
                    </div>
                `;
            } catch (error) {
                console.error('编辑标签失败:', error);
            }
        }

        /**
         * 取消编辑标签
         */
        function cancelEditTag(id) {
            renderTags();
        }

        /**
         * 保存标签
         */
        function saveTag(id) {
            try {
                const tag = adminData.tags.find(t => t.id === id);
                if (!tag) return;

                const newName = document.getElementById(`editTagName-${id}`).value.trim();
                const newIcon = document.getElementById(`editTagIcon-${id}`).value;
                const newDesc = document.getElementById(`editTagDesc-${id}`).value.trim();

                if (!newName) {
                    showToast('请输入标签名称', '⚠️');
                    return;
                }

                if (adminData.tags.some(t => t.name === newName && t.id !== id)) {
                    showToast('该标签名称已存在', '⚠️');
                    return;
                }

                const oldName = tag.name;
                adminData.landmarks.forEach(lm => {
                    if (lm.type === oldName) {
                        lm.type = newName;
                    }
                });

                tag.name = newName;
                tag.icon = newIcon;
                tag.desc = newDesc;

                saveData();
                renderTags();
                renderLandmarks();
                updateTypeSelect();
                showToast('标签已更新');
            } catch (error) {
                console.error('保存标签失败:', error);
                showToast('保存失败', '⚠️');
            }
        }

        /**
         * 删除标签
         */
        function deleteTag(id) {
            try {
                const tag = adminData.tags.find(t => t.id === id);
                if (!tag) return;

                const usedCount = adminData.landmarks.filter(lm => lm.type === tag.name).length;
                if (usedCount > 0) {
                    if (!confirm(`有 ${usedCount} 个地标使用了此标签，删除后这些地标将失去类型。确定删除吗？`)) {
                        return;
                    }
                    adminData.landmarks.forEach(lm => {
                        if (lm.type === tag.name) {
                            lm.type = '';
                        }
                    });
                }

                adminData.tags = adminData.tags.filter(t => t.id !== id);
                saveData();
                renderTags();
                renderLandmarks();
                updateTypeSelect();
                showToast(`标签「${LifeRPG.security.escapeHtml(tag.name)}」已删除`);
            } catch (error) {
                console.error('删除标签失败:', error);
                showToast('删除失败', '⚠️');
            }
        }

        // ========== 地标管理 ==========

        /**
         * 更新类型选择器
         */
        function updateTypeSelect() {
            try {
                const select = document.getElementById('newLandmarkType');
                if (!select) return;

                select.innerHTML = adminData.tags.map(tag =>
                    `<option value="${LifeRPG.security.escapeHtml(tag.name)}">${tag.icon} ${LifeRPG.security.escapeHtml(tag.name)}</option>`
                ).join('');
            } catch (error) {
                console.error('更新类型选择器失败:', error);
            }
        }

        /**
         * 渲染地标列表
         */
        function renderLandmarks() {
            try {
                const list = document.getElementById('landmarkList');
                const count = document.getElementById('landmarkCount');
                if (!list || !count) return;

                count.textContent = `${adminData.landmarks.length} 个地标`;

                if (adminData.landmarks.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🗺️</div>
                            <p>暂无地标，请添加</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = adminData.landmarks.map(lm => `
                    <div class="item" id="landmark-${lm.id}">
                        <div class="item-icon">${lm.icon}</div>
                        <div class="item-content">
                            <div class="item-name">${LifeRPG.security.escapeHtml(lm.name)}</div>
                            <div class="item-desc">${LifeRPG.security.escapeHtml(lm.desc || '暂无描述')} ${lm.boss ? `| BOSS: ${LifeRPG.security.escapeHtml(lm.boss)}` : ''}</div>
                        </div>
                        <span class="item-type">${LifeRPG.security.escapeHtml(lm.type || '未分类')}</span>
                        <div class="item-actions">
                            <button class="btn btn-secondary btn-small" onclick="editLandmark(${lm.id})">编辑</button>
                            <button class="btn btn-danger" onclick="deleteLandmark(${lm.id})">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('渲染地标失败:', error);
            }
        }

        /**
         * 添加地标
         */
        function addLandmark() {
            try {
                const icon = document.getElementById('newLandmarkIcon').value;
                const name = document.getElementById('newLandmarkName').value.trim();
                const type = document.getElementById('newLandmarkType').value;
                const desc = document.getElementById('newLandmarkDesc').value.trim();
                const boss = document.getElementById('newLandmarkBoss').value.trim();

                if (!name) {
                    showToast('请输入地标名称', '⚠️');
                    return;
                }

                if (adminData.landmarks.some(lm => lm.name === name)) {
                    showToast('该地标已存在', '⚠️');
                    return;
                }

                const newLandmark = {
                    id: generateId(),
                    name: name,
                    icon: icon,
                    type: type,
                    desc: desc,
                    boss: boss
                };

                adminData.landmarks.push(newLandmark);
                saveData();
                renderLandmarks();

                document.getElementById('newLandmarkName').value = '';
                document.getElementById('newLandmarkDesc').value = '';
                document.getElementById('newLandmarkBoss').value = '';

                showToast(`地标「${LifeRPG.security.escapeHtml(name)}」已添加`);
            } catch (error) {
                console.error('添加地标失败:', error);
                showToast('添加失败', '⚠️');
            }
        }

        /**
         * 编辑地标
         */
        function editLandmark(id) {
            try {
                const lm = adminData.landmarks.find(l => l.id === id);
                if (!lm) return;

                const item = document.getElementById(`landmark-${id}`);
                if (!item) return;

                const icons = LifeRPG.constants.ICONS;
                const iconOptions = icons.map(icon =>
                    `<option value="${icon}" ${lm.icon === icon ? 'selected' : ''}>${icon}</option>`
                ).join('');

                const typeOptions = adminData.tags.map(tag =>
                    `<option value="${LifeRPG.security.escapeHtml(tag.name)}" ${lm.type === tag.name ? 'selected' : ''}>${tag.icon} ${LifeRPG.security.escapeHtml(tag.name)}</option>`
                ).join('');

                item.classList.add('editing');
                item.innerHTML = `
                    <div class="item-content">
                        <div class="form-group" style="flex: 0 0 80px;">
                            <label>图标</label>
                            <select id="editLmIcon-${id}">${iconOptions}</select>
                        </div>
                        <div class="form-group">
                            <label>地标名称</label>
                            <input type="text" id="editLmName-${id}" value="${LifeRPG.security.escapeHtml(lm.name)}">
                        </div>
                        <div class="form-group">
                            <label>类型</label>
                            <select id="editLmType-${id}">${typeOptions}</select>
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>描述</label>
                            <textarea id="editLmDesc-${id}">${LifeRPG.security.escapeHtml(lm.desc || '')}</textarea>
                        </div>
                        <div class="form-group">
                            <label>BOSS名称</label>
                            <input type="text" id="editLmBoss-${id}" value="${LifeRPG.security.escapeHtml(lm.boss || '')}">
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-secondary btn-small" onclick="cancelEditLandmark(${id})">取消</button>
                        <button class="btn btn-primary btn-small" onclick="saveLandmark(${id})">保存</button>
                    </div>
                `;
            } catch (error) {
                console.error('编辑地标失败:', error);
            }
        }

        /**
         * 取消编辑地标
         */
        function cancelEditLandmark(id) {
            renderLandmarks();
        }

        /**
         * 保存地标
         */
        function saveLandmark(id) {
            try {
                const lm = adminData.landmarks.find(l => l.id === id);
                if (!lm) return;

                const newName = document.getElementById(`editLmName-${id}`).value.trim();
                const newIcon = document.getElementById(`editLmIcon-${id}`).value;
                const newType = document.getElementById(`editLmType-${id}`).value;
                const newDesc = document.getElementById(`editLmDesc-${id}`).value.trim();
                const newBoss = document.getElementById(`editLmBoss-${id}`).value.trim();

                if (!newName) {
                    showToast('请输入地标名称', '⚠️');
                    return;
                }

                if (adminData.landmarks.some(l => l.name === newName && l.id !== id)) {
                    showToast('该地标名称已存在', '⚠️');
                    return;
                }

                lm.name = newName;
                lm.icon = newIcon;
                lm.type = newType;
                lm.desc = newDesc;
                lm.boss = newBoss;

                saveData();
                renderLandmarks();
                showToast('地标已更新');
            } catch (error) {
                console.error('保存地标失败:', error);
                showToast('保存失败', '⚠️');
            }
        }

        /**
         * 删除地标
         */
        function deleteLandmark(id) {
            try {
                const lm = adminData.landmarks.find(l => l.id === id);
                if (!lm) return;

                if (!confirm(`确定删除地标「${lm.name}」吗？`)) {
                    return;
                }

                adminData.landmarks = adminData.landmarks.filter(l => l.id !== id);
                saveData();
                renderLandmarks();
                showToast(`地标「${LifeRPG.security.escapeHtml(lm.name)}」已删除`);
            } catch (error) {
                console.error('删除地标失败:', error);
                showToast('删除失败', '⚠️');
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
