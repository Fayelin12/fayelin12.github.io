<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关卡管理 | 人生开放系统</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="common.js"></script>
    <style>
        /* 页面特有样式 */
        .selection-area {
            padding: 25px 30px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-deep);
        }

        .level-management {
            display: none;
        }

        .level-management.active {
            display: block;
        }

        .level-form {
            padding: 25px 30px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-deep);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .checkpoint-list {
            padding: 20px 30px;
        }

        .checkpoint-list h4 {
            font-family: var(--font-display);
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .checkpoint-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .checkpoint-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--accent-gold);
            color: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 14px;
        }

        .checkpoint-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 15px;
            padding: 5px;
        }

        .checkpoint-input:focus {
            outline: none;
            border-bottom-color: var(--accent-gold);
        }

        .checkpoint-time {
            width: 80px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px;
            color: var(--text-primary);
            text-align: center;
        }

        .checkpoint-delete {
            background: transparent;
            border: 1px solid var(--accent-ember);
            color: var(--accent-ember);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .checkpoint-delete:hover {
            background: var(--accent-ember);
            color: var(--bg-deep);
        }

        .add-checkpoint {
            padding: 15px;
            text-align: center;
            border: 2px dashed var(--border);
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-size: 13px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .add-checkpoint:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .level-list {
            padding: 0;
        }

        .level-icon {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--bg-deep);
        }

        .level-info {
            flex: 1;
        }

        .level-name {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .level-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .level-difficulty {
            color: var(--accent-ember);
        }

        .level-time {
            color: var(--accent-gold);
        }

        .level-checkpoints {
            color: var(--accent-magic);
            position: relative;
            cursor: help;
        }

        .level-actions {
            display: flex;
            gap: 10px;
        }

        .level-item {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .level-item:hover {
            background: var(--bg-elevated);
        }

        .level-item.editing {
            border: 2px solid var(--accent-gold);
            background: rgba(201, 162, 39, 0.1);
        }

        .level-item.dragging {
            opacity: 0.4;
        }

        .drag-handle {
            cursor: move;
            padding: 10px;
            color: var(--text-muted);
            font-size: 20px;
            user-select: none;
        }

        .drag-handle:hover {
            color: var(--accent-gold);
        }

        .checkpoints-tooltip {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 0;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            min-width: 220px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            font-size: 12px;
        }

        .level-checkpoints:hover .checkpoints-tooltip {
            display: block;
        }
    </style>
</head>
<body>
    <div class="bg-texture"></div>

    <header class="temple-header">
        <div class="temple-brand">
            <div class="temple-seal">⚔️</div>
            <div class="temple-title">LIFE RPG</div>
        </div>
        <nav class="temple-nav">
            <a href="index.html" class="nav-rune">世界地图</a>
            <a href="admin.html" class="nav-rune">命名管理</a>
            <a href="quest-admin.html" class="nav-rune">任务管理</a>
            <a href="level-admin.html" class="nav-rune active">关卡管理</a>
            <a href="calendar.html" class="nav-rune">日历视图</a>
        </nav>
    </header>

    <main class="main-container">
        <div class="page-header">
            <h1>关卡管理系统</h1>
            <p>为每个任务设计关卡，设置检查点，追踪进度</p>
        </div>

        <div class="panels-grid">
            <div class="panel panel-full-width">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="panel-title-icon">🎮</span>
                        关卡设计
                    </div>
                    <span class="panel-count" id="levelCount">选择任务创建关卡</span>
                </div>

                <!-- 选择区域 -->
                <div class="selection-area">
                    <div class="form-row">
                        <div class="form-group">
                            <label>选择地标</label>
                            <select id="selectLandmark" onchange="onLandmarkChange()">
                                <option value="">-- 选择地标 --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>选择任务</label>
                            <select id="selectQuest" onchange="onQuestChange()" disabled>
                                <option value="">-- 先选择地标 --</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 关卡管理区域 -->
                <div class="level-management" id="levelManagement">
                    <!-- 新建关卡按钮 -->
                    <div style="padding: 20px 30px; border-bottom: 1px solid var(--border);">
                        <button class="btn btn-primary" onclick="showLevelForm()" id="newLevelBtn">+ 新建关卡</button>
                    </div>

                    <!-- 关卡表单（默认隐藏） -->
                    <div class="level-form" id="levelForm" style="display: none;">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>关卡名称</label>
                                <input type="text" id="levelName" placeholder="例如：城堡外围探索">
                            </div>
                            <div class="form-group">
                                <label>难度等级</label>
                                <select id="levelDifficulty">
                                    <option value="1">⭐ 简单</option>
                                    <option value="2">⭐⭐ 较易</option>
                                    <option value="3">⭐⭐⭐ 中等</option>
                                    <option value="4">⭐⭐⭐⭐ 困难</option>
                                    <option value="5">⭐⭐⭐⭐⭐ 极难</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>预计天数</label>
                                <input type="number" id="levelTime" value="1" min="1" step="1">
                            </div>
                            <div class="form-group" style="display: flex; align-items: flex-end; gap: 10px; min-width: 200px;">
                                <button class="btn btn-secondary" onclick="hideLevelForm()" style="flex: 1; white-space: nowrap;">取消</button>
                                <button class="btn btn-primary" onclick="saveLevel()" style="flex: 1; white-space: nowrap;">保存</button>
                            </div>
                        </div>

                        <!-- 检查点列表 -->
                        <div class="checkpoint-list">
                            <h4>📍 检查点设计（完成所有检查点 = 关卡完成）</h4>
                            <div id="checkpointContainer">
                                <!-- 动态生成 -->
                            </div>
                            <div class="add-checkpoint" onclick="addCheckpoint()">+ 添加检查点</div>
                        </div>
                    </div>

                    <!-- 已有关卡列表 -->
                    <div class="existing-levels" id="existingLevels" style="padding: 20px 30px; border-top: 1px solid var(--border);">
                        <h4 style="font-family: var(--font-display); font-size: 14px; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 15px;">📋 已有关卡</h4>
                        <div class="level-list" id="levelList">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message">操作成功</span>
    </div>

    <script>
        // 数据存储
        let adminData = {
            tags: [],
            landmarks: [],
            landmarkQuests: {},
            questLevels: {}
        };

        let currentLandmarkId = null;
        let currentQuestId = null;
        let checkpoints = [];
        let editingLevelId = null;

        // 拖拽相关变量
        let dragSrcEl = null;
        let dragSrcIndex = null;

        /**
         * 初始化
         */
        function init() {
            try {
                loadData();
                updateLandmarkSelect();
            } catch (error) {
                console.error('初始化失败:', error);
                showToast('初始化失败，请刷新页面重试', '⚠️');
            }
        }

        /**
         * 加载数据
         */
        function loadData() {
            try {
                const savedData = LifeRPG.data.load();
                if (savedData) {
                    adminData = {
                        ...adminData,
                        ...savedData
                    };
                    if (!adminData.questLevels) adminData.questLevels = {};
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        /**
         * 保存数据
         */
        function saveData() {
            try {
                LifeRPG.data.save(adminData);
            } catch (error) {
                console.error('保存数据失败:', error);
                showToast('保存失败', '⚠️');
            }
        }

        /**
         * 显示提示
         */
        function showToast(message, icon = '✓') {
            try {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.querySelector('.toast-icon').textContent = icon;
                toast.querySelector('.toast-message').textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            } catch (error) {
                console.error('显示提示失败:', error);
            }
        }

        /**
         * 更新地标选择器
         */
        function updateLandmarkSelect() {
            try {
                const select = document.getElementById('selectLandmark');
                if (!select) return;

                select.innerHTML = '<option value="">-- 选择地标 --</option>' +
                    (adminData.landmarks || []).map(lm =>
                        `<option value="${lm.id}">${lm.icon} ${LifeRPG.security.escapeHtml(lm.name)}</option>`
                    ).join('');
            } catch (error) {
                console.error('更新地标选择器失败:', error);
            }
        }

        /**
         * 地标选择变化
         */
        function onLandmarkChange() {
            try {
                const select = document.getElementById('selectLandmark');
                currentLandmarkId = select.value || null;
                currentQuestId = null;

                const questSelect = document.getElementById('selectQuest');
                const levelManagement = document.getElementById('levelManagement');

                if (currentLandmarkId) {
                    const quests = adminData.landmarkQuests[currentLandmarkId] || [];
                    questSelect.innerHTML = '<option value="">-- 选择任务 --</option>' +
                        quests.map(q => `<option value="${q.id}">${LifeRPG.security.escapeHtml(q.name)}</option>`).join('');
                    questSelect.disabled = false;
                    levelManagement.classList.remove('active');
                } else {
                    questSelect.innerHTML = '<option value="">-- 先选择地标 --</option>';
                    questSelect.disabled = true;
                    levelManagement.classList.remove('active');
                }
            } catch (error) {
                console.error('地标选择变化处理失败:', error);
            }
        }

        /**
         * 任务选择变化
         */
        function onQuestChange() {
            try {
                const select = document.getElementById('selectQuest');
                currentQuestId = select.value || null;

                if (currentQuestId) {
                    document.getElementById('levelManagement').classList.add('active');
                    hideLevelForm();
                    updateLevelCount();
                    renderLevelList();
                } else {
                    document.getElementById('levelManagement').classList.remove('active');
                }
            } catch (error) {
                console.error('任务选择变化处理失败:', error);
            }
        }

        /**
         * 显示关卡表单
         */
        function showLevelForm(levelId = null) {
            try {
                editingLevelId = levelId;
                const form = document.getElementById('levelForm');
                const btn = document.getElementById('newLevelBtn');

                form.style.display = 'block';
                btn.style.display = 'none';

                if (levelId) {
                    const levels = adminData.questLevels[currentQuestId] || [];
                    const level = levels.find(l => l.id === levelId);
                    if (level) {
                        document.getElementById('levelName').value = level.name;
                        document.getElementById('levelDifficulty').value = level.difficulty;
                        document.getElementById('levelTime').value = level.time;
                        checkpoints = JSON.parse(JSON.stringify(level.checkpoints || []));
                    }
                } else {
                    document.getElementById('levelName').value = '';
                    document.getElementById('levelDifficulty').value = '3';
                    document.getElementById('levelTime').value = '1';
                    checkpoints = [{ id: generateId(), name: '', time: 1, completed: false }];
                }
                renderCheckpoints();
                form.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (error) {
                console.error('显示关卡表单失败:', error);
            }
        }

        /**
         * 隐藏关卡表单
         */
        function hideLevelForm() {
            try {
                document.getElementById('levelForm').style.display = 'none';
                document.getElementById('newLevelBtn').style.display = 'block';
                editingLevelId = null;
                checkpoints = [];
                renderLevelList();
            } catch (error) {
                console.error('隐藏关卡表单失败:', error);
            }
        }

        /**
         * 更新关卡计数
         */
        function updateLevelCount() {
            try {
                const levels = adminData.questLevels[currentQuestId] || [];
                const totalCheckpoints = levels.reduce((sum, l) => sum + (l.checkpoints ? l.checkpoints.length : 0), 0);
                document.getElementById('levelCount').textContent =
                    levels.length > 0 ? `${levels.length} 个关卡, ${totalCheckpoints} 个检查点` : '未创建关卡';
            } catch (error) {
                console.error('更新关卡计数失败:', error);
            }
        }

        /**
         * 生成唯一ID
         */
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        }

        /**
         * 添加检查点
         */
        function addCheckpoint() {
            try {
                checkpoints.push({
                    id: generateId(),
                    name: '',
                    time: 1,
                    completed: false
                });
                renderCheckpoints();
            } catch (error) {
                console.error('添加检查点失败:', error);
            }
        }

        /**
         * 渲染检查点
         */
        function renderCheckpoints() {
            try {
                const container = document.getElementById('checkpointContainer');
                if (!container) return;

                if (checkpoints.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted);">点击上方添加检查点</div>';
                    return;
                }

                container.innerHTML = checkpoints.map((cp, index) => `
                    <div class="checkpoint-item">
                        <div class="checkpoint-number">${index + 1}</div>
                        <input type="text" class="checkpoint-input" placeholder="检查点名称"
                            value="${LifeRPG.security.escapeHtml(cp.name)}" onchange="updateCheckpoint(${index}, 'name', this.value)">
                        <input type="number" class="checkpoint-time" placeholder="天"
                            value="${cp.time}" onchange="updateCheckpoint(${index}, 'time', this.value)">
                        <button class="checkpoint-delete" onclick="deleteCheckpoint(${index})">删除</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('渲染检查点失败:', error);
            }
        }

        /**
         * 更新检查点
         */
        function updateCheckpoint(index, field, value) {
            try {
                checkpoints[index][field] = field === 'time' ? parseInt(value) || 1 : value;
            } catch (error) {
                console.error('更新检查点失败:', error);
            }
        }

        /**
         * 删除检查点
         */
        function deleteCheckpoint(index) {
            try {
                checkpoints.splice(index, 1);
                renderCheckpoints();
            } catch (error) {
                console.error('删除检查点失败:', error);
            }
        }

        /**
         * 保存关卡
         */
        function saveLevel() {
            try {
                if (!currentQuestId) {
                    showToast('请先选择任务', '⚠️');
                    return;
                }

                const name = document.getElementById('levelName').value.trim();
                const difficulty = parseInt(document.getElementById('levelDifficulty').value);
                const time = parseInt(document.getElementById('levelTime').value);

                if (!name) {
                    showToast('请输入关卡名称', '⚠️');
                    return;
                }

                if (checkpoints.length === 0) {
                    showToast('请至少添加一个检查点', '⚠️');
                    return;
                }

                const validCheckpoints = checkpoints.filter(cp => cp.name.trim());
                if (validCheckpoints.length === 0) {
                    showToast('检查点名称不能为空', '⚠️');
                    return;
                }

                if (!adminData.questLevels[currentQuestId]) {
                    adminData.questLevels[currentQuestId] = [];
                }

                if (editingLevelId) {
                    const levelIndex = adminData.questLevels[currentQuestId].findIndex(l => l.id === editingLevelId);
                    if (levelIndex !== -1) {
                        adminData.questLevels[currentQuestId][levelIndex] = {
                            ...adminData.questLevels[currentQuestId][levelIndex],
                            name: name,
                            difficulty: difficulty,
                            time: time,
                            checkpoints: validCheckpoints
                        };
                        showToast('关卡已更新');
                    }
                } else {
                    const level = {
                        id: generateId(),
                        name: name,
                        difficulty: difficulty,
                        time: time,
                        checkpoints: validCheckpoints,
                        completed: false
                    };
                    adminData.questLevels[currentQuestId].push(level);
                    showToast('关卡已创建');
                }

                saveData();
                hideLevelForm();
                updateLevelCount();
                renderLevelList();
            } catch (error) {
                console.error('保存关卡失败:', error);
                showToast('保存失败', '⚠️');
            }
        }

        /**
         * 渲染关卡列表
         */
        function renderLevelList() {
            try {
                const container = document.getElementById('levelList');
                const existingLevelsDiv = document.getElementById('existingLevels');
                const levels = adminData.questLevels[currentQuestId] || [];

                if (levels.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="padding: 30px;">
                            <div class="empty-state-icon">🎮</div>
                            <p>该任务暂无关卡</p>
                            <p style="font-size: 12px; margin-top: 10px;">点击上方「新建关卡」创建第一个关卡</p>
                        </div>
                    `;
                    existingLevelsDiv.style.display = 'block';
                    return;
                }

                existingLevelsDiv.style.display = 'block';
                container.innerHTML = levels.map((level, index) => {
                    const stars = '⭐'.repeat(level.difficulty);
                    const completedCount = level.checkpoints.filter(cp => cp.completed).length;
                    const isEditing = editingLevelId === level.id;

                    const checkpointsTooltip = level.checkpoints.map((cp, i) =>
                        `<div style="padding: 4px 0; ${cp.completed ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${i + 1}. ${LifeRPG.security.escapeHtml(cp.name || '未命名')} (${cp.time}天)</div>`
                    ).join('');

                    return `
                        <div class="level-item ${isEditing ? 'editing' : ''}"
                            draggable="true"
                            data-index="${index}"
                            data-level-id="${level.id}"
                            style="${isEditing ? 'border: 2px solid var(--accent-gold); background: rgba(201, 162, 39, 0.1);' : ''}">
                            <div class="drag-handle">⋮⋮</div>
                            <div class="level-icon">${isEditing ? '✏️' : '🎮'}</div>
                            <div class="level-info" style="position: relative;">
                                <div class="level-name">${index + 1}. ${LifeRPG.security.escapeHtml(level.name)} ${isEditing ? '<span style="color: var(--accent-gold); font-size: 12px;">(编辑中)</span>' : ''}</div>
                                <div class="level-meta">
                                    <span class="level-difficulty">${stars}</span>
                                    <span class="level-time">📅 ${level.time}天</span>
                                    <span class="level-checkpoints">
                                        📍 ${completedCount}/${level.checkpoints.length} 检查点
                                        <div class="checkpoints-tooltip">
                                            <div style="font-weight: bold; margin-bottom: 5px; color: var(--accent-gold);">检查点列表：</div>
                                            ${checkpointsTooltip}
                                        </div>
                                    </span>
                                </div>
                            </div>
                            <div class="level-actions">
                                <button class="btn btn-secondary btn-small" onclick="showLevelForm('${level.id}')" ${isEditing ? 'disabled' : ''}>编辑</button>
                                <button class="btn btn-danger" onclick="deleteLevel('${level.id}')">删除</button>
                            </div>
                        </div>
                    `;
                }).join('');

                bindDragEvents();
                bindHoverEvents();
            } catch (error) {
                console.error('渲染关卡列表失败:', error);
            }
        }

        /**
         * 绑定拖拽事件
         */
        function bindDragEvents() {
            try {
                const items = document.querySelectorAll('.level-item');
                items.forEach(item => {
                    LifeRPG.events.add(item, 'dragstart', handleDragStart);
                    LifeRPG.events.add(item, 'dragenter', handleDragEnter);
                    LifeRPG.events.add(item, 'dragover', handleDragOver);
                    LifeRPG.events.add(item, 'dragleave', handleDragLeave);
                    LifeRPG.events.add(item, 'drop', handleDrop);
                    LifeRPG.events.add(item, 'dragend', handleDragEnd);
                });
            } catch (error) {
                console.error('绑定拖拽事件失败:', error);
            }
        }

        /**
         * 绑定悬停事件
         */
        function bindHoverEvents() {
            try {
                const checkpointsSpans = document.querySelectorAll('.level-checkpoints');
                checkpointsSpans.forEach(span => {
                    const tooltip = span.querySelector('.checkpoints-tooltip');
                    if (tooltip) {
                        LifeRPG.events.add(span, 'mouseenter', () => {
                            tooltip.style.display = 'block';
                        });
                        LifeRPG.events.add(span, 'mouseleave', () => {
                            tooltip.style.display = 'none';
                        });
                    }
                });
            } catch (error) {
                console.error('绑定悬停事件失败:', error);
            }
        }

        /**
         * 拖拽开始
         */
        function handleDragStart(e) {
            dragSrcEl = this;
            dragSrcIndex = parseInt(this.dataset.index);
            this.style.opacity = '0.4';
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        }

        /**
         * 拖拽进入
         */
        function handleDragEnter(e) {
            if (this !== dragSrcEl) {
                this.style.borderTop = '3px solid var(--accent-gold)';
            }
        }

        /**
         * 拖拽悬停
         */
        function handleDragOver(e) {
            if (e.preventDefault) {
                e.preventDefault();
            }
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        /**
         * 拖拽离开
         */
        function handleDragLeave(e) {
            this.style.borderTop = '';
        }

        /**
         * 放置
         */
        function handleDrop(e) {
            if (e.stopPropagation) {
                e.stopPropagation();
            }

            if (dragSrcEl !== this) {
                const dragDstIndex = parseInt(this.dataset.index);

                const levels = adminData.questLevels[currentQuestId];
                const [movedLevel] = levels.splice(dragSrcIndex, 1);
                levels.splice(dragDstIndex, 0, movedLevel);

                saveData();
                renderLevelList();
                showToast('关卡顺序已更新');
            }

            return false;
        }

        /**
         * 拖拽结束
         */
        function handleDragEnd(e) {
            this.style.opacity = '1';
            const items = document.querySelectorAll('.level-item');
            items.forEach(item => {
                item.style.borderTop = '';
            });
        }

        /**
         * 删除关卡
         */
        function deleteLevel(levelId) {
            try {
                if (!confirm('确定删除该关卡吗？')) return;

                const levels = adminData.questLevels[currentQuestId] || [];
                adminData.questLevels[currentQuestId] = levels.filter(l => l.id !== levelId);

                if (editingLevelId === levelId) {
                    hideLevelForm();
                }

                saveData();
                updateLevelCount();
                renderLevelList();
                showToast('关卡已删除');
            } catch (error) {
                console.error('删除关卡失败:', error);
                showToast('删除失败', '⚠️');
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
